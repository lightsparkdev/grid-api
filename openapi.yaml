            |------------|-------------|
            | CUSTOMER_DELETED | Customer has been permanently deleted |
          enum:
            - CUSTOMER_DELETED
        message:
          type: string
          description: Error message
        details:
          type: object
          description: Additional error details
          additionalProperties: true
