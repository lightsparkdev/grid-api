          example: Verification:019542f5-b3e7-1d02-0000-000000000001
        customerId:
          type: string
          description: The ID of the customer being verified
          example: Customer:019542f5-b3e7-1d02-0000-000000000001
        verificationStatus:
          $ref: '#/components/schemas/VerificationStatus'
        errors:
          type: array
          description: List of issues preventing verification from proceeding. Empty when verificationStatus is APPROVED or IN_PROGRESS.
          items:
            $ref: '#/components/schemas/VerificationError'
        createdAt:
          type: string
          format: date-time
          description: When this verification was created
          example: '2025-10-03T12:00:00Z'
        updatedAt:
          type: string
          format: date-time
          description: When this verification was last updated
          example: '2025-10-03T12:00:00Z'
    VerificationListResponse:
      type: object
      required:
        - data
        - hasMore
      properties:
        data:
          type: array
          description: List of verifications matching the filter criteria
          items:
            $ref: '#/components/schemas/Verification'
        hasMore:
          type: boolean
          description: Indicates if more results are available beyond this page
        nextCursor:
          type: string
          description: Cursor to retrieve the next page of results (only present if hasMore is true)
        totalCount:
          type: integer
          description: Total number of results matching the criteria
    VerificationRequest:
      type: object
      required:
        - customerId
      properties:
        customerId:
          type: string
          description: The ID of the customer to verify
          example: Customer:019542f5-b3e7-1d02-0000-000000000001
    ExternalAccountReference:
      type: object
      required:
        - accountId
      properties:
        accountId:
          type: string
          description: Reference to an external account ID
          example: ExternalAccount:e85dcbd6-dced-4ec4-b756-3c3a9ea3d965
    InternalAccountReference:
      type: object
      required:
        - accountId
      properties:
        accountId:
          type: string
          description: Reference to an internal account ID
          example: InternalAccount:a12dcbd6-dced-4ec4-b756-3c3a9ea3d123
    TransferInRequest:
      type: object
      required:
        - source
        - destination
      properties:
        source:
          $ref: '#/components/schemas/ExternalAccountReference'
          description: Source external account details
        destination:
          $ref: '#/components/schemas/InternalAccountReference'
          description: Destination internal account details
        amount:
          type: integer
          format: int64
          description: Amount in the smallest unit of the currency (e.g., cents for USD/EUR, satoshis for BTC)
          example: 12550
    TransactionStatus:
      type: string
      enum:
        - CREATED
        - PENDING
        - PROCESSING
        - COMPLETED
        - REJECTED
        - FAILED
        - REFUNDED
        - EXPIRED
      description: |
        Status of a payment transaction.

        | Status | Description |
        |--------|-------------|
        | `CREATED` | Initial lookup has been created |
        | `PENDING` | Quote has been created |
        | `PROCESSING` | Funding has been received and payment initiated |
        | `COMPLETED` | Cross border payment has been received, converted and payment has been sent to the offramp network |
        | `REJECTED` | Receiving institution or wallet rejected payment, payment has been refunded |
        | `FAILED` | An error occurred during payment |
        | `REFUNDED` | Payment was unable to complete and refunded |
        | `EXPIRED` | Quote has expired |
    TransactionDestinationType:
      type: string
      enum:
        - ACCOUNT
        - UMA_ADDRESS
      description: Type of transaction destination
      example: ACCOUNT
    BaseTransactionDestination:
      type: object
      required:
        - destinationType
      properties:
        destinationType:
          $ref: '#/components/schemas/TransactionDestinationType'
        currency:
          type: string
          description: Currency code for the destination
          example: EUR
    AccountTransactionDestination:
      title: Account Destination
      allOf:
        - $ref: '#/components/schemas/BaseTransactionDestination'
        - type: object
          required:
            - accountId
            - destinationType
          properties:
            destinationType:
              type: string
              enum:
                - ACCOUNT
            accountId:
              type: string
