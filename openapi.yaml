        - $ref: '#/components/schemas/BusinessCustomerCreateRequest'
      discriminator:
        propertyName: customerType
        mapping:
          INDIVIDUAL: '#/components/schemas/IndividualCustomerCreateRequest'
          BUSINESS: '#/components/schemas/BusinessCustomerCreateRequest'
