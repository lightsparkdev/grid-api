          - "$.components.schemas.TronWalletExternalAccountInfo.allOf[0]"
          - "$.components.schemas.PolygonWalletExternalAccountInfo.allOf[0]"
          - "$.components.schemas.BaseWalletExternalAccountInfo.allOf[0]"
