# yaml-language-server: $schema=https://app.stainless.com/config.schema.json

# The main edition for the config, see the [docs] for more information.
#
# [docs]: https://www.stainless.com/docs/reference/editions
edition: 2026-05-06

organization:
  # Name of your organization or company, used to determine the name of the client
  # and headings.
  name: Lightspark Grid
  # Link to your API documentation.
  docs: 'grid.lightspark.com'
  # Contact email for bug reports, questions, and support requests.
  contact: support@lightspark.com

# `targets` define the output targets and their customization options, such as
# whether to emit the Node SDK and what its package name should be.
targets:
  typescript:
    # The edition for this target, see the [docs] for more information.
    #
    # [docs]: https://www.stainless.com/docs/reference/editions
    edition: typescript.2025-10-10
    package_name: "@lightsparkdev/grid"
    production_repo: lightsparkdev/grid-js-sdk
    publish:
      npm:
        auth_method: oidc
      jsr:
        package_name: "@lightsparkdev/grid"
    options:
      mcp_server:
        package_name: "@lightsparkdev/grid-mcp"
        enable_all_resources: true
        host:
          stainless: true
  kotlin:
    reverse_domain: com.lightspark.grid
    production_repo: lightsparkdev/grid-kotlin-sdk
    publish:
      maven:
        sonatype_platform: portal
  python:
    edition: python.2025-11-20
    package_name: grid
    production_repo: null
    publish:
      pypi: false
  ruby:
    edition: ruby.2025-10-08
    gem_name: grid
    production_repo: null
    publish:
      rubygems: false
  go:
    edition: go.2026-04-15
    package_name: grid
    production_repo: null
  # csharp (unpublished) is omitted: its Stainless build CI fails on any
  # freshly generated code, failing the preview check on spec-changing PRs.
  php:
    edition: php.2025-10-08
    package_name: grid
    production_repo: null
    composer_package_name: org-placeholder/grid
  cli:
    edition: cli.2025-10-08
    binary_name: grid
    production_repo: null

# `environments` are a map of the name of the environment (e.g. "sandbox",
# "production") to the corresponding url to use.
environments:
  production: https://api.lightspark.com/grid/2025-10-13

# `resources` define the structure and organization for your API, such as how
# methods and models are grouped together and accessed. See the [configuration
# guide] for more information.
#
# [configuration guide]: https://www.stainless.com/docs/guides/configure#resources
resources:
  config:
    # Configure the methods defined in this resource. Each key in the object is the
    # name of the method and the value is either an endpoint (for example, `get /foo`)
    # or an object with more detail.
    #
    # [reference]: https://www.stainless.com/docs/reference/config#method
    # Configure the models--named types--defined in the resource. Each key in the
    # object is the name of the model and the value is either the name of a schema in
    # `#/components/schemas` or an object with more detail.
    #
    # [reference]: https://www.stainless.com/docs/reference/config#model
    models:
      customer_info_field_name: '#/components/schemas/CustomerInfoFieldName'
      platform_currency_config: '#/components/schemas/PlatformCurrencyConfig'
      platform_config: '#/components/schemas/PlatformConfig'
      embedded_wallet_config: "#/components/schemas/EmbeddedWalletConfig"
      platform_config_update_request: '#/components/schemas/PlatformConfigUpdateRequest'
    methods:
      retrieve: get /config
      update: patch /config

  customers:
    models:
      # Customer object + polymorphic response/request unions (INDIVIDUAL | BUSINESS)
      customer: '#/components/schemas/Customer'
      customer_one_of: '#/components/schemas/CustomerOneOf'
      customer_list_response: '#/components/schemas/CustomerListResponse'
      customer_create_request_one_of: '#/components/schemas/CustomerCreateRequestOneOf'
      customer_update_request_one_of: '#/components/schemas/CustomerUpdateRequestOneOf'
      individual_customer_create_request: '#/components/schemas/IndividualCustomerCreateRequest'
      business_customer_create_request: '#/components/schemas/BusinessCustomerCreateRequest'
      individual_customer_update_request: '#/components/schemas/IndividualCustomerUpdateRequest'
      business_customer_update_request: '#/components/schemas/BusinessCustomerUpdateRequest'
      # Internal-account management (list/update/export under this resource)
      internal_account_list_response: '#/components/schemas/InternalAccountListResponse'
      internal_account_update_request: '#/components/schemas/InternalAccountUpdateRequest'
      internal_account_export_request: '#/components/schemas/InternalAccountExportRequest'
      internal_account_export_response: '#/components/schemas/InternalAccountExportResponse'
      # KYC link generation
      kyc_link_create_request: '#/components/schemas/KycLinkCreateRequest'
      kyc_link_response: '#/components/schemas/KycLinkResponse'
    methods:
      create:
        endpoint: post /customers
        body_param_name: CreateCustomerRequest
      list: get /customers
      retrieve: get /customers/{customerId}
      update:
        endpoint: patch /customers/{customerId}
        body_param_name: UpdateCustomerRequest
      delete: delete /customers/{customerId}
      list_internal_accounts: get /customers/internal-accounts
      export: post /internal-accounts/{id}/export
      update_internal_account:
        endpoint: patch /internal-accounts/{id}
        body_param_name: InternalAccountUpdateRequest
      create_kyc_link:
        endpoint: post /customers/{customerId}/kyc-link
        body_param_name: KycLinkCreateRequest
    # Subresources define resources that are nested within another for more powerful
    # logical groupings, e.g. `cards.payments`.
    subresources:
      external_accounts:
        models:
          # ExternalAccountInfo models (35)
          aed_external_account_info: "#/components/schemas/AedExternalAccountInfo"
