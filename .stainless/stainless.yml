          - "$.components.schemas.UsdExternalAccountInfo.allOf[0]"
          - "$.components.schemas.VndExternalAccountInfo.allOf[0]"
          - "$.components.schemas.XafExternalAccountInfo.allOf[0]"
          - "$.components.schemas.XofExternalAccountInfo.allOf[0]"
