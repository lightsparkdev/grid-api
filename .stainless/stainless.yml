    # ── Remove $ref to BaseQuoteSource from quote source variants ──
    - command: remove
      reason: >-
        Remove allOf $ref to BaseQuoteSource from quote source variants
        because the base schema becomes an empty object after stripping sourceType
      args:
        target:
          - "$.components.schemas.AccountQuoteSource.allOf[0]"
          - "$.components.schemas.RealtimeFundingQuoteSource.allOf[0]"
        keys: [ "$ref" ]

    # ── Remove $ref to BaseDestination from destination variants ──
    - command: remove
      reason: >-
        Remove allOf $ref to BaseDestination from destination variants
        because the base schema becomes an empty object after stripping destinationType
      args:
        target:
          - "$.components.schemas.AccountDestination.allOf[0]"
          - "$.components.schemas.UmaAddressDestination.allOf[0]"
        keys: [ "$ref" ]

    # ── Remove $ref to BaseTransactionSource from transaction source variants ──
    - command: remove
      reason: >-
        Remove allOf $ref to BaseTransactionSource from transaction source variants
        because the base schema becomes an empty object after stripping sourceType
      args:
        target:
          - "$.components.schemas.AccountTransactionSource.allOf[0]"
          - "$.components.schemas.UmaAddressTransactionSource.allOf[0]"
          - "$.components.schemas.RealtimeFundingTransactionSource.allOf[0]"
        keys: [ "$ref" ]

    # ── Remove $ref to BaseTransactionDestination from transaction destination variants ──
    - command: remove
      reason: >-
        Remove allOf $ref to BaseTransactionDestination from transaction destination
        variants because the base schema becomes an empty object after stripping destinationType
      args:
        target:
          - "$.components.schemas.AccountTransactionDestination.allOf[0]"
          - "$.components.schemas.UmaAddressTransactionDestination.allOf[0]"
        keys: [ "$ref" ]

    # ── type: auth credential base schemas ──
    - command: remove
      reason: >-
        Remove type $ref from auth credential base schemas so the inline
        single-value enums in each *CredentialCreateRequestFields /
        *CredentialVerifyRequestFields variant become the sole definition,
        avoiding allOf type conflicts. `AuthSignedRequestChallenge` is not
        included — it has no discriminated variants, so the base `type`
        field (inherited via allOf) is already the sole definition.
      args:
        target:
          - "$.components.schemas.AuthCredentialCreateRequest.properties"
          - "$.components.schemas.AuthCredentialVerifyRequest.properties"
        keys: [ "type" ]
    # ── Remove $ref to AuthCredentialVerifyRequest from verify variants ──
    - command: remove
      reason: >-
        Remove allOf $ref to AuthCredentialVerifyRequest from verify variants
        because the base schema becomes an empty object after stripping the
        type discriminator (no other shared fields on verify)
      args:
        target:
          - "$.components.schemas.EmailOtpCredentialVerifyRequest.allOf[0]"
          - "$.components.schemas.OauthCredentialVerifyRequest.allOf[0]"
          - "$.components.schemas.PasskeyCredentialVerifyRequest.allOf[0]"
        keys: [ "$ref" ]

    # ── type: remove from BaseWebhook ──
    - command: remove
      reason: >-
        Remove the wide WebhookType $ref from BaseWebhook so the inline
        single-value enums on each child webhook (e.g. CardStateChangeWebhook,
        CardFundingSourceChangeWebhook) become the sole definition. Without
        this, every generated *WebhookEvent has the full WebhookType enum on
        its `type` field, so the UnwrapWebhookEvent deserializer can't
        discriminate between variants that share a `data` shape (Card) and
        picks the first one declared.

        Only `properties.type` is stripped — `keys` requires an object target,
        and `required` is an array. Leaving `type` in `BaseWebhook.required` is
        harmless: each child webhook re-declares `type` via its own inline enum,
        and the standalone-base `Schema/RequiredPropertyNotDefined` diagnostic is
        ignored below.
      args:
        target:
          - "$.components.schemas.BaseWebhook.properties"
        keys: [ "type" ]

codeflow:
  detect_breaking_changes: true
  release_environment: npm
diagnostics:
  ignored:
    Schema/ObjectHasNoProperties:
      - pagination.0.response.data.items
    Schema/EnumHasOneMember: true
    Schema/RequiredPropertyNotDefined: true
    Schema/IsAmbiguous: true
    Schema/IntersectionInlineEntriesIgnored: true
