post:
  summary: Card transaction updated
  description: >
    Webhook that is called on every reconcile event against a card
    transaction — authorization, clearing, refund, and lifecycle status
    transitions. Status values follow the Grid `CardTransactionStatus` enum
    (`AUTHORIZED | PARTIALLY_SETTLED | SETTLED | REFUNDED | EXCEPTION`); the
    issuer's raw event type is not surfaced.


    This endpoint should be implemented by clients of the Grid API.


    ### Authentication


    The webhook includes a signature in the `X-Grid-Signature` header that
    allows you to verify that the webhook was sent by Grid.

    To verify the signature:

    1. Get the Grid public key provided to you during integration

    2. Decode the base64 signature from the header

    3. Create a SHA-256 hash of the request body

    4. Verify the signature using the public key and the hash


    If the signature verification succeeds, the webhook is authentic. If not, it
    should be rejected.
  operationId: cardTransactionUpdatedWebhook
  tags:
    - Webhooks
  security:
    - WebhookSignature: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/webhooks/CardTransactionUpdatedWebhook.yaml
        examples:
          authorized:
            summary: Card transaction newly authorized
            value:
              id: Webhook:019542f5-b3e7-1d02-0000-000000000040
              type: CARD_TRANSACTION.UPDATED
              timestamp: '2026-05-08T14:30:00Z'
              data:
                id: CardTransaction:019542f5-b3e7-1d02-0000-000000000100
                cardId: Card:019542f5-b3e7-1d02-0000-000000000010
                issuerTransactionToken: lithic_txn_b81c2a4f
                status: AUTHORIZED
                merchant:
                  descriptor: BLUE BOTTLE COFFEE SF
                  mcc: '5814'
                  country: US
                authorizedAmount:
                  amount: 1250
                  currency:
                    code: USD
                accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
                pullSummary:
                  count: 1
                  totalAmount: 1250
                  pendingCount: 0
                refundSummary:
                  count: 0
                  totalAmount: 0
                settlementSummary:
                  count: 0
                  totalAmount: 0
                authorizedAt: '2026-05-08T14:30:00Z'
                createdAt: '2026-05-08T14:30:00Z'
                updatedAt: '2026-05-08T14:30:00Z'
          settledOverAuth:
            summary: Settlement larger than auth — tip / over-auth post-hoc pull
            value:
              id: Webhook:019542f5-b3e7-1d02-0000-000000000041
              type: CARD_TRANSACTION.UPDATED
              timestamp: '2026-05-08T15:42:11Z'
              data:
                id: CardTransaction:019542f5-b3e7-1d02-0000-000000000100
                cardId: Card:019542f5-b3e7-1d02-0000-000000000010
                issuerTransactionToken: lithic_txn_b81c2a4f
                status: SETTLED
                merchant:
                  descriptor: BLUE BOTTLE COFFEE SF
                  mcc: '5814'
                  country: US
                authorizedAmount:
                  amount: 1250
                  currency:
                    code: USD
                settledAmount:
                  amount: 1500
                  currency:
                    code: USD
                refundedAmount:
                  amount: 0
                  currency:
                    code: USD
                accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
                pullSummary:
                  count: 2
                  totalAmount: 1500
                  pendingCount: 0
                refundSummary:
                  count: 0
                  totalAmount: 0
                settlementSummary:
                  count: 1
                  totalAmount: 1500
                authorizedAt: '2026-05-08T14:30:00Z'
                lastEventAt: '2026-05-08T15:42:11Z'
                createdAt: '2026-05-08T14:30:00Z'
                updatedAt: '2026-05-08T15:42:11Z'
          exception:
            summary: Settled to network but funding pull failed — high-urgency alert
            value:
              id: Webhook:019542f5-b3e7-1d02-0000-000000000042
              type: CARD_TRANSACTION.UPDATED
              timestamp: '2026-05-08T15:50:00Z'
              data:
                id: CardTransaction:019542f5-b3e7-1d02-0000-000000000101
                cardId: Card:019542f5-b3e7-1d02-0000-000000000010
                issuerTransactionToken: lithic_txn_c92d3b5e
                status: EXCEPTION
                merchant:
                  descriptor: AMAZON RETAIL US
                  mcc: '5942'
                  country: US
                authorizedAmount:
                  amount: 5000
                  currency:
                    code: USD
                settledAmount:
                  amount: 5000
                  currency:
                    code: USD
                refundedAmount:
                  amount: 0
                  currency:
                    code: USD
                accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
                pullSummary:
                  count: 1
                  totalAmount: 0
                  pendingCount: 0
                refundSummary:
                  count: 0
                  totalAmount: 0
                settlementSummary:
                  count: 1
                  totalAmount: 5000
                authorizedAt: '2026-05-08T15:30:00Z'
                lastEventAt: '2026-05-08T15:50:00Z'
                createdAt: '2026-05-08T15:30:00Z'
                updatedAt: '2026-05-08T15:50:00Z'
  responses:
    '200':
      description: >
        Webhook received successfully
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../components/schemas/errors/Error400.yaml
    '401':
      description: Unauthorized - Signature validation failed
      content:
        application/json:
          schema:
            $ref: ../components/schemas/errors/Error401.yaml
    '409':
      description: Conflict - Webhook has already been processed (duplicate id)
      content:
        application/json:
          schema:
            $ref: ../components/schemas/errors/Error409.yaml
