post:
  summary: Customer status change
  description: >
    Webhook that is called when the status of a customer is updated, including KYC and KYB status changes.

    This endpoint should be implemented by clients of the Grid API.


    ### Authentication

    The webhook includes a signature in the `X-Grid-Signature` header that
    allows you to verify that the webhook was sent by Grid.

    To verify the signature:

    1. Get the Grid API public key provided to you during integration

    2. Decode the base64 signature from the header

    3. Create a SHA-256 hash of the request body

    4. Verify the signature using the public key and the hash


    If the signature verification succeeds, the webhook is authentic. If not, it
    should be rejected.

  operationId: customerStatusWebhook
  tags:
    - Webhooks
  security:
    - WebhookSignature: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/webhooks/CustomerWebhook.yaml
        examples:
          kycApprovedWebhook:
            summary: When an individual customer KYC has been approved
            value:
              id: Webhook:019542f5-b3e7-1d02-0000-000000000007
              type: CUSTOMER.KYC_APPROVED
              timestamp: '2025-08-15T14:32:00Z'
              data:
                id: Customer:019542f5-b3e7-1d02-0000-000000000001
                platformCustomerId: 9f84e0c2a72c4fa
                customerType: INDIVIDUAL
                region: US
                currencies:
                  - USD
                  - USDC
                umaAddress: $john.doe@uma.domain.com
                kycStatus: APPROVED
                fullName: John Michael Doe
                birthDate: '1990-01-15'
                nationality: US
                address:
                  line1: 123 Main Street
                  line2: Apt 4B
                  city: San Francisco
                  state: CA
                  postalCode: '94105'
                  country: US
                createdAt: '2025-07-21T17:32:28Z'
                updatedAt: '2025-07-21T17:32:28Z'
                isDeleted: false
          kycRejectedWebhook:
            summary: When an individual customer KYC has been rejected
            value:
              id: Webhook:019542f5-b3e7-1d02-0000-000000000008
              type: CUSTOMER.KYC_REJECTED
              timestamp: '2025-08-15T14:32:00Z'
              data:
                id: Customer:019542f5-b3e7-1d02-0000-000000000002
                platformCustomerId: 4b7c1e9d3f5a8e2
                customerType: INDIVIDUAL
                region: US
                currencies:
                  - USD
                  - USDC
                umaAddress: $jane.smith@uma.domain.com
                kycStatus: REJECTED
                fullName: Jane Smith
                birthDate: '1988-03-22'
                nationality: US
                createdAt: '2025-07-21T17:32:28Z'
                updatedAt: '2025-08-15T14:32:00Z'
                isDeleted: false
          kybApprovedWebhook:
            summary: When a business customer KYB has been approved
            value:
              id: Webhook:019542f5-b3e7-1d02-0000-000000000009
              type: CUSTOMER.KYB_APPROVED
              timestamp: '2025-08-15T14:32:00Z'
              data:
                id: Customer:019542f5-b3e7-1d02-0000-000000000003
                platformCustomerId: 7a2f9d4e1b8c3f5
                customerType: BUSINESS
                region: US
                currencies:
                  - USD
                  - USDC
                umaAddress: $acme.corp@uma.domain.com
                kybStatus: APPROVED
                address:
                  line1: 456 Business Ave
                  city: New York
                  state: NY
                  postalCode: '10001'
                  country: US
                businessInfo:
                  legalName: Acme Corporation
                  registrationNumber: '12345678'
                  taxId: '98-7654321'
                createdAt: '2025-07-21T17:32:28Z'
                updatedAt: '2025-08-15T14:32:00Z'
                isDeleted: false
          kybRejectedWebhook:
            summary: When a business customer KYB has been rejected
            value:
              id: Webhook:019542f5-b3e7-1d02-0000-000000000010
              type: CUSTOMER.KYB_REJECTED
              timestamp: '2025-08-15T14:32:00Z'
              data:
                id: Customer:019542f5-b3e7-1d02-0000-000000000004
                platformCustomerId: 3c8e5f2a9d1b7e4
                customerType: BUSINESS
                region: US
                currencies:
                  - USD
                umaAddress: $globex.inc@uma.domain.com
                kybStatus: REJECTED
                address:
                  line1: 789 Corporate Blvd
                  city: Chicago
                  state: IL
                  postalCode: '60601'
                  country: US
                businessInfo:
                  legalName: Globex Inc
                createdAt: '2025-07-21T17:32:28Z'
                updatedAt: '2025-08-15T14:32:00Z'
                isDeleted: false
  responses:
    '200':
      description: >
        Webhook received successfully
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../components/schemas/errors/Error400.yaml
    '401':
      description: Unauthorized - Signature validation failed
      content:
        application/json:
          schema:
            $ref: ../components/schemas/errors/Error401.yaml
    '409':
      description: Conflict - Webhook has already been processed (duplicate id)
      content:
        application/json:
          schema:
            $ref: ../components/schemas/errors/Error409.yaml
