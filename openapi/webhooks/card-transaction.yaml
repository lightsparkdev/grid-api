post:
  summary: Card transaction
  description: >
    Webhook that is called on every state transition of a card
    `CardTransaction`. Fires when an authorization is approved
    (`CARD_TRANSACTION.AUTHORIZED`), as clearings settle against it
    (`CARD_TRANSACTION.PARTIALLY_SETTLED`, `CARD_TRANSACTION.SETTLED`),
    when settled funds are returned (`CARD_TRANSACTION.REFUNDED`), and
    when a pull or confirmation fails (`CARD_TRANSACTION.EXCEPTION`).
    The payload carries the full `CardTransaction` resource.


    This endpoint should be implemented by clients of the Grid API.


    ### Authentication


    The webhook includes a signature in the `X-Grid-Signature` header that
    allows you to verify that the webhook was sent by Grid.

    To verify the signature:

    1. Get the Grid public key provided to you during integration

    2. Decode the base64 signature from the header

    3. Create a SHA-256 hash of the request body

    4. Verify the signature using the public key and the hash


    If the signature verification succeeds, the webhook is authentic. If not, it
    should be rejected.
  operationId: cardTransactionWebhook
  tags:
    - Webhooks
  security:
    - WebhookSignature: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/webhooks/CardTransactionWebhook.yaml
        examples:
