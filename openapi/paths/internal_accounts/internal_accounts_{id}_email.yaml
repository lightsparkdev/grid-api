patch:
  summary: Update internal account email
  description: >
    Update the email address used for the `EMAIL_OTP` authentication
    credential on an Embedded Wallet internal account.


    This is a two-step signed-retry flow:


    1. Call `PATCH /internal-accounts/{id}/email` with the request body
    `{ "email": "new.email@example.com" }` and no signature headers.
    Grid returns `202` with `payloadToSign`, `requestId`, and
    `expiresAt`.


    2. Use the session API keypair of a verified authentication credential
    on the same internal account to build an API-key stamp over
    `payloadToSign`, then retry with that full stamp as the
    `Grid-Wallet-Signature` header and the `requestId` echoed back as
    the `Request-Id` header. The retry body must carry the same `email`
    submitted in step 1. The signed retry returns `200` with the updated
    email address.
  operationId: updateInternalAccountEmail
  tags:
    - Internal Accounts
  security:
    - BasicAuth: []
  parameters:
    - name: id
      in: path
      description: The id of the internal account whose email address should be updated.
      required: true
      schema:
        type: string
    - name: Grid-Wallet-Signature
      in: header
      required: false
      description: >-
        Full API-key stamp built over the prior `payloadToSign` with
        the session API keypair of a verified authentication credential
        on the target internal account. Required on the signed retry;
        ignored on the initial call.
      schema:
        type: string
      example: eyJwdWJsaWNLZXkiOiIwMmExYjIuLi4iLCJzaWduYXR1cmUiOiIzMDQ1MDIyMTAwLi4uIiwic2NoZW1lIjoiUDI1Nl9FQ0RTQV9TSEEyNTYifQ
    - name: Request-Id
      in: header
      required: false
      description: >-
        The `requestId` returned in a prior `202` response, echoed back
        on the signed retry so the server can correlate it with the
        issued challenge. Required on the signed retry; must be paired
        with `Grid-Wallet-Signature`.
      schema:
        type: string
      example: 7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/internal_accounts/InternalAccountEmailUpdateRequest.yaml
        examples:
          updateEmail:
            summary: Update email request (both steps)
            value:
              email: new.email@example.com
  responses:
    '200':
      description: Signed retry accepted. Returns the updated email address.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/internal_accounts/InternalAccountEmailUpdateResponse.yaml
    '202':
      description: >-
        Challenge issued. The response contains `payloadToSign` plus a
        `requestId`. Build an API-key stamp over `payloadToSign` with
        the session API keypair and echo `requestId` on the retry.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/SignedRequestChallenge.yaml
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: >-
        Unauthorized. Returned when the provided `Grid-Wallet-Signature`
        is missing, malformed, or does not match a pending email update
        challenge for this internal account, when the `Request-Id` does
        not match an unexpired pending challenge, or when the retry's
        `email` does not match the one bound into `payloadToSign` on
        the initial call.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '409':
      description: >-
        Conflict. Returned when the supplied email address is already
        associated with an `EMAIL_OTP` credential on this or another
        internal account.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error409.yaml
    '404':
      description: Internal account not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
