parameters:
  - name: id
    in: path
    description: The id of the internal account to update.
    required: true
    schema:
      type: string
    example: InternalAccount:019542f5-b3e7-1d02-0000-000000000002

patch:
  summary: Update internal account
  description: >
    Update mutable fields on an internal account. Today this supports updating
    the wallet privacy setting for an Embedded Wallet internal account.


    Updating wallet privacy is a two-step signed-retry flow:


    1. Call `PATCH /internal-accounts/{id}` with the request body
    `{ "privateEnabled": true }` and no signature headers. Grid returns
    `202` with `payloadToSign`, `requestId`, and `expiresAt`.


    2. Use the session API keypair of a verified authentication credential
    on the same internal account to build an API-key stamp over
    `payloadToSign`, then retry with that full stamp as the
    `Grid-Wallet-Signature` header and the `requestId` echoed back as
    the `Request-Id` header. The retry body must carry the same update
    fields submitted in step 1. The signed retry returns `200` with the
    updated internal account.
  operationId: updateInternalAccount
  tags:
    - Internal Accounts
  security:
    - BasicAuth: []
  parameters:
    - name: Grid-Wallet-Signature
      in: header
      required: false
      description: >-
        Full API-key stamp built over the prior `payloadToSign` with
        the session API keypair of a verified authentication credential
        on the target internal account. Required on the signed retry;
        ignored on the initial call.
      schema:
        type: string
      example: eyJwdWJsaWNLZXkiOiIwMmExYjIuLi4iLCJzaWduYXR1cmUiOiIzMDQ1MDIyMTAwLi4uIiwic2NoZW1lIjoiUDI1Nl9FQ0RTQV9TSEEyNTYifQ
    - name: Request-Id
      in: header
      required: false
      description: >-
        The `requestId` returned in a prior `202` response, echoed back
        on the signed retry so the server can correlate it with the
        issued challenge. Required on the signed retry; must be paired
        with `Grid-Wallet-Signature`.
      schema:
        type: string
      example: Request:019542f5-b3e7-1d02-0000-000000000010
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/internal_accounts/InternalAccountUpdateRequest.yaml
        examples:
          updateWalletPrivacy:
            summary: Update wallet privacy request (both steps)
            value:
              privateEnabled: true
  responses:
    '200':
      description: Signed retry accepted. Returns the updated internal account.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/customers/InternalAccount.yaml
          examples:
            enabled:
              summary: Wallet privacy enabled
              value:
                id: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
                customerId: Customer:019542f5-b3e7-1d02-0000-000000000001
                type: EMBEDDED_WALLET
                status: ACTIVE
                balance:
                  amount: 12550
                  currency:
                    code: USD
                    name: United States Dollar
                    symbol: $
                    decimals: 2
                fundingPaymentInstructions: []
                privateEnabled: true
                createdAt: '2026-04-08T15:30:00Z'
                updatedAt: '2026-04-08T15:35:02Z'
    '202':
      description: >-
        Challenge issued. The response contains `payloadToSign` (which
        binds the submitted update fields) plus a `requestId`. Build an
        API-key stamp over `payloadToSign` with the session API keypair
        and echo `requestId` on the retry.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/SignedRequestChallenge.yaml
          examples:
            challenge:
              summary: Internal account update challenge
              value:
                payloadToSign: '{"organizationId":"org_2m9F...","parameters":{"encoding":"PAYLOAD_ENCODING_HEXADECIMAL","hashFunction":"HASH_FUNCTION_NO_OP","payload":"9f3b...","signWith":"sp1q..."},"timestampMs":"1775681700000","type":"ACTIVITY_TYPE_SIGN_RAW_PAYLOAD_V2"}'
                requestId: Request:019542f5-b3e7-1d02-0000-000000000010
                expiresAt: '2026-04-08T15:35:00Z'
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: >-
        Unauthorized. Returned when the provided `Grid-Wallet-Signature`
        is missing, malformed, or does not match a pending internal account
        update challenge, when the `Request-Id` does not match an unexpired
        pending challenge, or when the retry body does not match the update
        fields bound into `payloadToSign` on the initial call.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Internal account not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
