post:
  summary: Export internal account wallet credentials
  description: >
    Export the wallet credentials of an Embedded Wallet internal account.
    The returned wallet credentials are HPKE-encrypted to the
    `clientPublicKey` supplied in the request body.


    Export is a two-step signed-retry flow (same pattern as
    add-additional credential, revoke credential, and revoke session):


    1. Call `POST /internal-accounts/{id}/export` with the request body
    `{ "clientPublicKey": "..." }` and no signature headers. Grid binds
    the `clientPublicKey` into the `payloadToSign` it returns, so the
    subsequent stamp in `Grid-Wallet-Signature` commits to the target
    encryption key. The response is `202` with `payloadToSign`,
    `requestId`, and `expiresAt`.


    2. Use the session API keypair of a verified authentication credential
    on the same internal account to build an API-key stamp over
    `payloadToSign`, then retry with that full stamp as the
    `Grid-Wallet-Signature` header and the `requestId` echoed back as
    the `Request-Id` header. The retry body must carry the **same**
    `clientPublicKey` submitted in
    step 1 â€” Grid rejects the retry with `401` if it disagrees with
    what was bound into `payloadToSign`. The signed retry returns
    `200` with `encryptedWalletCredentials`, which the client decrypts
    with the matching private key.


    The `clientPublicKey` is ephemeral: generate a fresh P-256 keypair
    for this export and discard the private key after decrypting. Do
    not reuse the keypair from any prior verify call â€” that private
    key was already discarded after decrypting the session signing
    key it was issued against.
  operationId: exportInternalAccount
  tags:
    - Internal Accounts
  security:
    - BasicAuth: []
  parameters:
    - name: id
      in: path
      description: The id of the internal account to export.
      required: true
      schema:
        type: string
    - name: Grid-Wallet-Signature
      in: header
      required: false
      description: >-
        Full API-key stamp built over the prior `payloadToSign` with
        the session API keypair of a verified authentication credential
        on the target internal account. Required on the signed retry;
        ignored on the initial call.
      schema:
        type: string
      example: eyJwdWJsaWNLZXkiOiIwMmExYjIuLi4iLCJzaWduYXR1cmUiOiIzMDQ1MDIyMTAwLi4uIiwic2NoZW1lIjoiUDI1Nl9FQ0RTQV9TSEEyNTYifQ
    - name: Request-Id
      in: header
      required: false
      description: >-
        The `requestId` returned in a prior `202` response, echoed back
        on the signed retry so the server can correlate it with the
        issued challenge. Required on the signed retry; must be paired
        with `Grid-Wallet-Signature`.
      schema:
        type: string
      example: 7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/internal_accounts/InternalAccountExportRequest.yaml
        examples:
          export:
            summary: Export request (both steps)
            value:
              clientPublicKey: 04f45f2a22c908b9ce09a7150e514afd24627c401c38a4afc164e1ea783adaaa31d4245acfb88c2ebd42b47628d63ecabf345484f0a9f665b63c54c897d5578be2
  responses:
    '200':
      description: Signed retry accepted. Returns the encrypted wallet credentials.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/internal_accounts/InternalAccountExportResponse.yaml
    '202':
      description: >-
        Challenge issued. The response contains `payloadToSign` (which
        binds the submitted `clientPublicKey`) plus a `requestId`.
        Build an API-key stamp over `payloadToSign` with the session
        API keypair and echo `requestId` on the retry.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/SignedRequestChallenge.yaml
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: >-
        Unauthorized. Returned when the provided `Grid-Wallet-Signature`
        is missing, malformed, or does not match a pending export
        challenge for this internal account, when the `Request-Id` does
        not match an unexpired pending challenge, or when the retry's
        `clientPublicKey` does not match the one bound into
        `payloadToSign` on the initial call.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Internal account not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
