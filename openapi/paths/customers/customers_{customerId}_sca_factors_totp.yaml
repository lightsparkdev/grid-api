parameters:
  - name: customerId
    in: path
    description: The unique identifier of the customer enrolling a TOTP factor.
    required: true
    schema:
      type: string
    example: Customer:019542f5-b3e7-1d02-0000-000000000001
post:
  summary: Start TOTP factor enrollment
  description: |
    Begin enrolling a time-based one-time-password (TOTP) authenticator factor
    for the customer. Returns the shared secret and an `otpauth://` provisioning
    URI; the customer scans it into an authenticator app and confirms with the
    first code via `POST /customers/{customerId}/sca/factors/totp/confirm`.

    This endpoint is only meaningful for customers whose payment provider
    requires SCA (e.g. EU customers). For customers whose provider has no such
    requirement, this returns `409`.
  operationId: startTotpFactorEnrollment
  tags:
    - Strong Customer Authentication
  security:
    - BasicAuth: []
  responses:
    '200':
      description: TOTP enrollment started; the shared secret is returned.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/sca/TotpEnrollmentStart.yaml
    '400':
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Customer not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '409':
      description: The customer's payment provider does not require SCA.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error409.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
