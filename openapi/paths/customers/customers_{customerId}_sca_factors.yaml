parameters:
  - name: customerId
    in: path
    description: The unique identifier of the customer whose enrolled factors are listed.
    required: true
    schema:
      type: string
    example: Customer:019542f5-b3e7-1d02-0000-000000000001
get:
  summary: List enrolled SCA factors
  description: |
    List the Strong Customer Authentication factors the customer has enrolled.

    This endpoint is only meaningful for customers whose payment provider
    requires SCA (e.g. EU customers). For customers whose provider has no such
    requirement, this returns `409`.
  operationId: listScaFactors
  tags:
    - Strong Customer Authentication
  security:
    - BasicAuth: []
  responses:
    '200':
      description: The customer's enrolled SCA factors.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/sca/ScaFactorList.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Customer not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '409':
      description: The customer's payment provider does not require SCA.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error409.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
