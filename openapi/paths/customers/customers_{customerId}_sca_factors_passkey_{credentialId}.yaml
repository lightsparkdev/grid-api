parameters:
  - name: customerId
    in: path
    description: The unique identifier of the customer whose passkey is being deleted.
    required: true
    schema:
      type: string
    example: Customer:019542f5-b3e7-1d02-0000-000000000001
  - name: credentialId
    in: path
    description: The credential id of the passkey to delete (from the enrolled factor's `credentialId`).
    required: true
    schema:
      type: string
delete:
  summary: Delete an enrolled passkey factor
  description: |
    Delete an enrolled WebAuthn passkey factor by its credential id.

    This endpoint is only meaningful for customers in a region where SCA is required (e.g. EU). For customers outside SCA-regulated regions, this returns `409`.
  operationId: deletePasskeyFactor
  tags:
    - Strong Customer Authentication
  security:
    - BasicAuth: []
  responses:
    '204':
      description: Passkey deleted; no content is returned.
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Customer or passkey not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '409':
      description: SCA is not required for this customer.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error409.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
