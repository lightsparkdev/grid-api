parameters:
  - name: customerId
    in: path
    description: System-generated unique customer identifier
    required: true
    schema:
      type: string
get:
  summary: Get customer by ID
  description: Retrieve a customer by their system-generated ID
  operationId: getCustomerById
  tags:
    - Customers
  security:
    - BasicAuth: []
  responses:
    '200':
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/customers/CustomerOneOf.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Customer not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
patch:
  summary: Update customer by ID
  description: >
    Update a customer's metadata by their system-generated ID.


    Most customer updates complete synchronously and return `200` with the
    updated customer. If the request changes `email` for a customer that has
    one or more tied Embedded Wallet internal accounts with `EMAIL_OTP`
    credentials, or changes `phoneNumber` for a customer that has one or more
    tied Embedded Wallet internal accounts with `SMS_OTP` credentials, the
    contact update uses the two-step signed-retry flow so the customer's wallet
    session authorizes the authentication credential update. On the signed
    retry, Grid updates the customer contact field and every tied matching OTP
    credential across all tied Embedded Wallets as one logical operation. If
    any tied credential cannot be updated, the customer contact field is not
    changed.


    Update `email` and `phoneNumber` in separate PATCH calls. A request that
    includes both fields is rejected.


    For an Embedded Wallet email or SMS auth phone update:


    1. Call `PATCH /customers/{customerId}` with the full update body and no
    signature headers. Grid returns `202` with `payloadToSign`, `requestId`,
    and `expiresAt`. The pending challenge binds the submitted update fields
    and the set of tied Embedded Wallet OTP credentials that must be updated.


    2. Use the session API keypair of a verified authentication credential on
    one of the customer's tied Embedded Wallets to build an API-key stamp over
    `payloadToSign`, then retry the same request with that full stamp as the
    `Grid-Wallet-Signature` header and the `requestId` echoed back as the
    `Request-Id` header. The retry body must carry the same update fields
    submitted in step 1. The signed retry returns `200` with the updated
    customer.
  operationId: updateCustomerById
  tags:
    - Customers
  security:
    - BasicAuth: []
  parameters:
    - name: Grid-Wallet-Signature
      in: header
      required: false
      description: >-
        Full API-key stamp built over the prior `payloadToSign` with the
        session API keypair of a verified authentication credential on one of
        the customer's tied Embedded Wallets. Required on the signed retry for
        Embedded Wallet email or SMS auth phone updates; ignored on the initial
        call and on customer updates that complete synchronously.
      schema:
        type: string
      example: eyJwdWJsaWNLZXkiOiIwMmExYjIuLi4iLCJzY2hlbWUiOiJTSUdOQVRVUkVfU0NIRU1FX1RLX0FQSV9QMjU2Iiwic2lnbmF0dXJlIjoiMzA0NTAyMjEwMC4uLiJ9
    - name: Request-Id
      in: header
      required: false
      description: >-
        The `requestId` returned in a prior `202` response, echoed back on the
        signed retry so the server can correlate it with the issued challenge.
        Required on the signed retry for Embedded Wallet email or SMS auth phone
        updates; must be paired with `Grid-Wallet-Signature`.
      schema:
        type: string
      example: Request:019542f5-b3e7-1d02-0000-000000000010
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/customers/CustomerUpdateRequestOneOf.yaml
        examples:
          individualUpdate:
            summary: Update individual customer example
            value:
              customerType: INDIVIDUAL
              fullName: John Smith
              birthDate: '1985-06-15'
              currencies:
                - USD
                - EUR
                - USDC
              address:
                line1: 456 Market St
                city: San Francisco
                state: CA
                postalCode: '94103'
                country: US
          businessUpdate:
            summary: Update business customer example
            value:
              customerType: BUSINESS
              currencies:
                - USD
                - USDC
              businessInfo:
                legalName: New Tech Solutions LLC
                registrationNumber: BRN-987654321
                taxId: EIN-123456789
              address:
                line1: 100 Technology Parkway
                city: Palo Alto
                state: CA
                postalCode: '94304'
                country: US
          embeddedWalletEmailUpdate:
            summary: Embedded Wallet email update request (both steps)
            value:
              customerType: INDIVIDUAL
              email: john.smith@example.com
          embeddedWalletPhoneUpdate:
            summary: Embedded Wallet SMS auth phone update request (both steps)
            value:
              customerType: INDIVIDUAL
              phoneNumber: '+14155559876'
          combinedContactUpdateRejected:
            summary: Combined email and phone update request (rejected)
            value:
              customerType: INDIVIDUAL
              email: john.smith@example.com
              phoneNumber: '+14155559876'
  responses:
    '200':
      description: >-
        Customer updated successfully. For Embedded Wallet email or SMS auth
        phone updates, this is returned only on the signed retry after the
        customer contact field and all tied matching OTP credentials have been
        updated.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/customers/CustomerOneOf.yaml
    '202':
      description: >-
        Challenge issued for an Embedded Wallet email or SMS auth phone update.
        The response contains `payloadToSign` plus a `requestId`. Build an
        API-key stamp over `payloadToSign` with the session API keypair from a
        verified authentication credential on one of the customer's tied
        Embedded Wallets, then retry the same request with
        `Grid-Wallet-Signature` and `Request-Id`.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/SignedRequestChallenge.yaml
          examples:
            embeddedWalletEmailUpdate:
              summary: Embedded Wallet customer email update challenge
              value:
                payloadToSign: '{"organizationId":"org_2m9F...","parameters":{"userEmail":"john.smith@example.com","userId":"user_2m9F..."},"timestampMs":"1775681700000","type":"ACTIVITY_TYPE_UPDATE_USER_EMAIL"}'
                requestId: Request:019542f5-b3e7-1d02-0000-000000000010
                expiresAt: '2026-04-08T15:35:00Z'
            embeddedWalletPhoneUpdate:
              summary: Embedded Wallet customer SMS auth phone update challenge
              value:
                payloadToSign: '{"organizationId":"org_2m9F...","parameters":{"userId":"user_2m9F...","userPhoneNumber":"+14155559876"},"timestampMs":"1775681700000","type":"ACTIVITY_TYPE_UPDATE_USER_PHONE_NUMBER"}'
                requestId: Request:019542f5-b3e7-1d02-0000-000000000011
                expiresAt: '2026-04-08T15:35:00Z'
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: >-
        Unauthorized. Also returned for Embedded Wallet email or SMS auth phone
        update retries when the provided `Grid-Wallet-Signature` is missing,
        malformed, or does not match the pending customer update challenge,
        when the `Request-Id` does not match an unexpired pending challenge, or
        when the retry body does not match the update fields bound into
        `payloadToSign` on the initial call.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Customer not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '409':
      description: >-
        Conflict. Returned when the supplied email address is already
        associated with an `EMAIL_OTP` credential on this or another internal
        account, or when the tied Embedded Wallet OTP credential set changed
        between the initial `202` challenge and the signed retry.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error409.yaml
    '424':
      description: >-
        Failed dependency. Returned when Grid cannot update one or more tied
        Embedded Wallet OTP credentials. The customer contact field is not
        changed unless all tied credentials are updated successfully.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error424.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
delete:
  summary: Delete customer by ID
  description: Delete a customer by their system-generated ID
  operationId: deleteCustomerById
  tags:
    - Customers
  security:
    - BasicAuth: []
  responses:
    '200':
      description: Customer deleted successfully
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/customers/CustomerOneOf.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Customer not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '410':
      description: Customer deleted already
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error410.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
