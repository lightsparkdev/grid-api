parameters:
  - name: customerId
    in: path
    description: The unique identifier of the customer confirming a TOTP factor.
    required: true
    schema:
      type: string
    example: Customer:019542f5-b3e7-1d02-0000-000000000001
post:
  summary: Confirm TOTP factor enrollment
  description: |
    Finalize TOTP factor enrollment by submitting the shared secret from the
    start call and the first code the customer's authenticator app produces.
    Returns one-time recovery codes shown to the customer only once.

    This endpoint is only meaningful for customers in a region where SCA is required (e.g. EU). For customers outside SCA-regulated regions, this returns `409`.

    In sandbox, the code is always `123456`.
  operationId: confirmTotpFactorEnrollment
  tags:
    - Strong Customer Authentication
  security:
    - BasicAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/sca/TotpEnrollmentConfirmRequest.yaml
  responses:
    '200':
      description: TOTP factor enrolled; recovery codes are returned.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/sca/TotpEnrollmentConfirmResponse.yaml
    '400':
      description: Invalid or incorrect confirmation code
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Customer not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '409':
      description: SCA is not required for this customer.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error409.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
