post:
  summary: Execute a quote
  description: |
    Execute a quote by its ID. This endpoint initiates the transfer between
    the source and destination accounts.

    This endpoint can only be used for quotes with a `source` which is either an internal account,
    or has direct pull functionality (e.g. ACH pull with an external account).

    When the quote's `source` is an internal account of type `EMBEDDED_WALLET`,
    the request must include a `Grid-Wallet-Signature` header. The header value
    is the full Turnkey API-key stamp built over the `payloadToSign` value from
    the quote's `paymentInstructions[].accountOrWalletInfo` entry with the
    session private key of a verified authentication credential on the source
    Embedded Wallet.

    Once executed, the quote cannot be cancelled and the transfer will be processed.
  operationId: executeQuote
  tags:
    - Cross-Currency Transfers
  security:
    - BasicAuth: []
  parameters:
    - name: quoteId
      in: path
      required: true
      description: The unique identifier of the quote to execute
      schema:
        type: string
      example: Quote:019542f5-b3e7-1d02-0000-000000000001
    - name: Idempotency-Key
      in: header
      required: false
      description: >
        A unique identifier for the request. If the same key is sent multiple times,
        the server will return the same response as the first request.
      schema:
        type: string
        example: <uuid>
    - name: Grid-Wallet-Signature
      in: header
      required: false
      description: >-
        Full Turnkey API-key stamp over the `payloadToSign` returned in the
        quote's `paymentInstructions[].accountOrWalletInfo` entry, produced
        with the session private key of a verified authentication credential on
        the source Embedded Wallet. Required when the quote's source is an
        internal account of type `EMBEDDED_WALLET`; ignored for other source
        types.
      schema:
        type: string
      example: eyJwdWJsaWNLZXkiOiIwMmExYjIuLi4iLCJzY2hlbWUiOiJTSUdOQVRVUkVfU0NIRU1FX1RLX0FQSV9QMjU2Iiwic2lnbmF0dXJlIjoiMzA0NTAyMjEwMC4uLiJ9
  requestBody:
    required: false
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/quotes/ExecuteQuoteRequest.yaml
  responses:
    '200':
      description: >
        Quote confirmed successfully. The transfer has been initiated and the
        quote status has been updated.


        For customers whose provider requires Strong Customer Authentication
        (e.g. EU): supplying `scaAuthorization` **upfront on this call** satisfies
        the challenge in one shot and avoids the pending state. Without it, the
        quote comes back with status `PENDING_AUTHORIZATION` and an
        `scaChallenge`; from that point the **only** way to release the transfer
        is `POST /transactions/{transactionId}/authorize` for the quote's
        `transactionId` (re-calling `execute` returns 409). The inline
        `scaAuthorization` field is therefore for the initial call only.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/quotes/Quote.yaml
    '400':
      description: Bad request - Invalid quote ID or quote cannot be confirmed
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: >-
        Unauthorized. Also returned when the quote's source is an internal
        account of type `EMBEDDED_WALLET` and the provided
        `Grid-Wallet-Signature` header is missing, malformed, or does not
        match the quote's `payloadToSign`.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Quote not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '409':
      description: Conflict - Quote already confirmed, expired, or in invalid state
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error409.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
