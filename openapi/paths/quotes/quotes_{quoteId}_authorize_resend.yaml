parameters:
  - name: quoteId
    in: path
    description: The unique identifier of the quote whose SCA challenge code should be re-sent.
    required: true
    schema:
      type: string
    example: Quote:019542f5-b3e7-1d02-0000-000000000006
post:
  summary: Resend a quote's SCA challenge code
  description: |
    Re-send the one-time code for a realtime-funding quote in
    `PENDING_AUTHORIZATION` status whose `scaChallenge.factor` is `SMS_OTP`. The
    existing challenge is reused — no new challenge is issued, and its
    `scaChallenge.expiresAt` is **not** extended; once the challenge is past
    `expiresAt` it can no longer be authorized.

    Only meaningful for customers in a region where SCA is required (e.g. EU);
    a 409 is returned otherwise. `PASSKEY` challenges cannot be re-sent and return 409.

    In sandbox, the code is always `123456`.
  operationId: resendQuoteScaCode
  tags:
    - Strong Customer Authentication
  security:
    - BasicAuth: []
  responses:
    '204':
      description: Code re-sent.
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Quote not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '409':
      description: >-
        SCA is not required for this customer, the quote has no pending
        SMS challenge, or the challenge uses a factor whose code cannot be
        re-sent (e.g. passkey).
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error409.yaml
    '429':
      description: >-
        Too many requests. Returned with `RATE_LIMITED` when codes are re-sent
        too frequently, to avoid spamming the customer's phone. Clients should
        back off and retry after the interval indicated by the `Retry-After`
        response header.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error429.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
