post:
  summary: Issue a session reauthentication challenge
  description: >
    Start mid-session reauthentication for an active Embedded Wallet auth
    session.


    Use this endpoint when a session is still active but close to expiry and
    the customer wants to extend access without re-running the underlying
    credential-specific authentication flow. Grid builds a Turnkey
    create-read-write-session payload, binds the supplied `clientPublicKey` into
    that payload, persists it as a pending request, and returns the canonical
    body as `payloadToSign`.


    The client signs `payloadToSign` with the current session signing key, then
    calls `POST /auth/sessions/{id}/verify` with `Grid-Wallet-Signature`,
    `Request-Id`, and the same `clientPublicKey`. If the original session has
    already expired, use the credential reauthentication flow instead.
  operationId: challengeAuthSession
  tags:
    - Embedded Wallet Auth
  security:
    - BasicAuth: []
  parameters:
    - name: id
      in: path
      description: The id of the active session to reauthenticate.
      required: true
      schema:
        type: string
      example: Session:019542f5-b3e7-1d02-0000-000000000003
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/auth/AuthSessionReauthRequest.yaml
        examples:
          reauth:
            summary: Start mid-session reauthentication
            value:
              clientPublicKey: 04f45f2a22c908b9ce09a7150e514afd24627c401c38a4afc164e1ea783adaaa31d4245acfb88c2ebd42b47628d63ecabf345484f0a9f665b63c54c897d5578be2
  responses:
    '202':
      description: >-
        Challenge issued. The response contains `payloadToSign` plus a
        `requestId`. Build an API-key stamp over `payloadToSign` with the
        current session API keypair, then echo `requestId` on
        `POST /auth/sessions/{id}/verify`.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/SignedRequestChallenge.yaml
          examples:
            challenge:
              summary: Session reauthentication challenge
              value:
                payloadToSign: '{"type":"ACTIVITY_TYPE_CREATE_READ_WRITE_SESSION_V2","timestampMs":"1746736509954","organizationId":"org_abc123","parameters":{"targetPublicKey":"04f45f2a22c908b9ce09a7150e514afd24627c401c38a4afc164e1ea783adaaa31d4245acfb88c2ebd42b47628d63ecabf345484f0a9f665b63c54c897d5578be2"}}'
                requestId: Request:019542f5-b3e7-1d02-0000-000000000010
                expiresAt: '2026-04-08T15:35:00Z'
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: >-
        Unauthorized. Returned when the `BasicAuth` credentials are missing or
        invalid, or when the target session is no longer active and cannot be
        used for mid-session reauthentication.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Session not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
