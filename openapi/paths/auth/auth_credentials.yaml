post:
  summary: Create an authentication credential
  description: >
    Register an authentication credential for an Embedded Wallet customer.


    **First credential on an internal account**


    If the target internal account does not yet have any authentication
    credential registered, call this endpoint with the credential details.
    The response is `201` with the created `AuthMethod`. For `EMAIL_OTP`
    credentials, this call also triggers a one-time password email to the
    address on the customer record tied to the internal account; the
    credential must be activated via `POST /auth/credentials/{id}/verify`
    before it can sign requests. For `OAUTH` credentials, the supplied
    `oidcToken` is validated inline against the issuer's `.well-known`
    OpenID configuration (the token's `iat` must be less than 60 seconds
    before the request); activation still happens via
    `POST /auth/credentials/{id}/verify`. For `PASSKEY` credentials, the
    client completes a WebAuthn registration (`navigator.credentials.create()`)
    using a `challenge` issued by the platform backend and submits the
    resulting `attestation` here; the credential must still be activated
    via `POST /auth/credentials/{id}/verify` by completing a WebAuthn
    assertion. Unlike the registration `challenge` (platform-issued), the
    challenge for the first authentication is issued by Grid and returned
    inline on the `201` response alongside the `AuthMethod` fields, plus a
    `requestId` and challenge `expiresAt` (see `PasskeyAuthChallenge`).
    The client uses that Grid-issued `challenge` to produce the assertion
    and submits it with `Request-Id: <requestId>` to
    `POST /auth/credentials/{id}/verify`. On every subsequent
    reauthentication the challenge is re-issued via
    `POST /auth/credentials/{id}/challenge`. Only one `PASSKEY` credential
    is supported per internal account in v1.


    **Adding an additional credential**


    Registering an additional credential against an internal account that
    already has one requires a signature from an existing verified
    credential. Call this endpoint with the new credential's details; if
    an existing credential is already registered on the internal account
    the response is `202` with a `payloadToSign` and a `requestId`.
    Use the session API keypair of an existing verified credential on
    the same internal account (decrypted client-side from its
    `encryptedSessionSigningKey`) to build an API-key stamp over
    `payloadToSign`, then retry the same request with that full stamp
    as the `Grid-Wallet-Signature` header and the `requestId`
    echoed back as the `Request-Id` header. The signed retry returns
    `201` with the created `AuthMethod`. For `EMAIL_OTP`, the OTP email
    is triggered on the signed retry, and the credential must then be
    activated via `POST /auth/credentials/{id}/verify`.
  operationId: createAuthCredential
  tags:
    - Embedded Wallet Auth
  security:
    - BasicAuth: []
  parameters:
    - name: Grid-Wallet-Signature
      in: header
      required: false
      description: >-
        Full API-key stamp built over the prior `payloadToSign` with
        the session API keypair of an existing verified authentication
        credential on the target internal account. Required when
        registering an additional credential on an internal account that
        already has one; ignored when the internal account has no
        existing credentials.
      schema:
        type: string
      example: eyJwdWJsaWNLZXkiOiIuLi4iLCJzaWduYXR1cmUiOiIuLi4iLCJzY2hlbWUiOiJTSUdOQVRVUkVfU0NIRU1FX1RLX0FQSV9QMjU2In0
    - name: Request-Id
      in: header
      required: false
      description: >-
        The `requestId` returned in a prior `202` response, echoed back on
        the signed retry so the server can correlate it with the issued
        challenge. Required on the signed retry when registering an
        additional credential; must be paired with `Grid-Wallet-Signature`.
      schema:
        type: string
      example: 7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/auth/AuthCredentialCreateRequestOneOf.yaml
        examples:
          emailOtp:
            summary: Register an email OTP credential
            value:
              type: EMAIL_OTP
              accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
          oauth:
            summary: Register an OAuth credential
            value:
              type: OAUTH
              accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
              oidcToken: eyJhbGciOiJSUzI1NiIsImtpZCI6ImFiYzEyMyIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJodHRwczovL2FjY291bnRzLmdvb2dsZS5jb20iLCJzdWIiOiIxMTIyMzM0NDU1IiwiYXVkIjoiMTIzNDU2Ny5hcHBzLmdvb2dsZXVzZXJjb250ZW50LmNvbSIsImVtYWlsIjoidXNlckBleGFtcGxlLmNvbSIsImlhdCI6MTc0NjczNjUwOSwiZXhwIjoxNzQ2NzQwMTA5fQ.signature
          passkey:
            summary: Register a passkey credential
            value:
              type: PASSKEY
              accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
              nickname: iPhone Face-ID
              challenge: ArkQi2yAYHPlgnJNFBlneIwchQdWXBOTrdB-AmMUB21Lx
              attestation:
                credentialId: AdKXJEch1aV5Wo7bj7qLHskVY4OoNaj9qu8TPdJ7kSAgUeRxWNngXlcNIGt4gexZGKVGcqZpqqWordXb_he1izY
                clientDataJson: eyJjaGFsbGVuZ2UiOiJBcktRaTJ5QVlIUGxnbkpORkJsbmVJd2NoUWRXWEJPVHJkQi1BbU1VQjIxTHgiLCJjbGllbnRFeHRlbnNpb25zIjp7fSwiaGFzaEFsZ29yaXRobSI6IlNIQS0yNTYiLCJvcmlnaW4iOiJodHRwczovL2Rldi5kb250bmVlZGEucHciLCJ0eXBlIjoid2ViYXV0aG4uY3JlYXRlIn0
                attestationObject: o2NmbXRkbm9uZWdhdHRTdG10oGhhdXRoRGF0YVjFPdxHEOnAiLIp26idVjIguzn3Ipr_RlsKZWsa-5qK-KBFAAAAAAAAAAAAAAAAAAAAAAAAAAAAQQHSlyRHIdWleVqO24-6ix7JFWODqDWo_arvEz3Se5EgIFHkcVjZ4F5XDSBreIHsWRilRnKmaaqlqK3V2_4XtYs2pQECAyYgASFYID5PQTZQQg6haZFQWFzqfAOyQ_ENsMH8xxQ4GRiNPsqrIlggU8IVUOV8qpgk_Jh-OTaLuZL52KdX1fTht07X4DiQPow
                transports:
                  - internal
                  - hybrid
  responses:
    '201':
      description: >-
        Authentication credential created successfully. For `EMAIL_OTP`
        and `OAUTH`, the body is a plain `AuthMethod`. For `PASSKEY`, the
        body is a `PasskeyAuthChallenge` — an `AuthMethod` with the
        Grid-issued `challenge`, `requestId`, and `expiresAt` that drive
        the first authentication assertion.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/auth/AuthCredentialResponseOneOf.yaml
          examples:
            emailOtp:
              summary: Email OTP credential created
              value:
                id: AuthMethod:019542f5-b3e7-1d02-0000-000000000001
                accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
                type: EMAIL_OTP
                nickname: example@lightspark.com
                createdAt: '2026-04-08T15:30:01Z'
                updatedAt: '2026-04-08T15:30:01Z'
            oauth:
              summary: OAuth credential created
              value:
                id: AuthMethod:019542f5-b3e7-1d02-0000-000000000001
                accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
                type: OAUTH
                nickname: example@lightspark.com
                createdAt: '2026-04-08T15:30:01Z'
                updatedAt: '2026-04-08T15:30:01Z'
            passkey:
              summary: Passkey credential created with first-authentication challenge
              value:
                id: AuthMethod:019542f5-b3e7-1d02-0000-000000000001
                accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
                type: PASSKEY
                nickname: iPhone Face-ID
                createdAt: '2026-04-08T15:30:01Z'
                updatedAt: '2026-04-08T15:30:01Z'
                challenge: VjZ6o8KfE9V3q3LkR2nH5eZ6dM8yA1xW
                requestId: 7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
                expiresAt: '2026-04-08T15:35:00Z'
    '202':
      description: >-
        An existing authentication credential is already registered on the
        internal account. The response contains `payloadToSign` plus a
        `requestId`. Build an API-key stamp over `payloadToSign` with
        the session API keypair of an existing verified credential on
        the same internal account, then send that full stamp as
        `Grid-Wallet-Signature` and echo `requestId` as `Request-Id`
        on the retry.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/auth/AuthSignedRequestChallenge.yaml
          examples:
            emailOtp:
              summary: Additional email OTP credential challenge
              value:
                type: EMAIL_OTP
                payloadToSign: '{"requestId":"7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21","type":"EMAIL_OTP","accountId":"InternalAccount:01HF3Z4QWERTY","expiresAt":"2026-04-08T15:35:00Z"}'
                requestId: 7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
                expiresAt: '2026-04-08T15:35:00Z'
            oauth:
              summary: Additional OAuth credential challenge
              value:
                type: OAUTH
                payloadToSign: Y2hhbGxlbmdlLXBheWxvYWQtdG8tc2lnbg==
                requestId: 7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
                expiresAt: '2026-04-08T15:35:00Z'
            passkey:
              summary: Additional passkey credential challenge
              value:
                type: PASSKEY
                payloadToSign: Y2hhbGxlbmdlLXBheWxvYWQtdG8tc2lnbg==
                requestId: 7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
                expiresAt: '2026-04-08T15:35:00Z'
    '400':
      description: >-
        Bad request. Returned with `EMAIL_OTP_CREDENTIAL_ALREADY_EXISTS`
        when registering an `EMAIL_OTP` credential on an internal account
        that already has one — only one email OTP credential is supported
        per internal account at this time. Returned with
        `PASSKEY_CREDENTIAL_ALREADY_EXISTS` when registering a `PASSKEY`
        credential on an internal account that already has one — only one
        passkey credential is supported per internal account in v1.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: >-
        Unauthorized. Returned when the provided `Grid-Wallet-Signature`
        is missing, malformed, or does not match a pending challenge for
        an additional credential on the target internal account, or when
        the `Request-Id` does not match an unexpired pending challenge.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Internal account not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
get:
  summary: List authentication credentials
  description: >-
    Retrieve all authentication credentials registered on an Embedded
    Wallet internal account.


    The response is not paginated: an internal account is expected to
    have a small, bounded number of credentials (typically 1–5), so all
    results are returned inline. Additional per-credential detail (such
    as active session expiry) is available on `GET /auth/sessions`.
  operationId: listAuthCredentials
  tags:
    - Embedded Wallet Auth
  security:
    - BasicAuth: []
  parameters:
    - name: accountId
      in: query
      description: Internal account id whose authentication credentials to list.
      required: true
      schema:
        type: string
      example: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
  responses:
    '200':
      description: >-
        Authentication credentials registered on the internal account.
        Returns an empty `data` array when the internal account has no
        credentials or when `accountId` does not match any internal
        account visible to the caller.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/auth/AuthCredentialListResponse.yaml
          examples:
            multipleCredentials:
              summary: Internal account with an email OTP and a passkey credential
              value:
                data:
                  - id: AuthMethod:019542f5-b3e7-1d02-0000-000000000001
                    accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
                    type: EMAIL_OTP
                    nickname: example@lightspark.com
                    createdAt: '2026-04-08T15:30:01Z'
                    updatedAt: '2026-04-08T15:30:01Z'
                  - id: AuthMethod:019542f5-b3e7-1d02-0000-000000000003
                    accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
                    type: PASSKEY
                    nickname: iPhone Face-ID
                    createdAt: '2026-04-09T10:15:00Z'
                    updatedAt: '2026-04-09T10:15:00Z'
            empty:
              summary: No credentials registered on the account
              value:
                data: []
    '400':
      description: >-
        Bad request. Returned with `INVALID_INPUT` when the `accountId`
        query parameter is missing or not a valid `InternalAccount:<uuid>`
        identifier.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
