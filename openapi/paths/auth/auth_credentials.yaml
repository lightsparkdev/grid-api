post:
  summary: Create an authentication credential
  description: >
    Register an authentication credential for an Embedded Wallet customer.


    **First credential on an internal account**


    If the target internal account does not yet have any authentication
    credential registered, call this endpoint with the credential details.
    The response is `201` with the created `AuthMethod`. For `EMAIL_OTP`
    credentials, this call also triggers a one-time password email to the
    address on the customer record tied to the internal account; the
    credential must be activated via `POST /auth/credentials/{id}/verify`
    before it can sign requests.


    **Adding an additional credential**


    Registering an additional credential against an internal account that
    already has one requires a signature from an existing verified
    credential. Call this endpoint with the new credential's details; if
    an existing credential is already registered on the internal account
    the response is `202` with a `payloadToSign` and a `requestId`. Sign
    the payload with the session private key of an existing verified
    credential on the same internal account (decrypted client-side from
    its `encryptedSessionSigningKey`) and retry the same request with the
    signature supplied as the `Grid-Wallet-Signature` header and the
    `requestId` echoed back as the `Request-Id` header. The signed retry
    returns `201` with the created `AuthMethod`. For `EMAIL_OTP`, the OTP
    email is triggered on the signed retry, and the credential must then
    be activated via `POST /auth/credentials/{id}/verify`.
  operationId: createAuthCredential
  tags:
    - Embedded Wallet Auth
  security:
    - BasicAuth: []
  parameters:
    - name: Grid-Wallet-Signature
      in: header
      required: false
      description: >-
        Signature over the `payloadToSign` returned in a prior `202`
        response, produced with the session private key of an existing
        verified authentication credential on the target internal account
        and base64-encoded. Required when registering an additional
        credential on an internal account that already has one; ignored
        when the internal account has no existing credentials.
      schema:
        type: string
      example: MEUCIQDx7k2N0aK4p8f3vR9J6yT5wL1mB0sXnG2hQ4vJ8zYkCgIgZ4rP9dT7eWfU3oM6KjR1qSpNvBwL0tXyA2iG8fH5dE=
    - name: Request-Id
      in: header
      required: false
      description: >-
        The `requestId` returned in a prior `202` response, echoed back on
        the signed retry so the server can correlate it with the issued
        challenge. Required on the signed retry when registering an
        additional credential; must be paired with `Grid-Wallet-Signature`.
      schema:
        type: string
      example: 7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/auth/AuthCredentialCreateRequestOneOf.yaml
        examples:
          emailOtp:
            summary: Register an email OTP credential
            value:
              type: EMAIL_OTP
              accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
  responses:
    '201':
      description: Authentication credential created successfully
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/auth/AuthMethod.yaml
    '202':
      description: >-
        An existing authentication credential is already registered on the
        internal account. The response contains a `payloadToSign` that must
        be signed with the session private key of an existing verified
        credential on the same internal account, along with a `requestId`
        that must be echoed back on the retry. The signature is passed as
        the `Grid-Wallet-Signature` header and the `requestId` as the
        `Request-Id` header on a retry of this request to complete
        registration.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/auth/AuthCredentialAdditionalChallengeOneOf.yaml
          examples:
            emailOtp:
              summary: Additional email OTP credential challenge
              value:
                type: EMAIL_OTP
                email: example@lightspark.com
                payloadToSign: '{"requestId":"7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21","type":"EMAIL_OTP","accountId":"InternalAccount:01HF3Z4QWERTY","expiresAt":"2026-04-08T15:35:00Z"}'
                requestId: 7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
                expiresAt: '2026-04-08T15:35:00Z'
    '400':
      description: >-
        Bad request. Returned with `EMAIL_OTP_CREDENTIAL_ALREADY_EXISTS` when
        registering an `EMAIL_OTP` credential on an internal account that
        already has one â€” only one email OTP credential is supported per
        internal account at this time.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: >-
        Unauthorized. Returned when the provided `Grid-Wallet-Signature`
        is missing, malformed, or does not match a pending challenge for
        an additional credential on the target internal account, or when
        the `Request-Id` does not match an unexpired pending challenge.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Internal account not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
