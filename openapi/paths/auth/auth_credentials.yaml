post:
  summary: Create an authentication credential
  description: >
    Register an authentication credential for an Embedded Wallet customer.


    Embedded Wallet internal accounts are initialized with an `EMAIL_OTP`
    credential tied to the customer email on the account. Use this endpoint
    to add another credential (`SMS_OTP`, `OAUTH`, or `PASSKEY`), or to add
    `EMAIL_OTP` / `SMS_OTP` back after it has been removed. Only one
    `EMAIL_OTP` and one `SMS_OTP` credential are supported per internal
    account; multiple distinct `PASSKEY` credentials may be registered.


    Adding a credential requires a signature from an existing verified
    credential on the same account. Call this endpoint with the new
    credential's details to receive `202` with `payloadToSign` and
    `requestId`. Use the session API keypair of an existing verified
    credential (decrypted client-side from its
    `encryptedSessionSigningKey`) to build an API-key stamp over
    `payloadToSign`, then retry the same request with that full stamp
    as the `Grid-Wallet-Signature` header and the `requestId`
    echoed back as the `Request-Id` header. The signed retry returns
    `201` with the created `AuthMethod`. For OTP credentials, the one-time
    password is triggered on the signed retry, and the credential must then be
    activated via `POST /auth/credentials/{id}/verify`.
  operationId: createAuthCredential
  tags:
    - Embedded Wallet Auth
  security:
    - BasicAuth: []
  parameters:
    - name: Grid-Wallet-Signature
      in: header
      required: false
      description: >-
        Full API-key stamp built over the prior `payloadToSign` with
        the session API keypair of an existing verified authentication
        credential on the target internal account. Required on the
        signed retry.
      schema:
        type: string
      example: eyJwdWJsaWNLZXkiOiIwMmExYjIuLi4iLCJzY2hlbWUiOiJTSUdOQVRVUkVfU0NIRU1FX1RLX0FQSV9QMjU2Iiwic2lnbmF0dXJlIjoiMzA0NTAyMjEwMC4uLiJ9
    - name: Request-Id
      in: header
      required: false
      description: >-
        The `requestId` returned in a prior `202` response, echoed back
        exactly on the signed retry so the server can correlate it with
        the issued challenge. Required on the signed retry when registering
        a credential; must be paired with `Grid-Wallet-Signature`.
      schema:
        type: string
      example: Request:7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/auth/AuthCredentialCreateRequestOneOf.yaml
        examples:
          emailOtp:
            summary: Add an email OTP credential
            value:
              type: EMAIL_OTP
              accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
          smsOtp:
            summary: Add an SMS OTP credential
            value:
              type: SMS_OTP
              accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
          oauth:
            summary: Add an OAuth credential
            value:
              type: OAUTH
              accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
              oidcToken: eyJhbGciOiJSUzI1NiIsImtpZCI6ImFiYzEyMyIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJodHRwczovL2FjY291bnRzLmdvb2dsZS5jb20iLCJzdWIiOiIxMTIyMzM0NDU1IiwiYXVkIjoiMTIzNDU2Ny5hcHBzLmdvb2dsZXVzZXJjb250ZW50LmNvbSIsImVtYWlsIjoidXNlckBleGFtcGxlLmNvbSIsImlhdCI6MTc0NjczNjUwOSwiZXhwIjoxNzQ2NzQwMTA5fQ.-3_ETmSGOl4wGNLR1QSOMlHk5IvADpX3YdHFmTH9KmRu6sEhM20RsURjKrI4-_EKj7J_HtsdS1tCHm0iw2J0qtoczYFQqEW_U9qJD6QsuvTFx8Fj9rFa3ieYhZKi3kkBu6cADogUiudP50kf9345ATys2GrYm-ba5esgReW1WzGJG3SgCyIDnHFfxmeLjE2YE9EFxT73To3mPYAk0ywPL2MpFFV9F8I3PsnbDAxinaY75GeA8vJXATr8weEIXqHD2lxmXVE95qd2ZlcuyLUaEYyp9GXcOnx7SjhdJG88jl5BZQvxOVgBMo42iGjK674lSwsMiHpzLX98j6C786Rd9Q
          passkey:
            summary: Add a passkey credential
            value:
              type: PASSKEY
              accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
              nickname: iPhone Face-ID
              challenge: ArkQi2yAYHPlgnJNFBlneIwchQdWXBOTrdB-AmMUB21Lx
              attestation:
                credentialId: AdKXJEch1aV5Wo7bj7qLHskVY4OoNaj9qu8TPdJ7kSAgUeRxWNngXlcNIGt4gexZGKVGcqZpqqWordXb_he1izY
                clientDataJson: eyJjaGFsbGVuZ2UiOiJBcktRaTJ5QVlIUGxnbkpORkJsbmVJd2NoUWRXWEJPVHJkQi1BbU1VQjIxTHgiLCJjbGllbnRFeHRlbnNpb25zIjp7fSwiaGFzaEFsZ29yaXRobSI6IlNIQS0yNTYiLCJvcmlnaW4iOiJodHRwczovL2Rldi5kb250bmVlZGEucHciLCJ0eXBlIjoid2ViYXV0aG4uY3JlYXRlIn0
                attestationObject: o2NmbXRkbm9uZWdhdHRTdG10oGhhdXRoRGF0YVjFPdxHEOnAiLIp26idVjIguzn3Ipr_RlsKZWsa-5qK-KBFAAAAAAAAAAAAAAAAAAAAAAAAAAAAQQHSlyRHIdWleVqO24-6ix7JFWODqDWo_arvEz3Se5EgIFHkcVjZ4F5XDSBreIHsWRilRnKmaaqlqK3V2_4XtYs2pQECAyYgASFYID5PQTZQQg6haZFQWFzqfAOyQ_ENsMH8xxQ4GRiNPsqrIlggU8IVUOV8qpgk_Jh-OTaLuZL52KdX1fTht07X4DiQPow
                transports:
                  - internal
                  - hybrid
  responses:
    '201':
      description: >-
        Authentication credential created successfully. The body is the
        created `AuthMethod`. For `EMAIL_OTP`, the nickname is the customer
        email tied to the internal account; for `SMS_OTP`, it is the customer
        phone number. OTP responses that trigger a secure OTP challenge carry
        `otpEncryptionTargetBundle` — the HPKE target bundle the client uses
        to encrypt the OTP attempt on the subsequent
        `POST /auth/credentials/{id}/verify`. First-time EMAIL_OTP wallet
        bootstrap responses may omit that bundle; if it is absent, call
        `POST /auth/credentials/{id}/challenge` for the new credential to
        issue a fresh OTP and receive `otpEncryptionTargetBundle` before
        verifying. For `PASSKEY`,
        the credential must be authenticated for the first time via
        `POST /auth/credentials/{id}/challenge` followed by
        `POST /auth/credentials/{id}/verify` to produce a session — there
        is no inline authentication challenge on the registration response.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/auth/AuthMethodResponse.yaml
          examples:
            emailOtp:
              summary: Email OTP credential created
              value:
                id: AuthMethod:019542f5-b3e7-1d02-0000-000000000001
                accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
                type: EMAIL_OTP
                nickname: example@lightspark.com
                otpEncryptionTargetBundle: "'{version:v1.0.0,data:7b227461726765745075626c6963...,dataSignature:30450221...,enclaveQuorumPublic:04a1b2c3...}'"
                createdAt: '2026-04-08T15:30:01Z'
                updatedAt: '2026-04-08T15:30:01Z'
            smsOtp:
              summary: SMS OTP credential created
              value:
                id: AuthMethod:019542f5-b3e7-1d02-0000-000000000001
                accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
                type: SMS_OTP
                nickname: '+14155550123'
                otpEncryptionTargetBundle: "'{version:v1.0.0,data:7b227461726765745075626c6963...,dataSignature:30450221...,enclaveQuorumPublic:04a1b2c3...}'"
                createdAt: '2026-04-08T15:30:01Z'
                updatedAt: '2026-04-08T15:30:01Z'
            oauth:
              summary: OAuth credential created
              value:
                id: AuthMethod:019542f5-b3e7-1d02-0000-000000000001
                accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
                type: OAUTH
                nickname: example@lightspark.com
                createdAt: '2026-04-08T15:30:01Z'
                updatedAt: '2026-04-08T15:30:01Z'
            passkey:
              summary: Passkey credential created
              value:
                id: AuthMethod:019542f5-b3e7-1d02-0000-000000000001
                accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
                type: PASSKEY
                nickname: iPhone Face-ID
                createdAt: '2026-04-08T15:30:01Z'
                updatedAt: '2026-04-08T15:30:01Z'
    '202':
      description: >-
        Challenge issued. Build an API-key stamp over `payloadToSign` with
        the session API keypair of an existing verified credential on the
        same internal account, then send that full stamp as
        `Grid-Wallet-Signature` and echo `requestId` as `Request-Id` on
        the retry.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/auth/AuthSignedRequestChallenge.yaml
          examples:
            emailOtp:
              summary: Additional email OTP credential challenge
              value:
                type: EMAIL_OTP
                payloadToSign: '{"organizationId":"org_2m9F...","parameters":{"userEmail":"jane@example.com","userId":"user_2m9F..."},"timestampMs":"1775681700000","type":"ACTIVITY_TYPE_UPDATE_USER_EMAIL"}'
                requestId: Request:7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
                expiresAt: '2026-04-08T15:35:00Z'
            oauth:
              summary: Additional OAuth credential challenge
              value:
                type: OAUTH
                payloadToSign: '{"organizationId":"org_2m9F...","parameters":{"oauthProviders":[{"oidcToken":"eyJhbGciOiJSUzI1NiIsImtpZCI6ImFiYzEyMyIsInR5cCI6IkpXVCJ9...","providerName":"Google"}],"userId":"user_2m9F..."},"timestampMs":"1775681700000","type":"ACTIVITY_TYPE_CREATE_OAUTH_PROVIDERS"}'
                requestId: Request:7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
                expiresAt: '2026-04-08T15:35:00Z'
            passkey:
              summary: Additional passkey credential challenge
              value:
                type: PASSKEY
                payloadToSign: '{"organizationId":"org_2m9F...","parameters":{"authenticators":[{"attestation":{"attestationObject":"o2NmbXRk...","clientDataJson":"eyJjaGFsbGVuZ2UiOiJBcktRa...","credentialId":"AdKXJEch1aV5Wo7bj7qLHskVY4OoNaj9qu8TPdJ7kSAgUeRxWNngXlcNIGt4gexZGKVGcqZpqqWordXb_he1izY"},"authenticatorName":"iPhone Face-ID","challenge":"ArkQi2yAYHPlgnJNFBlneIwchQdWXBOTrdB-AmMUB21Lx","transports":["internal","hybrid"]}],"userId":"user_2m9F..."},"timestampMs":"1775681700000","type":"ACTIVITY_TYPE_CREATE_AUTHENTICATORS_V2"}'
                requestId: Request:7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
                expiresAt: '2026-04-08T15:35:00Z'
    '400':
      description: >-
        Bad request. Returned with `EMAIL_OTP_CREDENTIAL_ALREADY_EXISTS`
        when registering an email OTP credential while one already exists,
        `SMS_OTP_CREDENTIAL_ALREADY_EXISTS` when registering an SMS OTP
        credential while one already exists, `PASSKEY_CREDENTIAL_ALREADY_EXISTS` when registering a passkey whose
        WebAuthn credentialId is already attached to the internal account, or
        `INVALID_INPUT` when an OAuth `oidcToken` is malformed or has an
        unsupported issuer.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: >-
        Unauthorized. Returned when the provided `Grid-Wallet-Signature`
        is missing, malformed, or does not match a pending challenge for
        an additional credential on the target internal account, when
        the `Request-Id` does not match an unexpired pending challenge, or
        when OAuth token authentication fails during credential registration.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Internal account not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
get:
  summary: List authentication credentials
  description: >-
    Retrieve all authentication credentials registered on an Embedded
    Wallet internal account.


    The response is not paginated: an internal account is expected to
    have a small, bounded number of credentials (typically 1–5), so all
    results are returned inline. Additional per-credential detail (such
    as active session expiry) is available on `GET /auth/sessions`.
  operationId: listAuthCredentials
  tags:
    - Embedded Wallet Auth
  security:
    - BasicAuth: []
  parameters:
    - name: accountId
      in: query
      description: Internal account id whose authentication credentials to list.
      required: true
      schema:
        type: string
      example: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
  responses:
    '200':
      description: >-
        Authentication credentials registered on the internal account.
        Returns an empty `data` array when the internal account has no
        credentials or when `accountId` does not match any internal
        account visible to the caller.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/auth/AuthCredentialListResponse.yaml
          examples:
            multipleCredentials:
              summary: Internal account with multiple authentication credentials
              value:
                data:
                  - id: AuthMethod:019542f5-b3e7-1d02-0000-000000000001
                    accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
                    type: EMAIL_OTP
                    nickname: example@lightspark.com
                    createdAt: '2026-04-08T15:30:01Z'
                    updatedAt: '2026-04-08T15:30:01Z'
                  - id: AuthMethod:019542f5-b3e7-1d02-0000-000000000004
                    accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
                    type: OAUTH
                    nickname: example@lightspark.com
                    createdAt: '2026-04-08T15:35:00Z'
                    updatedAt: '2026-04-08T15:35:00Z'
                  - id: AuthMethod:019542f5-b3e7-1d02-0000-000000000003
                    accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
                    type: PASSKEY
                    credentialId: KEbWNCc7NgaYnUyrNeFGX9_3Y-8oJ3KwzjnaiD1d1LVTxR7v3CaKfCz2Vy_g_MHSh7yJ8yL0Pxg6jo_o0hYiew
                    nickname: iPhone Face-ID
                    createdAt: '2026-04-09T10:15:00Z'
                    updatedAt: '2026-04-09T10:15:00Z'
            empty:
              summary: No credentials registered on the account
              value:
                data: []
    '400':
      description: >-
        Bad request. Returned with `INVALID_INPUT` when the `accountId`
        query parameter is missing or not a valid `InternalAccount:<uuid>`
        identifier.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
