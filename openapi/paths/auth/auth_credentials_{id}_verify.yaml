post:
  summary: Verify an authentication credential
  description: >
    Complete the verification step for a previously created authentication
    credential and issue a session.


    For `EMAIL_OTP` credentials, submit the `encryptedOtpBundle`
    produced by HPKE-encrypting `{otp_code, public_key}`
    under the `otpEncryptionTargetBundle` returned from registration
    when present, or from `POST /auth/credentials/{id}/challenge` when
    registration omitted it or the OTP must be reissued. The server is
    a pass-through and never sees the plaintext OTP code. On success
    the response is `202` with a `payloadToSign` carrying the
    `verificationToken` bound to the client's TEK public key — sign
    that token with the matching TEK private key, then retry the same
    request with the full stamp in `Grid-Wallet-Signature` and the
    `requestId` echoed in `Request-Id`. The signed retry returns `200`
    with the issued `AuthSession`. The TEK public key becomes the
    session API key on successful completion.

    In sandbox mode, the EMAIL_OTP flow runs real HPKE end-to-end
    against a sandbox enclave keypair — clients build a real
    `encryptedOtpBundle` against the sandbox `otpEncryptionTargetBundle`
    and sign a real `verificationToken` with their TEK keypair. The
    only sandbox shortcut is the magic OTP code (`"000000"`) the user
    "receives" instead of a real email delivery.


    For `OAUTH` credentials, supply a fresh OIDC token (`iat` must be
    less than 60 seconds before the request) along with the
    client-generated public key; this is also the reauthentication path
    after a prior session expired. The token identity (`iss`, `aud`, and
    `sub`) must match the OAuth credential being verified. In sandbox,
    the token's `nonce` must equal `sha256(clientPublicKey)`. For
    `PASSKEY` credentials, the client completes a WebAuthn assertion
    (`navigator.credentials.get()`) against the Grid-issued `challenge`
    returned from `POST /auth/credentials/{id}/challenge`, and submits
    the resulting `assertion` with the `Request-Id` header. The
    `clientPublicKey` for `PASSKEY` credentials is supplied on the
    challenge call, where it is bound into the pending session-creation
    request.


    On success for `OAUTH` and `PASSKEY`, and on the signed retry for
    `EMAIL_OTP`, the response contains an `AuthSession`. For `OAUTH`
    and `PASSKEY` the session signing key is delivered as
    `encryptedSessionSigningKey` (HPKE-sealed to the supplied
    `clientPublicKey`); for `EMAIL_OTP` the client already holds the
    session signing key (the TEK private key it generated) and that
    field is omitted from the response. The `expiresAt` timestamp
    marks when the session expires.
  operationId: verifyAuthCredential
  tags:
    - Embedded Wallet Auth
  security:
    - BasicAuth: []
  parameters:
    - name: id
      in: path
      description: >-
        The id of the authentication credential to verify (the `id` field of
        the `AuthMethod` returned from `POST /auth/credentials`).
      required: true
      schema:
        type: string
    - name: Grid-Wallet-Signature
      in: header
      required: false
      description: >-
        Full API-key stamp built over the prior `payloadToSign` with the
        TEK (Target Encryption Key) keypair the client generated for this
        login. Required on the signed retry that completes an `EMAIL_OTP`
        verification. Not used by `OAUTH` or `PASSKEY` verification, which
        complete in a single call.
      schema:
        type: string
      example: eyJwdWJsaWNLZXkiOiIwMmExYjIuLi4iLCJzY2hlbWUiOiJTSUdOQVRVUkVfU0NIRU1FX1RLX0FQSV9QMjU2Iiwic2lnbmF0dXJlIjoiMzA0NTAyMjEwMC4uLiJ9
    - name: Request-Id
      in: header
      required: false
      description: >-
        The `requestId` returned in a prior `202` response from this
        endpoint, echoed back exactly here so the server can correlate
        the signed retry with the issued challenge. Required on the
        signed retry that completes an `EMAIL_OTP` verification; must
        be paired with `Grid-Wallet-Signature`. For `PASSKEY`
        verification, the `requestId` issued from
        `POST /auth/credentials/{id}/challenge` is echoed here instead
        so the server can correlate the assertion with the pending
        challenge.
      schema:
        type: string
      example: Request:7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/auth/AuthCredentialVerifyRequestOneOf.yaml
        examples:
          emailOtp:
            summary: Verify an email OTP credential (first leg)
            value:
              type: EMAIL_OTP
              encryptedOtpBundle: '{"encappedPublic":"044f631a2d890bc6668d997ee184e190650d06adf970987568ec641214a00403b73effe1ef406c60a5cde8508a4484567ddb8056fbd493bee614cd727aef02a838","ciphertext":"1fa1023390a56539aa48cbb380aa28f544ed5cc04861566bb806e25ba026f14660eaf4140a05b388dd012eaa899759a6a92576cdca8c1b7d12e147bd96cc26ed9f74886794155d8ac5cf0fdc"}'
          emailOtpSignedRetry:
            summary: Signed retry completing an email OTP verification
            description: >-
              Same request body as the first leg, plus the
              `Grid-Wallet-Signature` and `Request-Id` headers carrying
              the stamp over the `verificationToken` and the `requestId`
              from the prior `202` response.
            value:
              type: EMAIL_OTP
              encryptedOtpBundle: '{"encappedPublic":"044f631a2d890bc6668d997ee184e190650d06adf970987568ec641214a00403b73effe1ef406c60a5cde8508a4484567ddb8056fbd493bee614cd727aef02a838","ciphertext":"1fa1023390a56539aa48cbb380aa28f544ed5cc04861566bb806e25ba026f14660eaf4140a05b388dd012eaa899759a6a92576cdca8c1b7d12e147bd96cc26ed9f74886794155d8ac5cf0fdc"}'
          oauth:
            summary: Verify an OAuth credential
            value:
              type: OAUTH
              oidcToken: eyJhbGciOiJSUzI1NiIsImtpZCI6ImFiYzEyMyIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJodHRwczovL2FjY291bnRzLmdvb2dsZS5jb20iLCJzdWIiOiIxMTIyMzM0NDU1IiwiYXVkIjoiMTIzNDU2Ny5hcHBzLmdvb2dsZXVzZXJjb250ZW50LmNvbSIsImVtYWlsIjoidXNlckBleGFtcGxlLmNvbSIsImlhdCI6MTc0NjczNjUwOSwiZXhwIjoxNzQ2NzQwMTA5fQ.-3_ETmSGOl4wGNLR1QSOMlHk5IvADpX3YdHFmTH9KmRu6sEhM20RsURjKrI4-_EKj7J_HtsdS1tCHm0iw2J0qtoczYFQqEW_U9qJD6QsuvTFx8Fj9rFa3ieYhZKi3kkBu6cADogUiudP50kf9345ATys2GrYm-ba5esgReW1WzGJG3SgCyIDnHFfxmeLjE2YE9EFxT73To3mPYAk0ywPL2MpFFV9F8I3PsnbDAxinaY75GeA8vJXATr8weEIXqHD2lxmXVE95qd2ZlcuyLUaEYyp9GXcOnx7SjhdJG88jl5BZQvxOVgBMo42iGjK674lSwsMiHpzLX98j6C786Rd9Q
              clientPublicKey: 04f45f2a22c908b9ce09a7150e514afd24627c401c38a4afc164e1ea783adaaa31d4245acfb88c2ebd42b47628d63ecabf345484f0a9f665b63c54c897d5578be2
          passkey:
            summary: Verify a passkey credential
            value:
              type: PASSKEY
              assertion:
                credentialId: KEbWNCc7NgaYnUyrNeFGX9_3Y-8oJ3KwzjnaiD1d1LVTxR7v3CaKfCz2Vy_g_MHSh7yJ8yL0Pxg6jo_o0hYiew
                clientDataJson: eyJjaGFsbGVuZ2UiOiJkRzkwWVd4c2VWVnVhWEYxWlZaaGJIVmxSWFpsY25sVWFXMWwiLCJjbGllbnRFeHRlbnNpb25zIjp7fSwiaGFzaEFsZ29yaXRobSI6IlNIQS0yNTYiLCJvcmlnaW4iOiJodHRwczovL2Rldi5kb250bmVlZGEucHciLCJ0eXBlIjoid2ViYXV0aG4uZ2V0In0
                authenticatorData: PdxHEOnAiLIp26idVjIguzn3Ipr_RlsKZWsa-5qK-KABAAAAkA
                signature: MEUCIQDYXBOpCWSWq2Ll4558GJKD2RoWg958lvJSB_GdeokxogIgWuEVQ7ee6AswQY0OsuQ6y8Ks6jhd45bDx92wjXKs900
  responses:
    '200':
      description: Authentication credential verified and session issued
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/auth/AuthSession.yaml
    '202':
      description: >-
        Verification challenge issued. Returned only for `EMAIL_OTP`
        credentials, on the first leg of the secure OTP login flow.
        Build an API-key stamp over `payloadToSign` (the
        `verificationToken`) with the TEK keypair the client generated
        for this login, then resubmit the same request with that full
        stamp as `Grid-Wallet-Signature` and `requestId` echoed as
        `Request-Id` to receive the issued session on the signed
        retry.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/auth/AuthSignedRequestChallenge.yaml
          examples:
            emailOtp:
              summary: Email OTP verification challenge (sign and retry)
              value:
                type: EMAIL_OTP
                payloadToSign: eyJhbGciOiJFUzI1NiIsImtpZCI6InR1cm5rZXkifQ.eyJzdWIiOiJUWnk2NkVPa1RGYTd2NkpXZ0VxaVgyZGFXOENXc2pMQzVDVU9aRUlGY3hzIiwiaWF0IjoxNzc5NDA3MjIxLCJleHAiOjE3Nzk0MTA4MjF9.gKX9MWYGkw8Y55bgzsgrRftvUHFruIe8yu0w9Kpjp5qnrZnXcTV71WVoltGPsr015IY_oRTOkIFLHmiGNG9zBw
                requestId: Request:7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
                expiresAt: '2026-04-08T15:35:00Z'
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: >-
        Unauthorized. Returned for an invalid or expired OTP (`EMAIL_OTP`),
        for an OIDC token whose signature, issuer, identity, nonce, or
        `iat` freshness check failed (`OAUTH`), or for a WebAuthn assertion
        whose signature, challenge, or credential match failed (`PASSKEY`).
        Also returned for `PASSKEY` when `Request-Id` is missing, does not
        match an unexpired pending challenge for this credential, or was
        already consumed. For `EMAIL_OTP` signed retries, returned when
        `Grid-Wallet-Signature` is missing, malformed, signed by a
        public key that does not match the one bound into the
        `verificationToken`, or when `Request-Id` does not match an
        unexpired pending verification challenge.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Authentication credential not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '429':
      description: >-
        Too many requests. Returned with `RATE_LIMITED` when verification
        attempts for this credential happen too frequently (for example,
        repeated bad OTPs or rapid-fire reauthentication retries). Clients
        should back off and retry after the interval indicated by the
        `Retry-After` response header.
      headers:
        Retry-After:
          description: Number of seconds to wait before retrying the request.
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error429.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
