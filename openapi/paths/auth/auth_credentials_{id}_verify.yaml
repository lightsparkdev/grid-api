post:
  summary: Verify an authentication credential
  description: >
    Complete the verification step for a previously created authentication
    credential and issue a session signing key.


    For `EMAIL_OTP` credentials, supply the one-time password that was
    emailed to the user along with a client-generated public key. For
    `OAUTH` credentials, supply a fresh OIDC token (`iat` must be less
    than 60 seconds before the request) along with the client-generated
    public key; this is also the reauthentication path after a prior
    session expired. For `PASSKEY` credentials, the client completes a
    WebAuthn assertion (`navigator.credentials.get()`) against the
    Grid-issued `challenge` returned from either `POST /auth/credentials`
    (first authentication) or `POST /auth/credentials/{id}/challenge`
    (reauthentication), and submits the resulting `assertion` along with
    the client-generated public key. The `requestId` that accompanied
    the challenge must be echoed in the `Request-Id` header so Grid can
    correlate the assertion with the pending challenge; Grid verifies
    the WebAuthn signature against the stored credential before issuing
    the session.


    On success, the response contains an `encryptedSessionSigningKey`
    that is encrypted to the supplied `clientPublicKey`, along with an
    `expiresAt` timestamp marking when the session expires. The
    `clientPublicKey` is ephemeral and one-time-use per verification
    request.
  operationId: verifyAuthCredential
  tags:
    - Embedded Wallet Auth
  security:
    - BasicAuth: []
  parameters:
    - name: id
      in: path
      description: >-
        The id of the authentication credential to verify (the `id` field of
        the `AuthMethod` returned from `POST /auth/credentials`).
      required: true
      schema:
        type: string
    - name: Request-Id
      in: header
      required: false
      description: >-
        The `requestId` returned alongside the Grid-issued `challenge` from
        `POST /auth/credentials` or `POST /auth/credentials/{id}/challenge`,
        echoed back here so Grid can correlate the assertion with the
        pending challenge. Required when `type` is `PASSKEY`; ignored for
        `EMAIL_OTP` and `OAUTH`.
      schema:
        type: string
      example: 7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/auth/AuthCredentialVerifyRequestOneOf.yaml
        examples:
          emailOtp:
            summary: Verify an email OTP credential
            value:
              type: EMAIL_OTP
              otp: '123456'
              clientPublicKey: 04f45f2a22c908b9ce09a7150e514afd24627c401c38a4afc164e1ea783adaaa31d4245acfb88c2ebd42b47628d63ecabf345484f0a9f665b63c54c897d5578be2
          oauth:
            summary: Verify an OAuth credential
            value:
              type: OAUTH
              oidcToken: eyJhbGciOiJSUzI1NiIsImtpZCI6ImFiYzEyMyIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJodHRwczovL2FjY291bnRzLmdvb2dsZS5jb20iLCJzdWIiOiIxMTIyMzM0NDU1IiwiYXVkIjoiMTIzNDU2Ny5hcHBzLmdvb2dsZXVzZXJjb250ZW50LmNvbSIsImVtYWlsIjoidXNlckBleGFtcGxlLmNvbSIsImlhdCI6MTc0NjczNjUwOSwiZXhwIjoxNzQ2NzQwMTA5fQ.signature
              clientPublicKey: 04f45f2a22c908b9ce09a7150e514afd24627c401c38a4afc164e1ea783adaaa31d4245acfb88c2ebd42b47628d63ecabf345484f0a9f665b63c54c897d5578be2
          passkey:
            summary: Verify a passkey credential
            value:
              type: PASSKEY
              assertion:
                credentialId: KEbWNCc7NgaYnUyrNeFGX9_3Y-8oJ3KwzjnaiD1d1LVTxR7v3CaKfCz2Vy_g_MHSh7yJ8yL0Pxg6jo_o0hYiew
                clientDataJson: eyJjaGFsbGVuZ2UiOiJkRzkwWVd4c2VWVnVhWEYxWlZaaGJIVmxSWFpsY25sVWFXMWwiLCJjbGllbnRFeHRlbnNpb25zIjp7fSwiaGFzaEFsZ29yaXRobSI6IlNIQS0yNTYiLCJvcmlnaW4iOiJodHRwczovL2Rldi5kb250bmVlZGEucHciLCJ0eXBlIjoid2ViYXV0aG4uZ2V0In0
                authenticatorData: PdxHEOnAiLIp26idVjIguzn3Ipr_RlsKZWsa-5qK-KABAAAAkA
                signature: MEUCIQDYXBOpCWSWq2Ll4558GJKD2RoWg958lvJSB_GdeokxogIgWuEVQ7ee6AswQY0OsuQ6y8Ks6jhd45bDx92wjXKs900
              clientPublicKey: 04f45f2a22c908b9ce09a7150e514afd24627c401c38a4afc164e1ea783adaaa31d4245acfb88c2ebd42b47628d63ecabf345484f0a9f665b63c54c897d5578be2
  responses:
    '200':
      description: Authentication credential verified and session issued
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/auth/AuthSession.yaml
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: >-
        Unauthorized. Returned for an invalid or expired OTP (`EMAIL_OTP`),
        for an OIDC token whose signature, issuer, or `iat` freshness
        check failed (`OAUTH`), or for a WebAuthn assertion whose
        signature, challenge, or credential match failed (`PASSKEY`).
        Also returned for `PASSKEY` when `Request-Id` is missing, does not
        match an unexpired pending challenge for this credential, or was
        already consumed.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Authentication credential not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
