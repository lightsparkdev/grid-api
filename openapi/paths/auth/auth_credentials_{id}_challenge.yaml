post:
  summary: Re-issue an authentication credential challenge
  description: >
    Re-issue the challenge for an existing authentication credential.


    For `EMAIL_OTP` and `SMS_OTP` credentials, this triggers a new one-time
    password to the contact on file and returns a fresh
    `otpEncryptionTargetBundle` for the client to HPKE-encrypt the OTP
    attempt against. After the user receives the new OTP, build the
    `encryptedOtpBundle` under the new target bundle and call
    `POST /auth/credentials/{id}/verify` to begin the secure OTP login
    flow.


    `OAUTH` credentials do not have a challenge step. To authenticate or
    reauthenticate an OAuth credential, call
    `POST /auth/credentials/{id}/verify` with a fresh OIDC token and a
    `clientPublicKey`.


    For `PASSKEY` credentials, this issues a fresh Grid reauthentication
    challenge. The request body must carry the client's ephemeral
    `clientPublicKey` so Grid can bake it into the session-creation
    payload the returned challenge is computed from — this seals the
    resulting session signing key to the client.
    The response is a `PasskeyAuthChallenge` — the passkey auth method
    fields plus the WebAuthn `credentialId`, new `challenge`, `requestId`,
    and `expiresAt`. The `challenge` value is the lowercase hex-encoded
    SHA-256 digest of the canonical session-creation body, not a
    base64url string. The client base64url-decodes `credentialId` for
    `allowCredentials[].id` and UTF-8 encodes `challenge` (for example,
    `new TextEncoder().encode(challenge)`) as the WebAuthn challenge in
    `navigator.credentials.get()`, then submits the resulting assertion to
    `POST /auth/credentials/{id}/verify` with `Request-Id: <requestId>` to
    receive a session.
  operationId: challengeAuthCredential
  tags:
    - Embedded Wallet Auth
  security:
    - BasicAuth: []
  parameters:
    - name: id
      in: path
      description: >-
        The id of the authentication credential to re-challenge (the `id` field
        of the `AuthMethod` returned from `POST /auth/credentials`).
      required: true
      schema:
        type: string
  requestBody:
    description: >-
      Request body. Required when re-challenging a `PASSKEY` credential
      (must carry `clientPublicKey`). Ignored for `EMAIL_OTP` and `SMS_OTP`,
      where the credential type alone is sufficient — the OTP is delivered
      out-of-band. OAuth credentials do not use this endpoint.
    required: false
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/auth/AuthCredentialChallengeRequest.yaml
        examples:
          passkey:
            summary: Re-challenge a passkey credential
            value:
              clientPublicKey: 04f45f2a22c908b9ce09a7150e514afd24627c401c38a4afc164e1ea783adaaa31d4245acfb88c2ebd42b47628d63ecabf345484f0a9f665b63c54c897d5578be2
          emailOtp:
            summary: Re-challenge an email-OTP credential (empty body)
            value: {}
          smsOtp:
            summary: Re-challenge an SMS-OTP credential (empty body)
            value: {}
  responses:
    '200':
      description: >-
        Challenge re-issued for the authentication credential. For
        `EMAIL_OTP` and `SMS_OTP` the body is a plain `AuthMethod` and a
        new OTP has been sent. For `PASSKEY` the body is a `PasskeyAuthChallenge`
        carrying the passkey `credentialId`, freshly issued `challenge`,
        `requestId`, and `expiresAt` required to complete reauthentication
        via `POST /auth/credentials/{id}/verify`.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/auth/AuthCredentialResponseOneOf.yaml
          examples:
            emailOtp:
              summary: Email OTP challenge re-issued
              value:
                id: AuthMethod:019542f5-b3e7-1d02-0000-000000000001
                accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
                type: EMAIL_OTP
                nickname: example@lightspark.com
                otpEncryptionTargetBundle: "'{version:v1.0.0,data:7b227461726765745075626c6963...,dataSignature:30450221...,enclaveQuorumPublic:04a1b2c3...}'"
                createdAt: '2026-04-08T15:30:01Z'
                updatedAt: '2026-04-08T15:35:00Z'
            passkey:
              summary: Passkey reauthentication challenge issued
              value:
                id: AuthMethod:019542f5-b3e7-1d02-0000-000000000001
                accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
                type: PASSKEY
                credentialId: KEbWNCc7NgaYnUyrNeFGX9_3Y-8oJ3KwzjnaiD1d1LVTxR7v3CaKfCz2Vy_g_MHSh7yJ8yL0Pxg6jo_o0hYiew
                nickname: iPhone Face-ID
                createdAt: '2026-04-08T15:30:01Z'
                updatedAt: '2026-04-08T15:35:00Z'
                challenge: 6b35a4c41d9aa7a2a0e742f9f9e7a1c2d65a2db33a3fb748f6d4f1ce78d9a729
                requestId: Request:7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
                expiresAt: '2026-04-08T15:35:00Z'
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Authentication credential not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '429':
      description: >-
        Too many requests. Returned with `RATE_LIMITED` when challenge
        re-issues are requested more frequently than the credential challenge
        rate limit allows. Clients should back off and retry after the interval
        indicated by the `Retry-After` response header.
      headers:
        Retry-After:
          description: Number of seconds to wait before retrying the request.
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error429.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
