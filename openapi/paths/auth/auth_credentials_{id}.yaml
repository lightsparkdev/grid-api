delete:
  summary: Revoke an authentication credential
  description: >
    Revoke an authentication credential on an Embedded Wallet internal
    account.


    Revocation is a two-step flow because it must be authorized by a
    session on a *different* credential on the same internal account:


    1. Call `DELETE /auth/credentials/{id}` with no headers. The response
    is `202` with a `payloadToSign`, `requestId`, and `expiresAt`.


    2. Use the session API keypair of an existing verified credential
    on the same internal account â€” other than the one being revoked â€”
    to build an API-key stamp over `payloadToSign`, then retry the
    same `DELETE` request with that full stamp as the
    `Grid-Wallet-Signature` header and the `requestId` echoed back as
    the `Request-Id` header. The signed retry returns `204`.


    The account must retain at least one authentication credential; an
    account with only a single credential cannot use this endpoint to
    revoke it.
  operationId: revokeAuthCredential
  tags:
    - Embedded Wallet Auth
  security:
    - BasicAuth: []
  parameters:
    - name: id
      in: path
      description: >-
        The id of the authentication credential to revoke (the `id`
        field of the `AuthMethod` returned from
        `POST /auth/credentials`).
      required: true
      schema:
        type: string
    - name: Grid-Wallet-Signature
      in: header
      required: false
      description: >-
        Full API-key stamp built over the prior `payloadToSign` with
        the session API keypair of an existing verified authentication
        credential on the same internal account (other than the one
        being revoked). Required on the signed retry; ignored on the
        initial call.
      schema:
        type: string
      example: eyJwdWJsaWNLZXkiOiIwMmExYjIuLi4iLCJzaWduYXR1cmUiOiIzMDQ1MDIyMTAwLi4uIiwic2NoZW1lIjoiUDI1Nl9FQ0RTQV9TSEEyNTYifQ
    - name: Request-Id
      in: header
      required: false
      description: >-
        The `requestId` returned in a prior `202` response, echoed back
        on the signed retry so the server can correlate it with the
        issued challenge. Required on the signed retry; must be paired
        with `Grid-Wallet-Signature`.
      schema:
        type: string
      example: 7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
  responses:
    '202':
      description: >-
        Challenge issued. The response contains `payloadToSign` plus a
        `requestId`. Build an API-key stamp over `payloadToSign` with
        the session API keypair of an existing verified credential on
        the same internal account (other than the one being revoked),
        then echo `requestId` on the retry.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/auth/AuthSignedRequestChallenge.yaml
    '204':
      description: Authentication credential revoked successfully.
    '400':
      description: >-
        Bad request. Also returned when the target internal account has
        only a single authentication credential, which cannot be
        revoked via this endpoint.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: >-
        Unauthorized. Returned when the provided `Grid-Wallet-Signature`
        is missing, malformed, or does not match a pending revocation
        challenge for this credential, or when the `Request-Id` does
        not match an unexpired pending challenge.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Authentication credential not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
