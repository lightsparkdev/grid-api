get:
  summary: Get a delegated signing key
  description: Retrieve a delegated signing key by its system-generated id.
  operationId: getDelegatedKeyById
  tags:
    - Embedded Wallet Auth
  security:
    - BasicAuth: []
  parameters:
    - name: id
      in: path
      description: >-
        The id of the delegated key to retrieve (the `id` field of the
        `DelegatedKey` returned from `POST /auth/delegated-keys` or
        `GET /auth/delegated-keys`).
      required: true
      schema:
        type: string
      example: DelegatedKey:019542f5-b3e7-1d02-0000-000000000021
  responses:
    '200':
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/auth/DelegatedKey.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Delegated key not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
delete:
  summary: Revoke a delegated signing key
  description: >
    Revoke an `ACTIVE` delegated signing key. Grid uses the custodied
    delegated key to authorize deleting its own signer identity. Deleting the
    identity also removes its API key, after which the delegated key can no
    longer sign. The response is `204` when revocation completes.


    The underlying signing policies are left in place. Their consensus
    references the now-deleted signer identity, so they can never authorize
    anything, and deleting them is unnecessary for correctness or security.
  operationId: revokeDelegatedKey
  tags:
    - Embedded Wallet Auth
  security:
    - BasicAuth: []
  parameters:
    - name: id
      in: path
      description: >-
        The id of the delegated key to revoke (the `id` field of the
        `DelegatedKey` returned from `POST /auth/delegated-keys`).
      required: true
      schema:
        type: string
      example: DelegatedKey:019542f5-b3e7-1d02-0000-000000000021
  responses:
    '204':
      description: >-
        Delegated key revoked. The key can no longer authorize signing.
    '400':
      description: >-
        Bad request. Returned when the delegated key has already been
        revoked or is not `ACTIVE`.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Delegated key not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
