parameters:
  - name: quoteId
    in: path
    description: ID of the quote to retrieve
    required: true
    schema:
      type: string
get:
  summary: Get agent quote by ID
  description: >
    Retrieve a quote created by the authenticated agent. Returns 404 if the
    quote exists but was not created by this agent.
  operationId: agentGetQuote
  tags:
    - Agent Operations
  security:
    - AgentAuth: []
  responses:
    '200':
      description: Quote retrieved successfully
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/quotes/Quote.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Quote not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
