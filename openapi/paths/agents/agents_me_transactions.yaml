get:
  summary: List agent transactions
  description: >
    Retrieve a paginated list of transactions for the authenticated agent's customer.
    Results are automatically scoped to the agent's associated customer — no customer
    filter is needed or accepted.
  operationId: agentListTransactions
  tags:
    - Agent Operations
  security:
    - AgentAuth: []
  parameters:
    - name: accountIdentifier
      in: query
      description: Filter by account identifier (matches either sender or receiver)
      required: false
      schema:
        type: string
    - name: senderAccountIdentifier
      in: query
      description: Filter by sender account identifier
      required: false
      schema:
        type: string
    - name: receiverAccountIdentifier
      in: query
      description: Filter by receiver account identifier
      required: false
      schema:
        type: string
    - name: status
      in: query
      description: Filter by transaction status
      required: false
      schema:
        $ref: ../../components/schemas/transactions/TransactionStatus.yaml
    - name: type
      in: query
      description: Filter by transaction type
      required: false
      schema:
        $ref: ../../components/schemas/transactions/TransactionType.yaml
    - name: reference
      in: query
      description: Filter by reference
      required: false
      schema:
        type: string
    - name: startDate
      in: query
      description: Filter by start date (inclusive) in ISO 8601 format
      required: false
      schema:
        type: string
        format: date-time
    - name: endDate
      in: query
      description: Filter by end date (inclusive) in ISO 8601 format
      required: false
      schema:
        type: string
        format: date-time
    - name: limit
      in: query
      description: Maximum number of results to return (default 20, max 100)
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - name: cursor
      in: query
      description: Cursor for pagination (returned from previous request)
      required: false
      schema:
        type: string
    - name: sortOrder
      in: query
      description: Order to sort results in
      required: false
      schema:
        type: string
        enum:
          - asc
          - desc
        default: desc
  responses:
    '200':
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/transactions/TransactionListResponse.yaml
    '400':
      description: Bad request - Invalid parameters
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
