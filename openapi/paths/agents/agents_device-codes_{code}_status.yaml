parameters:
  - name: code
    in: path
    description: The device code to check
    required: true
    schema:
      type: string
get:
  summary: Get device code status
  description: >
    Check whether a device code has been redeemed. Use this to poll for agent
    installation completion after creating an agent.
  operationId: getAgentDeviceCodeStatus
  tags:
    - Agent Management
  security:
    - BasicAuth: []
  responses:
    '200':
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/agents/AgentDeviceCodeStatusResponse.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Device code not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
