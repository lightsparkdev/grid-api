parameters:
  - name: agentId
    in: path
    description: System-generated unique agent identifier
    required: true
    schema:
      type: string
  - name: actionId
    in: path
    description: Unique identifier of the agent action to reject
    required: true
    schema:
      type: string
post:
  summary: Reject an agent action
  description: >
    Reject a pending agent action, preventing execution. The action must have status
    `PENDING_APPROVAL`. Once rejected, the action transitions to `REJECTED` and the
    underlying operation is not executed.

    This endpoint is called by the platform's backend using platform credentials,
    not by the agent itself.
  operationId: rejectAgentAction
  tags:
    - Agent Management
  security:
    - BasicAuth: []
  requestBody:
    required: false
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/agents/AgentActionRejectRequest.yaml
  responses:
    '200':
      description: Action rejected successfully. Returns the updated AgentAction.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/agents/AgentAction.yaml
    '400':
      description: Bad request - Action cannot be rejected
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Agent or action not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '409':
      description: Conflict - Action is not pending approval or has already been processed
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error409.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
