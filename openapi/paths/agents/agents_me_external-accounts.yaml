get:
  summary: List agent external accounts
  description: >
    Retrieve a paginated list of external accounts belonging to the authenticated
    agent's customer. Requires the MANAGE_EXTERNAL_ACCOUNTS permission in the
    agent's policy.
  operationId: agentListExternalAccounts
  tags:
    - Agent Operations
  security:
    - AgentAuth: []
  parameters:
    - name: currency
      in: query
      description: Filter by currency code
      required: false
      schema:
        type: string
    - name: limit
      in: query
      description: Maximum number of results to return (default 20, max 100)
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - name: cursor
      in: query
      description: Cursor for pagination (returned from previous request)
      required: false
      schema:
        type: string
  responses:
    '200':
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/external_accounts/ExternalAccountListResponse.yaml
    '400':
      description: Bad request - Invalid parameters
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
post:
  summary: Add an external account
  description: >
    Register a new external bank account or wallet for the authenticated agent's customer.
    Requires the MANAGE_EXTERNAL_ACCOUNTS permission in the agent's policy.
    The `customerId` field is optional and will be inferred from the agent's associated
    customer if omitted.
  operationId: agentCreateExternalAccount
  tags:
    - Agent Operations
  security:
    - AgentAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/external_accounts/ExternalAccountCreateRequest.yaml
        examples:
          usBankAccount:
            summary: Create external US bank account
            value:
              currency: USD
              accountInfo:
                accountType: USD_ACCOUNT
                accountNumber: "12345678901"
                routingNumber: "123456789"
                bankAccountType: CHECKING
                bankName: Chase Bank
                beneficiary:
                  beneficiaryType: INDIVIDUAL
                  fullName: John Doe
                  birthDate: "1990-01-15"
                  nationality: US
                  address:
                    line1: 123 Main Street
                    city: San Francisco
                    state: CA
                    postalCode: "94105"
                    country: US
          sparkWallet:
            summary: Create external Spark wallet
            value:
              currency: BTC
              accountInfo:
                accountType: SPARK_WALLET
                address: "spark1pgssyuuuhnrrdjswal5c3s3rafw9w3y5dd4cjy3duxlf7hjzkp0rqx6dj6mrhu"
  responses:
    '201':
      description: External account created successfully
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/external_accounts/ExternalAccount.yaml
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '409':
      description: Conflict - External account already exists
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error409.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
