parameters:
  - name: externalAccountId
    in: path
    description: System-generated unique external account identifier
    required: true
    schema:
      type: string
get:
  summary: Get platform external account by ID
  description: Retrieve a platform external account by its system-generated ID
  operationId: getPlatformExternalAccountById
  tags:
    - External Accounts
  security:
    - BasicAuth: []
  responses:
    '200':
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/external_accounts/ExternalAccount.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: External account not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
patch:
  summary: Update platform external account by ID
  description: >-
    Update mutable fields on a platform external account. Only `platformAccountId` and
    `beneficiary` can be updated via this endpoint.
  operationId: updatePlatformExternalAccountById
  tags:
    - External Accounts
  security:
    - BasicAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/external_accounts/ExternalAccountUpdateRequest.yaml
        examples:
          updatePlatformAccountId:
            summary: Update platform account identifier
            value:
              platformAccountId: ext_acc_654321
          updateBeneficiary:
            summary: Update beneficiary information
            value:
              beneficiary:
                beneficiaryType: INDIVIDUAL
                fullName: Jane Doe
                birthDate: "1990-01-15"
                nationality: US
                address:
                  line1: 456 Market Street
                  city: San Francisco
                  state: CA
                  postalCode: "94105"
                  country: US
  responses:
    '200':
      description: External account updated successfully
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/external_accounts/ExternalAccount.yaml
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: External account not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
delete:
  summary: Delete platform external account by ID
  description: Delete a platform external account by its system-generated ID
  operationId: deletePlatformExternalAccountById
  tags:
    - External Accounts
  security:
    - BasicAuth: []
  responses:
    '204':
      description: External account deleted successfully
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: External account not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
