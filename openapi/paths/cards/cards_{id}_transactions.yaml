parameters:
  - name: id
    in: path
    description: System-generated unique card identifier
    required: true
    schema:
      type: string
get:
  summary: List card transactions
  description: >
    Retrieve a paginated list of card transactions for a card.


    Each row is the parent `CardTransaction` for an authorization and the
    pulls / clearings / refunds that reconcile against it. Child events are
    rolled up into the `pullSummary`, `refundSummary`, and
    `settlementSummary` aggregates — full per-event detail lives at
    `GET /cards/{id}/transactions/{transactionId}` and is out of scope of
    this endpoint.


    A row in `status: "EXCEPTION"` is one where the transaction settled to
    the card network but the corresponding pull from the funding source
    failed — this is where the high-urgency reconciliation alerts surface.
    Querying with `?status=EXCEPTION` is the dashboard view for stuck
    reconciliations.
  operationId: listCardTransactions
  tags:
    - Cards
  security:
    - BasicAuth: []
  parameters:
    - name: status
      in: query
      description: Filter by card transaction status.
      required: false
      schema:
        $ref: ../../components/schemas/cards/CardTransactionStatus.yaml
    - name: merchantDescriptor
      in: query
      description: >-
        Substring match on the captured merchant descriptor string.
      required: false
      schema:
        type: string
    - name: mcc
      in: query
      description: >-
        Filter by Merchant Category Code (ISO 18245) — four-digit numeric
        string, exact match.
      required: false
      schema:
        type: string
    - name: startDate
      in: query
      description: Filter by start date (inclusive) in ISO 8601 format, applied to `createdAt`.
      required: false
      schema:
        type: string
        format: date-time
    - name: endDate
      in: query
      description: Filter by end date (inclusive) in ISO 8601 format, applied to `createdAt`.
      required: false
      schema:
        type: string
        format: date-time
    - name: limit
      in: query
      description: Maximum number of results to return (default 20, max 100)
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - name: cursor
      in: query
      description: Cursor for pagination (returned from previous request)
      required: false
      schema:
        type: string
    - name: sortOrder
      in: query
      description: Order to sort results in
      required: false
      schema:
        type: string
        enum:
          - asc
          - desc
        default: desc
  responses:
    '200':
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/cards/CardTransactionListResponse.yaml
    '400':
      description: Bad request - Invalid parameters
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Card not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
