parameters:
  - name: id
    in: path
    description: System-generated unique card identifier
    required: true
    schema:
      type: string
  - name: accountId
    in: path
    description: Internal account id of the funding source to unbind
    required: true
    schema:
      type: string
delete:
  summary: Unbind an account from a card
  description: >
    Unbind an internal account from a card.


    A card must always have at least one funding source. Attempting to
    unbind the last source returns `409 LAST_FUNDING_SOURCE` — freeze or
    close the card instead. If pending authorizations or pulls still
    reference the source, the request returns
    `409 BINDING_HAS_OPEN_OBLIGATIONS`; retry after those obligations
    reach a terminal state.
  operationId: removeCardFundingSource
  tags:
    - Cards
  security:
    - BasicAuth: []
  responses:
    '204':
      description: Funding source unbound successfully.
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Card or funding source not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '409':
      description: >-
        Conflict. Returned with `LAST_FUNDING_SOURCE` when removing the
        only funding source on a card, and with
        `BINDING_HAS_OPEN_OBLIGATIONS` when pending authorizations or pulls
        still reference the source.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error409.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
