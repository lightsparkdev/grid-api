parameters:
  - name: id
    in: path
    description: System-generated unique card identifier
    required: true
    schema:
      type: string
post:
  summary: Bind an account to a card
  description: >
    Bind an additional internal account to a card as a funding source.


    `priority` controls the order Authorization Decisioning tries sources at
    auth time (lower = first). The lowest-priority active source is the
    card's default. In v1 only the source with `priority: 1` is read by
    Authorization Decisioning — additional bindings are accepted and stored
    so platforms can stage multi-source decisioning ahead of the v1.5+
    rollout.
  operationId: addCardFundingSource
  tags:
    - Cards
  security:
    - BasicAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/cards/CardFundingSourceAddRequest.yaml
        examples:
          appendSource:
            summary: Bind a secondary funding source
            value:
              accountId: InternalAccount:019542f5-b3e7-1d02-0000-000000000003
              priority: 2
  responses:
    '201':
      description: Funding source bound to the card.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/cards/CardFundingSource.yaml
    '400':
      description: Bad request - Invalid parameters
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Card not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '409':
      description: >-
        Conflict. Returned with `FUNDING_SOURCE_INELIGIBLE` when the
        account does not belong to the cardholder, is not denominated in a
        card-eligible currency, or is already bound to the card; and with
        `CARD_NOT_MUTABLE` when the card is `CLOSED`.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error409.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
