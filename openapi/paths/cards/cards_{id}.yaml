parameters:
  - name: id
    in: path
    description: System-generated unique card identifier
    required: true
    schema:
      type: string
get:
  summary: Get a card
  description: Retrieve a card by its system-generated id.
  operationId: getCardById
  tags:
    - Cards
  security:
    - BasicAuth: []
  responses:
    '200':
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/cards/Card.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Card not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
patch:
  summary: Freeze or unfreeze a card
  description: >
    Freeze (`ACTIVE → FROZEN`) or unfreeze (`FROZEN → ACTIVE`) a card. Any
    other transition is rejected with `409 INVALID_STATE_TRANSITION` — to
    close a card, use `DELETE /cards/{id}`.


    Because freeze / unfreeze is a sensitive state change, this endpoint
    uses Grid's 202 → signed-retry pattern (same shape as
    `DELETE /auth/credentials/{id}` and `POST /internal-accounts/{id}/export`):


    1. Call `PATCH /cards/{id}` with the target `state` and no signing
    headers. The response is `202` with a `payloadToSign`, `requestId`, and
    `expiresAt`.


    2. Sign the `payloadToSign` with the session private key of a verified
    authentication credential on the card's owning internal account and
    retry with the signature as the `Grid-Wallet-Signature` header and the
    `requestId` echoed back as the `Request-Id` header. The signed retry
    returns `200` with the updated `Card`.


    Effects:

    - `FROZEN`: Authorization Decisioning declines new auths with
    `CARD_PAUSED`. Existing pulls and in-flight reconciliation continue —
    freezing does not pause the lifecycle of authorizations that already
    passed.

    - `ACTIVE`: normal authorization behavior resumes.


    The `card.state_change` webhook fires on every successful transition.
  operationId: updateCardById
  tags:
    - Cards
  security:
    - BasicAuth: []
  parameters:
    - name: Grid-Wallet-Signature
      in: header
      required: false
      description: >-
        Signature over the `payloadToSign` returned in a prior `202`
        response, produced with the session private key of a verified
        authentication credential on the card's owning internal account and
        base64-encoded. Required on the signed retry; ignored on the initial
        call.
      schema:
        type: string
      example: MEUCIQDx7k2N0aK4p8f3vR9J6yT5wL1mB0sXnG2hQ4vJ8zYkCgIgZ4rP9dT7eWfU3oM6KjR1qSpNvBwL0tXyA2iG8fH5dE=
    - name: Request-Id
      in: header
      required: false
      description: >-
        The `requestId` returned in a prior `202` response, echoed back on
        the signed retry so the server can correlate it with the issued
        challenge. Required on the signed retry; must be paired with
        `Grid-Wallet-Signature`.
      schema:
        type: string
      example: 7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/cards/CardUpdateRequest.yaml
        examples:
          freeze:
            summary: Freeze an active card
            value:
              state: FROZEN
          unfreeze:
            summary: Unfreeze a frozen card
            value:
              state: ACTIVE
  responses:
    '200':
      description: Signed retry accepted. Returns the updated card.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/cards/Card.yaml
    '202':
      description: >-
        Challenge issued. The response contains a `payloadToSign` that must
        be signed with the session private key of a verified authentication
        credential on the card's owning internal account, along with a
        `requestId` that must be echoed back on the retry.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/SignedRequestChallenge.yaml
    '400':
      description: Bad request - Invalid parameters
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error400.yaml
    '401':
      description: >-
        Unauthorized. Returned when the provided `Grid-Wallet-Signature` is
        missing, malformed, or does not match a pending update challenge for
        this card, or when the `Request-Id` does not match an unexpired
        pending challenge.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Card not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '409':
      description: >-
        Conflict. Returned with `INVALID_STATE_TRANSITION` when the
        requested transition is not `ACTIVE ⇄ FROZEN` (e.g. trying to
        un-freeze a `CLOSED` card).
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error409.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
delete:
  summary: Close a card
  description: >
    Permanently close a card. Terminal and irreversible — the card
    transitions to `state: "CLOSED"` with `stateReason:
    "CLOSED_BY_PLATFORM"` and stays in the system for audit and
    reconciliation.


    Close uses Grid's 202 → signed-retry pattern:


    1. Call `DELETE /cards/{id}` with no signing headers. The response is
    `202` with a `payloadToSign`, `requestId`, and `expiresAt`.


    2. Sign the `payloadToSign` with the session private key of a verified
    authentication credential on the card's owning internal account and
    retry with the signature as the `Grid-Wallet-Signature` header and the
    `requestId` echoed back as the `Request-Id` header. The signed retry
    returns `200` with the closed `Card`.


    Side effects:

    - All pending auths reconcile to a terminal state via the existing
    reconcile primitive. Inbound clearings received after close follow the
    standard force-post / late-presentment path — Lightspark absorbs the
    loss if a post-hoc pull on the now-unbound source fails.

    - Funding-source bindings are detached. Refunds already in flight still
    complete because Lightspark holds the card-reserve keys.

    - The `card.state_change` webhook fires with `state: "CLOSED"`.
  operationId: closeCardById
  tags:
    - Cards
  security:
    - BasicAuth: []
  parameters:
    - name: Grid-Wallet-Signature
      in: header
      required: false
      description: >-
        Signature over the `payloadToSign` returned in a prior `202`
        response, produced with the session private key of a verified
        authentication credential on the card's owning internal account and
        base64-encoded. Required on the signed retry; ignored on the initial
        call.
      schema:
        type: string
      example: MEUCIQDx7k2N0aK4p8f3vR9J6yT5wL1mB0sXnG2hQ4vJ8zYkCgIgZ4rP9dT7eWfU3oM6KjR1qSpNvBwL0tXyA2iG8fH5dE=
    - name: Request-Id
      in: header
      required: false
      description: >-
        The `requestId` returned in a prior `202` response, echoed back on
        the signed retry so the server can correlate it with the issued
        challenge. Required on the signed retry; must be paired with
        `Grid-Wallet-Signature`.
      schema:
        type: string
      example: 7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
  responses:
    '200':
      description: Signed retry accepted. Returns the closed card.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/cards/Card.yaml
    '202':
      description: >-
        Challenge issued. The response contains a `payloadToSign` that must
        be signed with the session private key of a verified authentication
        credential on the card's owning internal account, along with a
        `requestId` that must be echoed back on the retry.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/SignedRequestChallenge.yaml
    '401':
      description: >-
        Unauthorized. Returned when the provided `Grid-Wallet-Signature` is
        missing, malformed, or does not match a pending close challenge for
        this card, or when the `Request-Id` does not match an unexpired
        pending challenge.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error401.yaml
    '404':
      description: Card not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error404.yaml
    '409':
      description: >-
        Conflict. Returned with `CARD_ALREADY_CLOSED` when the card is
        already in the terminal `CLOSED` state.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error409.yaml
    '500':
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/errors/Error500.yaml
