type: object
required:
  - provider
  - subject
properties:
  provider:
    $ref: ./SandboxOidcProvider.yaml
  subject:
    type: string
    minLength: 1
    maxLength: 256
    description: >-
      Fake identity-provider user ID. This becomes the OIDC token `sub`
      claim and is matched during OAuth credential verification.
    example: alice
  clientPublicKey:
    type: string
    minLength: 1
    description: >-
      Optional client-generated public key hex. Include this when minting a
      token for OAuth credential verification. When present, Grid adds a
      `nonce` claim equal to `sha256(clientPublicKey)`.
    example: 04f45f2a22c908b9ce09a7150e514afd24627c401c38a4afc164e1ea783adaaa31d4245acfb88c2ebd42b47628d63ecabf345484f0a9f665b63c54c897d5578be2
  email:
    type: string
    minLength: 1
    format: email
    description: >-
      Optional email claim to include in the token. If omitted, Grid derives
      a deterministic sandbox email from `subject`.
    example: alice@example.com
