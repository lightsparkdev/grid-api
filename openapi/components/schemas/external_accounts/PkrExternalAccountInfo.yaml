title: PKR Account
allOf:
- $ref: ./BaseExternalAccountInfo.yaml
- $ref: ../common/PkrAccountInfoBase.yaml
- type: object
  required:
  - paymentRails
  - beneficiary
  properties:
    paymentRails:
      type: array
      items:
        type: string
        enum:
        - BANK_TRANSFER
        - MOBILE_MONEY
    beneficiary:
      oneOf:
      - title: Individual Beneficiary
        $ref: ../common/PkrBeneficiary.yaml
      - title: Business Beneficiary
        $ref: ../common/BusinessBeneficiary.yaml
      discriminator:
        propertyName: beneficiaryType
        mapping:
          INDIVIDUAL: ../common/PkrBeneficiary.yaml
          BUSINESS: ../common/BusinessBeneficiary.yaml
