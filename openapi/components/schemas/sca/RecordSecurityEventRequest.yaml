type: object
description: >-
  Records a client-side security-relevant event for the customer with Grid's risk engine (e.g. a sign-in, a sensitive view). Used to
  feed Grid's adaptive-authentication signals.
required:
  - eventType
properties:
  eventType:
    type: string
    description: >-
      A defined security-event identifier drawn from Grid's
      accepted set (e.g. `LOGIN`), **not** arbitrary caller text — it is
      forwarded verbatim to Grid's risk engine, which rejects values
      outside that set. Left as a string (rather than an enum) so new
      new events don't require a spec change; treat it as a closed
      vocabulary defined by Grid, not free-form input.
    example: LOGIN
