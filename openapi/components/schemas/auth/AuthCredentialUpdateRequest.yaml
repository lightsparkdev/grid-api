title: Authentication Credential Update Request
description: >-
  Partial request body for `PATCH /auth/credentials/{id}`. At least one
  update field must be provided. Today, only the email address on an
  `EMAIL_OTP` credential can be updated. On step 1 of the signed-retry flow
  Grid binds the submitted update fields into `payloadToSign`; on step 2 the
  client echoes the same fields back and Grid applies the update to the
  authentication credential.
type: object
properties:
  email:
    type: string
    format: email
    description: New email address to associate with the `EMAIL_OTP` credential.
    example: new.email@example.com
