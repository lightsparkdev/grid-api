title: Authentication Session Delete Challenge
allOf:
  - $ref: ../common/SignedRequestChallenge.yaml
  - type: object
    required:
      - id
      - type
    properties:
      id:
        type: string
        description: The id of the session being revoked.
        example: Session:019542f5-b3e7-1d02-0000-000000000003
      type:
        $ref: ./AuthMethodType.yaml
        description: >-
          The type of authentication credential that issued this session.
