title: Authentication Session
type: object
required:
  - id
  - accountId
  - type
  - nickname
  - createdAt
  - updatedAt
  - expiresAt
properties:
  id:
    type: string
    description: System-generated unique identifier for the session.
    example: Session:019542f5-b3e7-1d02-0000-000000000003
  accountId:
    type: string
    description: Identifier of the internal account this session belongs to.
    example: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
  type:
    $ref: ./AuthMethodType.yaml
  nickname:
    type: string
    description: >-
      Human-readable identifier inherited from the authentication
      credential that issued this session (email address for
      `EMAIL_OTP`, the OIDC email claim for `OAUTH`, user-chosen name
      for `PASSKEY`).
    example: example@lightspark.com
  createdAt:
    type: string
    format: date-time
    description: Timestamp when the session was created.
    example: '2026-04-08T15:30:01Z'
  updatedAt:
    type: string
    format: date-time
    description: Timestamp when the session was last updated.
    example: '2026-04-08T15:35:00Z'
  expiresAt:
    type: string
    format: date-time
    description: Timestamp after which the session is no longer valid.
    example: '2026-04-09T15:30:01Z'
