title: Authentication Signed Request Challenge
description: >-
  202 response returned from Embedded Wallet Auth endpoints that require
  a signed retry — `POST /auth/credentials` (adding an additional
  credential), `DELETE /auth/credentials/{id}` (revoking a credential),
  and `DELETE /auth/sessions/{id}` (revoking a session). Carries the
  signing fields from `SignedRequestChallenge` plus the `type` of the
  authentication credential involved (being added, being revoked, or
  that issued the session being revoked). The client already knows the
  target resource id from the request path / body it just sent, so
  nothing beyond `type` is echoed in the response.
allOf:
  - $ref: ../common/SignedRequestChallenge.yaml
  - type: object
    required:
      - type
    properties:
      type:
        $ref: ./AuthMethodType.yaml
        description: >-
          Credential type relevant to this challenge: the credential type
          being added (`POST /auth/credentials`), the credential type
          being revoked (`DELETE /auth/credentials/{id}`), or the type of
          credential that issued the session being revoked
          (`DELETE /auth/sessions/{id}`).
