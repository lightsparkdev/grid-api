title: Auth Credential List Item
description: >-
  Authentication credential returned from `GET /auth/credentials`. Passkey
  credentials include the WebAuthn `credentialId` needed to target a specific
  registered passkey; email OTP and OAuth credentials use the base list item
  shape.
oneOf:
  - $ref: ./EmailOtpAuthMethod.yaml
  - $ref: ./OauthAuthMethod.yaml
  - $ref: ./PasskeyAuthMethod.yaml
discriminator:
  propertyName: type
  mapping:
    EMAIL_OTP: ./EmailOtpAuthMethod.yaml
    OAUTH: ./OauthAuthMethod.yaml
    PASSKEY: ./PasskeyAuthMethod.yaml
