title: Delegated Key Create Request
type: object
required:
  - cardId
  - internalAccountId
  - nickname
properties:
  cardId:
    type: string
    description: >-
      The id of the card whose Embedded Wallet funding account will use this
      delegated signing key.
    example: Card:019542f5-b3e7-1d02-0000-000000000010
  internalAccountId:
    type: string
    description: >-
      The id of the Embedded Wallet internal account funding the card. Grid
      uses the `(cardId, internalAccountId)` pair to find the active card
      funding-source binding.
    example: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
  nickname:
    type: string
    minLength: 1
    maxLength: 256
    description: Human-readable label for the delegated key.
    example: Card payments key
  spendingLimits:
    type: array
    uniqueItems: true
    description: >-
      Optional per-transaction spending limits for the key, at most one entry
      per currency — a request with duplicate currency entries is rejected.
      Grid enforces the limits when authorizing card transactions funded by
      the key's Embedded Wallet account; a currency with no entry is
      unlimited. Immutable — revoke the key and create a new one to change
      limits.
    items:
      $ref: ./DelegatedKeySpendingLimit.yaml
