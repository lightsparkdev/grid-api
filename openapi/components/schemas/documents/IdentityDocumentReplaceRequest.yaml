title: Identity Document Replace Request
description: Replace an existing identity document.
allOf:
  - $ref: ./BaseDocumentRequest.yaml
  - type: object
    required:
      - documentType
      - documentNumber
      - issuingAuthority
    properties:
      documentType:
        $ref: ./IdentityDocumentType.yaml
      documentNumber:
        type: string
        description: Document identification number (e.g., passport number)
        example: A12345678
      issuingAuthority:
        type: string
        description: Name of the government agency or organization that issued the document
        example: U.S. Department of State
