title: Identity Document Upload Request
description: Upload an identity document (passport, driver's license, or national ID).
allOf:
  - $ref: ./BaseDocumentRequest.yaml
  - type: object
    required:
      - documentHolder
      - documentType
      - documentNumber
      - issuingAuthority
    properties:
      documentHolder:
        type: string
        description: >-
          ID of the entity that owns this document. Can be a Customer ID
          or a BeneficialOwner ID.
        example: BeneficialOwner:019542f5-b3e7-1d02-0000-000000000001
      documentType:
        $ref: ./IdentityDocumentType.yaml
      documentNumber:
        type: string
        description: Document identification number (e.g., passport number)
        example: A12345678
      issuingAuthority:
        type: string
        description: Name of the government agency or organization that issued the document
        example: U.S. Department of State
