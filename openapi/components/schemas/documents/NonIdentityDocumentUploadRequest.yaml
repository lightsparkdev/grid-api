title: Non-Identity Document Upload Request
description: >-
  Upload a non-identity verification document such as proof of address,
  business registry documents, or supporting evidence.
allOf:
  - $ref: ./BaseDocumentRequest.yaml
  - type: object
    required:
      - documentHolder
      - documentType
    properties:
      documentHolder:
        type: string
        description: >-
          ID of the entity that owns this document. Can be a Customer ID
          or a BeneficialOwner ID.
        example: BeneficialOwner:019542f5-b3e7-1d02-0000-000000000001
      documentType:
        $ref: ./NonIdentityDocumentType.yaml
      documentNumber:
        type: string
        description: Optional document identification number
        example: '20240312-INV-9821'
      issuingAuthority:
        type: string
        description: Optional name of the agency or organization that issued the document
        example: City of San Francisco
