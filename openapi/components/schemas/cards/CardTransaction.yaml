title: Card Transaction
type: object
required:
  - type
  - id
  - status
  - direction
  - merchant
  - authorizedAmount
  - accountId
  - customerId
  - platformCustomerId
  - authorizedAt
  - createdAt
  - updatedAt
description: >-
  Parent transaction row for a card authorization and all of the
  pulls / settlements / refunds that reconcile against it. Child events are
  rolled up into the `pullSummary`, `refundSummary`, and `settlementSummary`
  aggregates. Delivered as the payload of the `CARD_TRANSACTION.*`
  webhook family on every state transition; the webhook type carries the
  transaction's new status (for example `CARD_TRANSACTION.SETTLED`).
properties:
  type:
    type: string
    enum:
      - CARD
    description: Discriminator identifying this transaction as a card transaction in the `Transaction` list.
  id:
    type: string
    description: System-generated unique card transaction identifier
    readOnly: true
    example: CardTransaction:019542f5-b3e7-1d02-0000-000000000100
  cardId:
    type: string
    description: The id of the `Card` this transaction was made on.
    example: Card:019542f5-b3e7-1d02-0000-000000000010
  customerId:
    type: string
    description: System ID of the customer (cardholder) this transaction belongs to.
    example: Customer:019542f5-b3e7-1d02-0000-000000000001
  platformCustomerId:
    type: string
    description: Platform-specific ID of the customer (cardholder) this transaction belongs to.
    example: 18d3e5f7b4a9c2
  issuerTransactionToken:
    type: string
    description: >-
      Opaque identifier for the transaction on the underlying issuer. Used to
      cross-reference Grid records against issuer dashboards and webhooks.
    example: lithic_txn_b81c2a4f
    readOnly: true
  status:
    $ref: ./CardTransactionStatus.yaml
  direction:
    $ref: ../transactions/TransactionDirection.yaml
    description: Card transactions debit the customer's account.
    example: DEBIT
  merchant:
    $ref: ./CardMerchant.yaml
  authorizedAmount:
    $ref: ../common/CurrencyAmount.yaml
  settledAmount:
    $ref: ../common/CurrencyAmount.yaml
  refundedAmount:
    $ref: ../common/CurrencyAmount.yaml
    description: >-
      Total merchant refunds linked to this transaction. Populated only when
      the card program's provider links refunds to the original purchase
      (US programs). EU card programs receive merchant refunds WITHOUT a
      purchase reference, so those refunds surface as standalone
      CREDIT-direction card transactions and never update the purchase's
      `refundedAmount`/`refundSummary`.
  accountId:
    type: string
    description: >-
      Internal account id that funded this transaction (the funding source
      selected by Authorization Decisioning at auth time).
    example: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
  pullSummary:
    $ref: ./CardPullSummary.yaml
  refundSummary:
    $ref: ./CardRefundSummary.yaml
  settlementSummary:
    $ref: ./CardSettlementSummary.yaml
  authorizedAt:
    type: string
    format: date-time
    description: When the auth was approved.
    example: '2026-05-08T14:30:00Z'
  lastEventAt:
    type: string
    format: date-time
    description: >-
      Timestamp of the most recent reconcile event (pull / clearing / refund)
      against this transaction.
    example: '2026-05-08T15:42:11Z'
  createdAt:
    type: string
    format: date-time
    description: Creation timestamp (same as `authorizedAt` for card transactions).
    readOnly: true
    example: '2026-05-08T14:30:00Z'
  updatedAt:
    type: string
    format: date-time
    description: Last update timestamp.
    readOnly: true
    example: '2026-05-08T15:42:11Z'
