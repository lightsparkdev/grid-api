type: object
required:
  - cardholderId
  - form
  - fundingSources
properties:
  cardholderId:
    type: string
    description: >-
      The id of the `Customer` to issue the card to. The customer must have
      KYC status `APPROVED`; otherwise the request is rejected with
      `CARDHOLDER_KYC_NOT_APPROVED`.
    example: Customer:019542f5-b3e7-1d02-0000-000000000001
  platformCardId:
    type: string
    description: >-
      Optional platform-specific card identifier. System-generated when
      omitted, mirroring `platformCustomerId` semantics.
    example: card-emp-aary-001
  form:
    $ref: ./CardForm.yaml
  threeDSecurePassword:
    type: string
    writeOnly: true
    minLength: 8
    maxLength: 36
    description: >-
      Optional static 3-D Secure password to set on the card, for card
      programs whose issuer challenges online purchases with a static
      password factor (EU/Striga cards). 8-36 characters; Latin letters,
      digits, and the issuer's allowed special characters. Grid forwards it
      to the provider and never stores or returns it. When omitted, Grid
      generates a strong password; the cardholder-facing view/change flow
      is delivered through the secure card UI. Rejected for card programs
      without a static-password challenge factor (US/Lithic cards).
    example: Xk9!qR2#mVp7

  fundingSources:
    type: array
    description: >-
      Internal account ids to bind as funding sources, in priority order.
      The first entry is tried first by Authorization Decisioning. Every
      card must be bound to at least one source, and every source must
      belong to the cardholder and be denominated in a card-eligible
      currency (USDB in v1); otherwise the request is rejected with
      `FUNDING_SOURCE_INELIGIBLE`.
    minItems: 1
    items:
      type: string
    example:
      - InternalAccount:019542f5-b3e7-1d02-0000-000000000002
