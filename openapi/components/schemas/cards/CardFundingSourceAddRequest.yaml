type: object
required:
  - accountId
properties:
  accountId:
    type: string
    description: >-
      Internal account id to bind to the card as an additional funding
      source. Must belong to the cardholder and be denominated in a
      card-eligible currency (USDB in v1).
    example: InternalAccount:019542f5-b3e7-1d02-0000-000000000003
  priority:
    type: integer
    minimum: 1
    description: >-
      Order Authorization Decisioning tries this source at auth time (lower =
      first). Defaults to one greater than the current highest priority on
      the card, i.e. appended at the end.
    example: 2
