type: object
description: >-
  Update request for `PATCH /cards/{id}`. At least one of `state` or
  `fundingSources` must be supplied. `state` transitions are limited to
  `ACTIVE ⇄ FROZEN`; any other transition returns
  `409 INVALID_STATE_TRANSITION`. `fundingSources`, when supplied, fully
  replaces the card's bound funding sources — the array order determines
  the priority Authorization Decisioning tries them in.
properties:
  state:
    type: string
    enum:
      - ACTIVE
      - FROZEN
    description: >-
      Target state for the card. Only `ACTIVE ⇄ FROZEN` is permitted via
      this endpoint. To close a card, use `DELETE /cards/{id}`.
    example: FROZEN
  fundingSources:
    type: array
    description: >-
      New ordered list of internal account ids to bind as funding sources.
      Fully replaces the previous binding. Each id must belong to the
      cardholder and be denominated in the card's currency. The list must
      contain at least one source — to stop a card from spending without
      removing all sources, transition it to `FROZEN` instead.
    minItems: 1
    items:
      type: string
    example:
      - InternalAccount:019542f5-b3e7-1d02-0000-000000000002
      - InternalAccount:019542f5-b3e7-1d02-0000-000000000003
