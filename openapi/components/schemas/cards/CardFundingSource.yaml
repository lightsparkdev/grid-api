type: object
required:
  - id
  - internalAccountId
  - status
properties:
  id:
    type: string
    description: Grid-issued `CardFundingSource:<uuid>` identifier for this card-account binding.
    readOnly: true
    example: CardFundingSource:019542f5-b3e7-1d02-0000-000000000011
  internalAccountId:
    type: string
    description: Internal account bound to the card through this funding source.
    example: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
  status:
    $ref: ./CardFundingSourceStatus.yaml
