type: string
enum:
  - ACTIVE
  - PENDING_AUTH
  - INACTIVE
description: |
  Status of a card funding-source binding.

  | Status | Description |
  |--------|-------------|
  | `ACTIVE` | The funding source is active and can be used by Authorization Decisioning. |
  | `PENDING_AUTH` | The funding source is bound to the card, but additional authorization is required before Authorization Decisioning can use it. Embedded Wallet funding sources use this status until an active delegated key exists for the card funding source. |
  | `INACTIVE` | The funding source is no longer active for the card. |
example: ACTIVE
