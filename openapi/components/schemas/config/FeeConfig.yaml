type: object
description: >-
  A fee collected by your platform on top of Grid's fees. Keyed uniquely by
  `(feeEventType, sourceCurrency)` within a platform. To deactivate a fee,
  send the same key with `variableFeeBps: 0` and `fixedFee.amount: 0`.
properties:
  id:
    type: string
    description: System-generated unique identifier.
    readOnly: true
    example: GridPlatformTransactionFeeConfig:019542f5-b3e7-1d02-0000-000000000007
  feeEventType:
    $ref: ./FeeEventType.yaml
  sourceCurrency:
    type: string
    description: >-
      Currency code of the sending side this fee applies to. Only `USD` is
      accepted today; other currencies return a `NOT_IMPLEMENTED` error.
    example: USD
  variableFeeBps:
    type: integer
    minimum: 0
    maximum: 10000
    description: >-
      Variable fee in basis points (1 bps = 0.01%). Multiplied by the
      transaction's source-currency amount.
    example: 30
  fixedFee:
    $ref: ../common/CurrencyAmount.yaml
    description: >-
      Fixed fee charged per transaction, in the smallest unit of
      `sourceCurrency`. `fixedFee.currency.code` must match `sourceCurrency`.
  isActive:
    type: boolean
    description: >-
      Whether this fee config is currently active. Reads return only active
      configs.
    readOnly: true
    example: true
required:
  - feeEventType
  - sourceCurrency
  - variableFeeBps
  - fixedFee
