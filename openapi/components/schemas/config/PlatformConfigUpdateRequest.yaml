type: object
properties:
  umaDomain:
    type: string
    example: mycompany.com
  webhookEndpoint:
    type: string
    example: https://api.mycompany.com/webhooks/uma
  supportedCurrencies:
    type: array
    items:
      $ref: ./PlatformCurrencyConfig.yaml
  embeddedWalletConfig:
    $ref: ./EmbeddedWalletConfig.yaml
    description: |
      Update or create the embedded-wallet configuration for this platform.
      Fields omitted from the nested object are left unchanged. Omit this
      field at the top level to leave the embedded-wallet configuration
      unchanged entirely.
  feeConfigs:
    type: array
    items:
      $ref: ./FeeConfig.yaml
    description: |
      Merge-by-key upsert of platform fee configs, keyed by
      `(feeEventType, sourceCurrency)`. Sending zero rates
      (`variableFeeBps: 0` and `fixedFee.amount: 0`) for an existing key
      deactivates it. Only `sourceCurrency: USD` is accepted today.
      Omit this field to leave fee configs unchanged.
