type: object
properties:
  umaDomain:
    type: string
    example: mycompany.com
  webhookEndpoint:
    type: string
    format: uri
    pattern: '^https://'
    minLength: 9
    description: |
      HTTPS URL where Grid will POST webhook events. Must use the `https://` scheme;
      `http://`, raw hostnames, and empty strings are rejected. Localhost and private
      hostnames are not supported in production. To clear the webhook endpoint, omit
      this field from the request rather than sending an empty string.
    example: https://api.mycompany.com/webhooks/uma
  supportedCurrencies:
    type: array
    items:
      $ref: ./PlatformCurrencyConfig.yaml
  embeddedWalletConfig:
    $ref: ./EmbeddedWalletConfig.yaml
    description: |
      Update or create the embedded-wallet configuration for this platform.
      Fields omitted from the nested object are left unchanged. Omit this
      field at the top level to leave the embedded-wallet configuration
      unchanged entirely.
