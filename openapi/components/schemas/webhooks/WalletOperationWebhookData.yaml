type: object
required:
  - operationId
  - operationType
  - status
properties:
  operationId:
    type: string
    description: The `Operation:<uuid>` id, resolvable via `GET /operations/{operationId}`.
    example: Operation:019542f5-b3e7-1d02-0000-000000000099
  operationType:
    type: string
    description: The kind of operation that reached a terminal state.
    enum:
      - auth_credential.delete
      - session.revoke
      - wallet.export
    example: wallet.export
  status:
    type: string
    description: Terminal status of the operation.
    enum:
      - completed
      - failed
    example: completed
  error:
    anyOf:
      - $ref: ../operations/OperationError.yaml
      - type: 'null'
    description: Present only on `failed`; `null` otherwise.
