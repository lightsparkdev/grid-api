type: object
required:
- type
- stablecoinExternalAccountId
properties:
  type:
    type: string
    enum:
    - ACH_DEBIT
    - SAME_DAY_ACH_DEBIT
  stablecoinExternalAccountId:
    type: string
    description: Linked provider external account to debit.
    example: StablecoinExternalAccount:019542f5-b3e7-1d02-0000-000000000005
