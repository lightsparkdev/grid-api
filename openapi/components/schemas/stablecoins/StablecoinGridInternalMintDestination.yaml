title: Grid Internal Account
allOf:
  - $ref: ./StablecoinMintDestinationBase.yaml
  - type: object
    required:
      - type
      - accountId
    properties:
      type:
        type: string
        enum:
          - GRID_INTERNAL_ACCOUNT
        description: Grid internal account mint destination. Reserved for future Grid-managed mint destinations.
        example: GRID_INTERNAL_ACCOUNT
      accountId:
        type: string
        description: Grid internal receiving account id.
        example: InternalAccount:019542f5-b3e7-1d02-0000-000000000202
    description: Grid internal account mint destination, reserved for future Grid-managed mint destinations.
