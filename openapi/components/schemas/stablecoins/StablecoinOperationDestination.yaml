type: object
description: >-
  Destination of a stablecoin operation, as reported on a
  `StablecoinOperation`. A single merged shape (superset of the
  mint and burn destination request variants) so the field is
  unambiguously deserializable regardless of operation type: `rail`
  is present for burn (fiat payout) destinations and absent for mint
  destinations.
required:
  - type
properties:
  type:
    type: string
    enum:
      - EXTERNAL_ACCOUNT
      - GRID_INTERNAL_ACCOUNT
    description: Destination variant.
  externalAccountId:
    type: string
    description: Grid `ExternalAccount` id, when the destination is an external account.
    example: ExternalAccount:019542f5-b3e7-1d02-0000-000000000205
  accountId:
    type: string
    description: Grid internal account id, when the destination is a Grid-managed account.
    example: InternalAccount:019542f5-b3e7-1d02-0000-000000000202
  rail:
    type: string
    enum:
      - WIRE
      - ACH_CREDIT
      - SAME_DAY_ACH_CREDIT
      - RTP_CREDIT
    description: Fiat payout rail, present for burn (fiat redemption) destinations.
