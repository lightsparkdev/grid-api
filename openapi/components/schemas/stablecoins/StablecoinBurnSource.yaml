type: object
required:
- type
- accountId
properties:
  type:
    type: string
    enum:
    - GRID_INTERNAL_ACCOUNT
  accountId:
    type: string
    description: Grid-controlled internal account holding the stablecoin balance to redeem.
    example: InternalAccount:019542f5-b3e7-1d02-0000-000000000006
