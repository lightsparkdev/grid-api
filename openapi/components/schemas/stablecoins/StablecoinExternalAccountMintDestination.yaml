title: External Account
allOf:
  - $ref: ./StablecoinMintDestinationBase.yaml
  - type: object
    required:
      - type
      - externalAccountId
    properties:
      type:
        type: string
        enum:
          - EXTERNAL_ACCOUNT
        description: External account mint destination. Must reference an active Spark external account.
        example: EXTERNAL_ACCOUNT
      externalAccountId:
        type: string
        description: Grid `ExternalAccount` receiving the minted stablecoin.
        example: ExternalAccount:019542f5-b3e7-1d02-0000-000000000201
    description: External account mint destination.
