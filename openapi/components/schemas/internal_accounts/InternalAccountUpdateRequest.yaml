title: Internal Account Update Request
description: >-
  Partial request body for `PATCH /internal-accounts/{id}`. At least one
  update field must be provided. On step 1 of the signed-retry flow Grid binds
  the submitted update fields into `payloadToSign`; on step 2 the client echoes
  the same fields back and Grid applies the update to the internal account.
type: object
properties:
  privateEnabled:
    type: boolean
    description: Whether wallet privacy should be enabled for the Embedded Wallet.
    example: true
