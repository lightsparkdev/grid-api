type: object
required:
  - id
  - status
  - expiresAt
  - createdAt
  - source
  - destination
  - sendingCurrency
  - receivingCurrency
  - totalSendingAmount
  - totalReceivingAmount
  - exchangeRate
  - feesIncluded
  - transactionId
properties:
  id:
    type: string
    description: Unique identifier for this quote
    example: Quote:019542f5-b3e7-1d02-0000-000000000006
  status:
    type: string
    enum:
      - PENDING
      - PROCESSING
      - COMPLETED
      - FAILED
      - EXPIRED
    description: Current status of the quote
    example: PENDING
  createdAt:
    type: string
    format: date-time
    description: When this quote was created
    example: '2025-10-03T12:00:00Z'
  expiresAt:
    type: string
    format: date-time
    description: >-
      Absolute UTC timestamp when the rate locked in this quote becomes
      invalid and the quote can no longer be executed. The window depends
      on the rail and corridor: instant rails (Lightning, Spark, USDC on
      Solana/Base/Polygon, RTP, SEPA Instant) typically expire in 1–5
      minutes; corridors with longer settlement guarantees may have longer
      windows. Always rely on this timestamp rather than assuming a fixed
      window.
    example: '2025-10-03T12:05:00Z'
  # Transfer details
  source:
    $ref: ./QuoteSourceOneOf.yaml
  destination:
    $ref: ./QuoteDestinationOneOf.yaml
  sendingCurrency:
    $ref: ../common/Currency.yaml
    description: Currency for the sending amount
  receivingCurrency:
    $ref: ../common/Currency.yaml
    description: Currency for the receiving amount
  totalSendingAmount:
    type: integer
    format: int64
    description: >-
      The total amount that will be sent in the smallest unit of the sending
      currency (eg. cents).
    exclusiveMinimum: 0
    example: 123010
  totalReceivingAmount:
    type: integer
    format: int64
    description: >-
      The total amount that will be received in the smallest unit of the
      receiving currency (eg. cents).
    exclusiveMinimum: 0
    example: 1000
  exchangeRate:
    type: number
    description: Number of sending currency units per receiving currency unit.
    exclusiveMinimum: 0
  feesIncluded:
    type: integer
    format: int64
    description: >-
      The fees associated with the quote in the smallest unit of the sending
      currency (eg. cents). Note: this value may fluctuate between quotes —
      some underlying fee components are defined in the receiving currency,
      so their equivalent in the sending currency moves with the FX rate.
      The fees shown here are locked only for the lifetime of this quote.
    minimum: 0
    example: 10
  platformFeesIncluded:
    type: integer
    format: int64
    description: >-
      The portion of `feesIncluded` collected by the platform
      (platform-configured transaction fees), in the smallest unit of the
      sending currency. 0 when the platform has no applicable fee configured.
      Already included in `feesIncluded`.
    minimum: 0
    example: 5
  paymentInstructions:
    type: array
    description: Payment instructions for executing the payment. This is not required when using an internal account source.
    items:
      $ref: ../common/PaymentInstructions.yaml
    example:
      - accountOrWalletInfo:
          accountType: USD_ACCOUNT
          paymentRails:
            - ACH
            - WIRE
          accountNumber: "1234567890"
          routingNumber: "021000021"
          bankName: "Chase Bank"
          reference: "UMA-Q12345-REF"
        instructionsNotes: "Include reference UMA-Q12345-REF in memo"
      - accountOrWalletInfo:
          accountType: SPARK_WALLET
          assetType: BTC
          address: "spark1pgssyuuuhnrrdjswal5c3s3rafw9w3y5dd4cjy3duxlf7hjzkp0rqx6dj6mrhu"
          invoice: "lnbc15u1p3xnhl2pp5jptserfk3zk4qy42tlucycrfwxhydvlemu9pqr93tuzlv9cc7g3sdqsvfhkcap3xyhx7un8cqzpgxqzjcsp5f8c52y2stc300gl6s4xswtjpc37hrnnr3c9wvtgjfuvqmpm35evq9qyyssqy4lgd8tj637qcjp05rdpxxykjenthxftej7a2zzmwrmrl70fyj9hvj0rewhzj7jfyuwkwcg9g2jpwtk3wkjtwnkdks84hsnu8xps5vsq4gj5hs"
  transactionId:
    type: string
    description: The ID of the transaction created from this quote.
    example: Transaction:019542f5-b3e7-1d02-0000-000000000005
  counterpartyInformation:
    $ref: ../transactions/CounterpartyInformation.yaml
    description: >-
      Additional information about the counterparty, if available and required
      by the platform in their configuration.
  rateDetails:
    $ref: ../transactions/OutgoingRateDetails.yaml
    description: Details about the rate and fees for the transaction.
