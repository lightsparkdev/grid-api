type: object
required:
  - source
  - destination
  - lockedCurrencySide
  - lockedCurrencyAmount
properties:
  lookupId:
    type: string
    description: >-
      Lookup ID from a previous receiver lookup request. If provided,
      this can make the quote creation more efficient by reusing cached lookup data.

      NOTE: This is required for UMA destinations due to counterparty institution requirements.
      See `senderCustomerInfo` for more information.
    example: Lookup:019542f5-b3e7-1d02-0000-000000000009
  source:
    $ref: ./QuoteSourceOneOf.yaml
  destination:
    $ref: ./QuoteDestinationOneOf.yaml
  lockedCurrencySide:
    $ref: ./QuoteLockSide.yaml
  lockedCurrencyAmount:
    type: integer
    format: int64
    description: >-
      The amount to send/receive in the smallest unit of the locked
      currency (eg. cents). See `lockedCurrencySide` for more
      information.
    exclusiveMinimum: 0
    maximum: 9000000000000000
    example: 1000
  immediatelyExecute:
    type: boolean
    description: >-
      Whether to immediately execute the quote after creation. If true,
      the quote will be executed and the transaction will be created at
      the current exchange rate. It should only be used if you don't want
      to lock and view rate details before executing the quote. If you are
      executing a pre-existing quote, use the `/quotes/{quoteId}/execute`
      endpoint instead. This is false by default.

      This can only be used for quotes with a `source` which is either an internal account,
      or has direct pull functionality (e.g. ACH pull with an external account).

      Not supported when the `source` is an internal account of type
      `EMBEDDED_WALLET`: those transfers require a `Grid-Wallet-Signature`
      over the `payloadToSign` returned in the quote response, which is not
      available in a combined create-and-execute call. Create the quote
      first with `immediatelyExecute: false` and then call
      `POST /quotes/{quoteId}/execute` with the signature header.
    example: false
  description:
    type: string
    description: Optional description/memo for the transfer
    example: 'Invoice #1234 payment'
  purposeOfPayment:
    $ref: ./PurposeOfPayment.yaml
  senderCustomerInfo:
    type: object
    additionalProperties: true
    description: >
      Key-value pairs of additional information about the sender which was
      requested by the destination.
      This is relevant when the destination requires more sender info than
      was provided during customer creation.

      Any fields specified in `requiredPayerDataFields` from the
      response of the `/receiver/uma/{receiverUmaAddress}` (lookupUma) or
      `/receiver/external-account/{accountId}` (lookupExternalAccount)
      endpoints
      MUST be provided here if they were requested. If the destination did
      not request any additional information, this field can be omitted.
    example:
      FULL_NAME: Jane Receiver
      NATIONALITY: FR
