type: object
description: >-
  Machine-readable validator hint. Platforms use it to pre-validate their own
  onboarding form before submitting, and to render form UI (e.g., surface a
  dropdown for `enum`, mask input by `pattern`).
properties:
  format:
    type: string
    description: >-
      Named format the value must satisfy. Examples: `date`, `email`, `iso3166-1-alpha-2`,
      `bcp47-language-tag`.
    example: iso3166-1-alpha-2
  pattern:
    type: string
    description: Regular expression the value must match (JavaScript-flavor).
    example: ^\d{5}(-\d{4})?$
  enum:
    type: array
    items:
      type: string
    description: Allowed values when the field is drawn from a fixed set.
    example:
      - SSN
      - ITIN
      - NON_US_TAX_ID
  minLength:
    type: integer
    description: Minimum length in characters.
    example: 1
  maxLength:
    type: integer
    description: Maximum length in characters.
    example: 500
