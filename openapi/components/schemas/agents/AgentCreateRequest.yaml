type: object
required:
  - name
  - customerId
  - policy
properties:
  name:
    type: string
    description: Human-readable name to identify the agent.
    example: Payroll Automation Agent
  customerId:
    type: string
    description: The ID of the customer this agent will operate on behalf of.
    example: Customer:019542f5-b3e7-1d02-0000-000000000001
  policy:
    $ref: ./AgentPolicy.yaml
