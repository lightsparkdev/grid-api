type: object
description: Spending limits that cap the agent's transaction amounts and frequency.
required:
  - perTransactionLimit
properties:
  perTransactionLimit:
    type: integer
    description: Maximum amount the agent can transfer in a single transaction, in the smallest unit of the relevant currency.
    example: 50000
  dailyLimit:
    type:
      - integer
      - 'null'
    description: Maximum total amount the agent can transfer per day, in the smallest unit of the relevant currency. Null means no daily limit.
    example: 500000
  dailyTransactionLimit:
    type: integer
    description: Maximum number of transactions the agent can initiate per day.
    example: 10
  monthlyLimit:
    type:
      - integer
      - 'null'
    description: Maximum total amount the agent can transfer per month, in the smallest unit of the relevant currency. Null means no monthly limit.
    example: 5000000
