type: object
description: >-
  Spending limits that cap the agent's transaction amounts and frequency. All amount
  fields are integers in the smallest unit of the specified currency. When a transaction
  is denominated in a different currency, Grid converts using the exchange rate at
  evaluation time.
required:
  - currency
  - perTransactionLimit
properties:
  currency:
    type: string
    description: ISO 4217 currency code that all amount limits are denominated in.
    example: USD
  perTransactionLimit:
    type: integer
    description: Maximum amount the agent can transfer in a single transaction.
    example: 50000
  dailyLimit:
    type:
      - integer
      - 'null'
    description: Maximum total amount the agent can transfer per day. Null means no daily limit.
    example: 500000
  dailyTransactionLimit:
    type: integer
    description: Maximum number of transactions the agent can initiate per day.
    example: 10
  monthlyLimit:
    type:
      - integer
      - 'null'
    description: Maximum total amount the agent can transfer per month. Null means no monthly limit.
    example: 5000000
