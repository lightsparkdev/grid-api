title: Agent Spending Limits Update
type: object
description: Partial update to spending limits. Only provided fields will be updated; omitted fields retain their current values.
properties:
  currency:
    type: string
    description: ISO 4217 currency code that all amount limits are denominated in. Updating this recasts all existing limits into the new currency denomination.
    example: USD
  perTransactionLimit:
    type: integer
    description: Maximum amount per transaction.
    example: 50000
  dailyLimit:
    type:
      - integer
      - 'null'
    description: Maximum daily spend. Set to null to remove the daily limit.
    example: 500000
  dailyTransactionLimit:
    type: integer
    description: Maximum number of transactions per day.
    example: 10
  monthlyLimit:
    type:
      - integer
      - 'null'
    description: Maximum monthly spend. Set to null to remove the monthly limit.
    example: 5000000
