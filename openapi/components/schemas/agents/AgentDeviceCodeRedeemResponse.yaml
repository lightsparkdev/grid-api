type: object
required:
  - agentId
  - agentName
  - accessToken
  - policy
properties:
  agentId:
    type: string
    description: The agent's system-generated ID.
    example: Agent:019542f5-b3e7-1d02-0000-000000000001
  agentName:
    type: string
    description: The agent's name.
    example: Payroll Automation Agent
  accessToken:
    type: string
    description: >-
      Bearer token used to authenticate all subsequent API calls as this agent.
      Pass as `Authorization: Bearer <accessToken>`. This token is returned only
      once and must be stored securely — it cannot be retrieved again.
    example: gat_ed0ad25881e234cc28fb2dec0a4fe64e4172a3b9
  policy:
    $ref: ./AgentPolicy.yaml
