type: object
required:
  - id
  - status
  - type
  - direction
  - destination
  - customerId
  - platformCustomerId
properties:
  id:
    type: string
    description: Unique identifier for the transaction
    example: Transaction:019542f5-b3e7-1d02-0000-000000000004
  status:
    $ref: ./TransactionStatus.yaml
  type:
    $ref: ./TransactionType.yaml
  direction:
    $ref: ./TransactionDirection.yaml
    description: Whether this transaction credits or debits the customer's account.
  destination:
    $ref: ./TransactionDestinationOneOf.yaml
  customerId:
    type: string
    description: System ID of the customer that initiated the transaction
    example: Customer:019542f5-b3e7-1d02-0000-000000000001
  platformCustomerId:
    type: string
    description: Platform-specific ID of the customer that initiated the transaction
    example: 18d3e5f7b4a9c2
  settledAt:
    type: string
    format: date-time
    description: When the payment was or will be settled
    example: '2025-08-15T14:30:00Z'
  createdAt:
    type: string
    format: date-time
    description: When the transaction was created
    example: '2025-08-15T14:25:18Z'
  updatedAt:
    type: string
    format: date-time
    description: When the transaction was last updated
    example: '2025-08-15T14:30:00Z'
  receiptDeliveryConfirmedAt:
    type: string
    format: date-time
    description: >-
      The time at which the platform confirmed delivery of the receipt to their
      customer.
    example: '2025-08-15T14:31:00Z'
  agentId:
    type: string
    description: >-
      If this transaction was initiated by an agent, the system-generated ID of that agent.
      Absent for platform-initiated transactions.
    example: Agent:019542f5-b3e7-1d02-0000-000000000042
  description:
    type: string
    description: Optional memo or description for the payment
    example: 'Payment for invoice #1234'
  sentAmount:
    $ref: ../common/CurrencyAmount.yaml
    description: Amount sent in the sender's currency
  exchangeRate:
    type: number
    description: Number of sending currency units per receiving currency unit.
    exclusiveMinimum: 0
    example: 1.08
  quoteId:
    type: string
    description: The ID of the quote that was used to trigger this payment
    example: Quote:019542f5-b3e7-1d02-0000-000000000006
  refund:
    $ref: ../common/Refund.yaml
    description: The refund if transaction was refunded.
  counterpartyInformation:
    $ref: ./CounterpartyInformation.yaml
