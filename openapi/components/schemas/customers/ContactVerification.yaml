type: object
description: >-
  Email and phone verification state for the customer. This object is **only
  present when the customer's regulatory jurisdiction requires email and phone
  verification** (e.g. EU customers). For customers who have no such
  requirement, this object is omitted entirely — no action is needed.


  When present, both channels must reach `VERIFIED` before the customer can begin
  KYC. Drive each channel with `POST /customers/{customerId}/verify-email` and
  `POST /customers/{customerId}/verify-phone` (and their `/confirm` sub-routes).
properties:
  email:
    $ref: ./ContactVerificationStatus.yaml
    description: Verification status of the customer's email address.
  phone:
    $ref: ./ContactVerificationStatus.yaml
    description: Verification status of the customer's phone number.
required:
  - email
  - phone
