description: >-
  Request body for `POST /customers/edd`. Composes the full `CustomerEdd`
  field set and adds the required `customerId` link.
allOf:
  - $ref: ./CustomerEdd.yaml
  - type: object
    required:
      - customerId
    properties:
      customerId:
        type: string
        description: The Grid customer ID whose EDD data is being created or replaced.
        example: Customer:019542f5-b3e7-1d02-0000-000000000001
