type: object
required:
  - idType
  - identifier
properties:
  idType:
    $ref: ./IdentificationType.yaml
  identifier:
    type: string
    description: >-
      The tax-identification number. For US persons this is the SSN (format
      `###-##-####`) or ITIN. For non-US persons this is the tax number issued
      by `countryOfIssuance`.
    example: 123-45-6789
  countryOfIssuance:
    type: string
    description: >-
      Country that issued the tax identifier (ISO 3166-1 alpha-2). Required
      when `idType` is `NON_US_TAX_ID`.
    example: US
