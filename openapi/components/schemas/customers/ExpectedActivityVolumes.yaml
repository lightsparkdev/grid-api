type: object
description: Expected monthly transaction activity for the business
properties:
  monthlyTransactionCount:
    type: string
    enum:
      - COUNT_UNDER_10
      - COUNT_10_TO_100
      - COUNT_100_TO_500
      - COUNT_500_TO_1000
      - COUNT_OVER_1000
    description: Expected number of transactions per month
    example: COUNT_100_TO_500
  monthlyTransactionVolume:
    type: string
    enum:
      - VOLUME_UNDER_10K
      - VOLUME_10K_TO_100K
      - VOLUME_100K_TO_1M
      - VOLUME_1M_TO_10M
      - VOLUME_OVER_10M
    description: Expected total transaction volume per month in USD equivalent
    example: VOLUME_100K_TO_1M
