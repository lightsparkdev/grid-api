title: Customer Update Request
description: >-
  Request body for `PATCH /customers/{customerId}`. When `email` changes for a
  customer with tied Embedded Wallet internal accounts, Grid updates the
  customer email and every tied `EMAIL_OTP` credential across all tied Embedded
  Wallets through the endpoint's signed-retry flow.
type: object
required:
  - customerType
properties:
  customerType:
    allOf:
      - $ref: ./CustomerType.yaml
    description: |
      Must equal the existing customer's `customerType`. This field is required
      on PATCH because it discriminates the request body shape (INDIVIDUAL vs
      BUSINESS); it is not the way to change customer type. Requests that
      submit a different `customerType` than the existing record will be
      rejected with `INVALID_INPUT`. To change the legal classification of a
      customer, create a new customer and migrate its accounts.
  currencies:
    type: array
    items:
      type: string
    description: >-
      Updated list of currency codes the customer will use (ISO 4217 for fiat, e.g. "USD", "EUR";
      tickers for crypto, e.g. "BTC", "USDC"). Replaces the existing list. Some currency
      combinations may require separate customers — if so, the request will be rejected
      with details.
    example:
      - USD
      - EUR
      - USDC
  email:
    type: string
    format: email
    description: >-
      Email address for the customer. For customers with tied Embedded Wallet
      internal accounts, changing this value also updates every tied
      `EMAIL_OTP` credential across all tied Embedded Wallets.
    example: john.doe@example.com
  umaAddress:
    type: string
    description: >-
      Optional UMA address identifier. If provided, the customer's UMA address will be updated.
      This is an optional identifier to route payments to the customer.
    example: $john.doe@uma.domain.com
