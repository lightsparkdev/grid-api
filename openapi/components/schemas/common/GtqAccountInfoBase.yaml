type: object
required:
- accountType
- accountNumber
- bankAccountType
- bankName
properties:
  accountType:
    type: string
    enum:
    - GTQ_ACCOUNT
  accountNumber:
    type: string
    description: The account number of the bank
    minLength: 1
    maxLength: 34
  bankAccountType:
    type: string
    description: The type of the bank account
    enum:
    - CHECKING
    - SAVINGS
  bankName:
    type: string
    description: The name of the beneficiary's bank
    minLength: 1
    maxLength: 255
    example: Banco GYT Continental
example:
  accountType: GTQ_ACCOUNT
  accountNumber: '1234567890'
  bankAccountType: CHECKING
  bankName: Banco GYT Continental
