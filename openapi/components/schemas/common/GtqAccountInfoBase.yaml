type: object
required:
- accountType
- accountNumber
- bankAccountType
properties:
  accountType:
    type: string
    enum:
    - GTQ_ACCOUNT
  accountNumber:
    type: string
    description: The account number of the bank
    minLength: 1
    maxLength: 34
  bankAccountType:
    type: string
    description: The bank account type
    enum:
    - CHECKING
    - SAVINGS
example:
  accountType: GTQ_ACCOUNT
  accountNumber: '1234567890'
  bankAccountType: CHECKING
