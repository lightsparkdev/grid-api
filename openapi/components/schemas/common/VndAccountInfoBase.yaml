type: object
required:
- accountType
- bankName
- accountNumber
- swiftCode
properties:
  accountType:
    type: string
    enum:
    - VND_ACCOUNT
  bankName:
    type: string
    description: The name of the bank
    minLength: 1
    maxLength: 255
  accountNumber:
    type: string
    description: Vietnamese bank account number
    minLength: 1
    maxLength: 34
    example: '1234567890'
  swiftCode:
    type: string
    description: The SWIFT/BIC code of the bank
    example: BFTVVNVX
    minLength: 8
    maxLength: 11
    pattern: ^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$
