type: object
required:
- accountType
- accountNumber
- bankName
properties:
  accountType:
    type: string
    enum:
    - NGN_ACCOUNT
  accountNumber:
    type: string
    description: Nigerian bank account number
    minLength: 10
    maxLength: 10
    example: '0123456789'
    pattern: ^[0-9]{10}$
  bankName:
    type: string
    description: The name of the bank
    minLength: 1
    maxLength: 255
