type: object
required:
- accountType
- swiftCode
- bankName
- country
properties:
  accountType:
    type: string
    enum:
    - SWIFT_ACCOUNT
  country:
    type: string
    description: The ISO 3166-1 alpha-2 country code of the bank account
    example: NG
    minLength: 2
    maxLength: 2
    pattern: ^[A-Z]{2}$
  swiftCode:
    type: string
    description: The SWIFT/BIC code of the bank
    example: DEUTDEFF
    minLength: 8
    maxLength: 11
    pattern: ^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$
  bankName:
    type: string
    description: The name of the bank
    example: Deutsche Bank
    minLength: 1
    maxLength: 255
  accountNumber:
    type: string
    description: >-
      The bank account number. Required for most corridors.
      Use iban instead for IBAN-only corridors (e.g. BR, GB).
    example: '1234567890'
    minLength: 1
    maxLength: 34
  iban:
    type: string
    description: >-
      The IBAN of the bank account. Required for IBAN-only corridors (e.g. BR, GB).
      Use accountNumber for all other corridors.
    example: GB29NWBK60161331926819
    minLength: 15
    maxLength: 34
    pattern: ^[A-Z]{2}[0-9]{2}[A-Za-z0-9]{11,30}$
example:
  accountType: SWIFT_ACCOUNT
  country: NG
  swiftCode: DEUTDEFF
  bankName: Deutsche Bank
  accountNumber: '1234567890'
