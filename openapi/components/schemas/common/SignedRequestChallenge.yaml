title: Signed Request Challenge
type: object
required:
  - payloadToSign
  - requestId
  - expiresAt
description: >-
  Common base for two-step signed-retry challenge responses on
  Embedded Wallet endpoints (credential revocation, session revocation,
  wallet export, and similar). Holds the signing fields shared across
  every challenge shape; each variant composes this base via `allOf`
  and adds its own resource `id` (and `type`, when applicable) with
  variant-specific description and example.
properties:
  payloadToSign:
    type: string
    description: >-
      Payload that must be signed with the session private key of a
      verified authentication credential. The resulting signature is
      passed as the `Grid-Wallet-Signature` header on the retry of the
      originating request to complete the operation.
    example: Y2hhbGxlbmdlLXBheWxvYWQtdG8tc2lnbg==
  requestId:
    type: string
    description: >-
      Unique identifier for this request. Must be echoed in the
      `Request-Id` header on the signed retry so the server can
      correlate the retry with the issued challenge.
    example: 7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
  expiresAt:
    type: string
    format: date-time
    description: >-
      Timestamp after which this challenge is no longer valid. The
      signed retry must be submitted before this time.
    example: '2026-04-08T15:35:00Z'
