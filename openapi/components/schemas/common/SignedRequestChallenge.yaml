title: Signed Request Challenge
type: object
required:
  - payloadToSign
  - requestId
  - expiresAt
description: >-
  Common base for two-step signed-retry challenge responses on
  Embedded Wallet endpoints (credential registration or revocation,
  session refresh or revocation, wallet export, customer email updates,
  and similar). Holds the signing fields shared across every challenge
  shape; each variant composes this base via `allOf` and adds its own
  resource `id` (and `type`, when applicable) with variant-specific
  description and example.
properties:
  payloadToSign:
    type: string
    description: >-
      Canonical payload for the retry authorization stamp. Build an
      API-key stamp over this exact value with the session API keypair,
      then send the full base64url-encoded stamp in
      `Grid-Wallet-Signature` on the retry that completes the original
      request.
    example: '{"organizationId":"org_2m9F...","parameters":{"userId":"user_2m9F..."},"timestampMs":"1775681700000","type":"ACTIVITY_TYPE_EXAMPLE"}'
  requestId:
    type: string
    description: >-
      Grid-issued `Request:<uuid>` identifier for this pending request.
      Echo this value exactly in the `Request-Id` header on the signed
      retry so the server can correlate the retry with the issued challenge.
    example: Request:7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
  expiresAt:
    type: string
    format: date-time
    description: >-
      Timestamp after which this challenge is no longer valid. The
      signed retry must be submitted before this time.
    example: '2026-04-08T15:35:00Z'
