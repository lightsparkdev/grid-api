type: object
required:
- accountType
- accountNumber
- phoneNumber
properties:
  accountType:
    type: string
    enum:
    - PKR_ACCOUNT
  accountNumber:
    type: string
    description: The account number of the bank
    minLength: 1
    maxLength: 34
  iban:
    type: string
    description: The IBAN of the bank account
    example: DE89370400440532013000
    minLength: 15
    maxLength: 34
    pattern: ^[A-Z]{2}[0-9]{2}[A-Za-z0-9]{11,30}$
  phoneNumber:
    type: string
    description: The phone number in international format
    example: '+1234567890'
    minLength: 7
    maxLength: 15
    pattern: ^\+[0-9]{6,14}$
