type: object
required:
- accountType
- paymentRails
- accountNumber
- bankName
properties:
  accountType:
    type: string
    enum:
    - ZAR_ACCOUNT
  paymentRails:
    type: array
    items:
      type: string
      enum:
      - BANK_TRANSFER
  accountNumber:
    type: string
    description: The account number of the bank
  bankName:
    type: string
    description: The bank name of the bank
