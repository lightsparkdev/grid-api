type: object
required:
- accountType
- paymentRails
- phoneNumber
- provider
properties:
  accountType:
    type: string
    enum:
    - TZS_ACCOUNT
  paymentRails:
    type: array
    items:
      type: string
      enum:
      - MOBILE_MONEY
  phoneNumber:
    type: string
    description: The phone number for the mobile money account
  provider:
    type: string
    description: The mobile money provider
