type: object
required:
- accountType
- paymentRails
- bankName
- accountNumber
- bankAccountType
- phoneNumber
properties:
  accountType:
    type: string
    enum:
    - COP_ACCOUNT
  paymentRails:
    type: array
    items:
      type: string
      enum:
      - BANK_TRANSFER
      - MOBILE_MONEY
  bankName:
    type: string
    description: The name of the bank
    minLength: 1
    maxLength: 255
  accountNumber:
    type: string
    description: The account number of the bank
    minLength: 1
    maxLength: 34
  bankAccountType:
    type: string
    description: The bank account type
    enum:
    - CHECKING
    - SAVINGS
  phoneNumber:
    type: string
    description: The phone number in international format
    example: '+1234567890'
    minLength: 7
    maxLength: 15
    pattern: ^\+[0-9]{6,14}$
