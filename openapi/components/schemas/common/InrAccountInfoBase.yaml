type: object
required:
- accountType
- vpa
properties:
  accountType:
    type: string
    enum:
    - INR_ACCOUNT
  vpa:
    type: string
    description: The UPI Virtual Payment Address
    example: user@upi
    minLength: 3
    maxLength: 255
    pattern: ^[a-zA-Z0-9.\-_]+@[a-zA-Z0-9]+$
example:
  accountType: INR_ACCOUNT
  vpa: user@upi
