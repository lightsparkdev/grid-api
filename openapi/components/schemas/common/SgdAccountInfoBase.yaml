type: object
required:
- accountType
- accountNumber
- swiftCode
properties:
  accountType:
    type: string
    enum:
    - SGD_ACCOUNT
  bankName:
    type: string
    description: Name of the beneficiary's bank. When omitted, resolved from swiftCode
      via the payout partner bank directory at account creation.
    minLength: 1
    maxLength: 255
    example: DBS Bank Ltd
  accountNumber:
    type: string
    description: Bank account number
    minLength: 1
    maxLength: 34
    example: '0123456789'
  swiftCode:
    type: string
    description: The SWIFT/BIC code of the bank
    example: DBSSSGSG
    minLength: 8
    maxLength: 11
    pattern: ^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$
example:
  accountType: SGD_ACCOUNT
  bankName: DBS Bank Ltd
  accountNumber: '0123456789'
  swiftCode: DBSSSGSG
