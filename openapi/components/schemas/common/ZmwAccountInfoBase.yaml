type: object
required:
- accountType
- phoneNumber
- provider
properties:
  accountType:
    type: string
    enum:
    - ZMW_ACCOUNT
  phoneNumber:
    type: string
    description: Zambian mobile money phone number
    example: '+260971234567'
    minLength: 7
    maxLength: 15
    pattern: ^\+260[0-9]{9}$
  provider:
    type: string
    description: The mobile money provider name
    minLength: 1
    maxLength: 255
example:
  accountType: ZMW_ACCOUNT
  phoneNumber: '+260971234567'
  provider: Example Provider
