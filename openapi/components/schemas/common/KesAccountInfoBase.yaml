type: object
required:
- accountType
- phoneNumber
- provider
properties:
  accountType:
    type: string
    enum:
    - KES_ACCOUNT
  phoneNumber:
    type: string
    description: Kenyan mobile money phone number
    example: '+254712345678'
    minLength: 7
    maxLength: 15
    pattern: ^\+254[0-9]{9}$
  provider:
    type: string
    description: The mobile money provider name
    minLength: 1
    maxLength: 255
example:
  accountType: KES_ACCOUNT
  phoneNumber: '+254712345678'
  provider: Example Provider
