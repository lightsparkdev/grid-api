title: COP Account
allOf:
  - $ref: ./BasePaymentAccountInfo.yaml
  - type: object
    required:
      - paymentUrl
    properties:
      accountType:
        type: string
        enum:
          - COP_ACCOUNT
      paymentUrl:
        type: string
        format: uri
        description: A payment URL where the customer can complete their COP deposit.
        example: https://payments.example.com/t/abc123