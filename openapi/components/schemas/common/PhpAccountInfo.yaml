type: object
required:
- accountType
- paymentRails
- bankName
- accountNumber
properties:
  accountType:
    type: string
    enum:
    - PHP_ACCOUNT
  paymentRails:
    type: array
    items:
      type: string
      enum:
      - BANK_TRANSFER
  bankName:
    type: string
    description: The name of the bank
    minLength: 1
    maxLength: 255
  accountNumber:
    type: string
    description: The account number of the bank
    minLength: 1
    maxLength: 34
