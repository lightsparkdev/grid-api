type: object
required:
- accountType
- paymentRails
- pixKey
- pixKeyType
- taxId
properties:
  accountType:
    type: string
    enum:
    - BRL_ACCOUNT
  paymentRails:
    type: array
    items:
      type: string
      enum:
      - PIX
  pixKey:
    type: string
    description: The PIX key (email, phone, CPF, CNPJ, or random)
    minLength: 1
    maxLength: 77
  pixKeyType:
    type: string
    description: The type of PIX key
    enum:
    - email
    - phone
    - cpf
    - cnpj
    - random
  taxId:
    type: string
    description: The tax ID (CPF or CNPJ)
    minLength: 11
    maxLength: 14
    pattern: ^[0-9]{11,14}$
