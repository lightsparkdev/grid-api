type: object
required:
  - accountType
  - countries
  - paymentRails
  - phoneNumber
  - provider
properties:
  accountType:
    type: string
    enum:
      - XOF_ACCOUNT
  countries:
    type: array
    items:
      type: string
      enum:
      - SN
      - BJ
      - CI
  paymentRails:
    type: array
    items:
      type: string
      enum:
      - MOBILE_MONEY
  phoneNumber:
    type: string
    description: West African mobile money phone number (Senegal, Benin, or Ivory Coast)
    example: '+221781234567'
    pattern: ^\+(221|225|229)[0-9]{8,10}$
  provider:
    type: string
    description: Mobile money provider
