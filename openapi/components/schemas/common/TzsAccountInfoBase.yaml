type: object
required:
- accountType
- phoneNumber
- provider
properties:
  accountType:
    type: string
    enum:
    - TZS_ACCOUNT
  phoneNumber:
    type: string
    description: Tanzanian mobile money phone number
    example: '+255712345678'
    minLength: 7
    maxLength: 15
    pattern: ^\+255[0-9]{9}$
  provider:
    type: string
    description: The mobile money provider name
    minLength: 1
    maxLength: 255
example:
  accountType: TZS_ACCOUNT
  phoneNumber: '+255712345678'
  provider: Example Provider
