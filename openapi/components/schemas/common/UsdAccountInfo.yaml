type: object
required:
- accountType
- paymentRails
- accountNumber
- routingNumber
- bankName
properties:
  accountType:
    type: string
    enum:
    - USD_ACCOUNT
  paymentRails:
    type: array
    items:
      type: string
      enum:
      - ACH
      - WIRE
      - RTP
      - FEDNOW
      - BANK_TRANSFER
  accountNumber:
    type: string
    description: The account number of the bank
    minLength: 1
    maxLength: 34
  routingNumber:
    type: string
    description: The ABA routing number
    example: '021000021'
    minLength: 9
    maxLength: 9
    pattern: ^[0-9]{9}$
  bankName:
    type: string
    description: The name of the bank
    minLength: 1
    maxLength: 255
