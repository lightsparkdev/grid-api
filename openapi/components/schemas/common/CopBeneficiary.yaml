title: Individual Beneficiary
type: object
required:
- beneficiaryType
- fullName
properties:
  beneficiaryType:
    type: string
    enum:
    - INDIVIDUAL
  fullName:
    type: string
    description: The full name of the beneficiary
  birthDate:
    type: string
    description: The birth date of the beneficiary
  nationality:
    type: string
    description: The nationality of the beneficiary
  email:
    type: string
    description: The email of the beneficiary
  phoneNumber:
    type: string
    description: The phone number of the beneficiary
  countryOfResidence:
    type: string
    description: The country of residence of the beneficiary
  address:
    $ref: ./Address.yaml
  documentType:
    type: string
    description: 'Identity document type — required by most Colombian banks.
      CC: Cédula de Ciudadanía, CE: Cédula de Extranjería, TI: Tarjeta de
      Identidad, NIT: Número de Identificación Tributaria, PP: Passport'
    enum:
    - CC
    - CE
    - TI
    - NIT
    - PP
  documentNumber:
    type: string
    description: Identity document number — required by most Colombian banks
    minLength: 1
    maxLength: 50
