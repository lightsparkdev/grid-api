type: object
required:
- accountType
- accountNumber
- routingNumber
properties:
  accountType:
    type: string
    enum:
    - USD_ACCOUNT
  accountNumber:
    type: string
    description: The account number of the bank
    minLength: 1
    maxLength: 34
  routingNumber:
    type: string
    description: The ABA routing number
    example: '021000021'
    minLength: 9
    maxLength: 9
    pattern: ^[0-9]{9}$
  accountHolderName:
    type: string
    description: The name of the account holder at the receiving bank
    example: Jane Doe
  bankAddress:
    allOf:
    - $ref: ./Address.yaml
    description: The address of the receiving bank
example:
  accountType: USD_ACCOUNT
  accountNumber: '1234567890'
  routingNumber: '021000021'
  accountHolderName: Jane Doe
