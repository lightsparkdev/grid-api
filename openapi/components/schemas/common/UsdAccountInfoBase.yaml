type: object
required:
- accountType
- accountNumber
- routingNumber
- phoneNumber
properties:
  accountType:
    type: string
    enum:
    - USD_ACCOUNT
  accountNumber:
    type: string
    description: The account number of the bank
    minLength: 1
    maxLength: 34
  routingNumber:
    type: string
    description: The ABA routing number
    example: '021000021'
    minLength: 9
    maxLength: 9
    pattern: ^[0-9]{9}$
  phoneNumber:
    type: string
    description: The phone number in international format
    example: '+1234567890'
    minLength: 7
    maxLength: 15
    pattern: ^\+[0-9]{6,14}$
