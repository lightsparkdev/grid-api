type: object
required:
  - reference
properties:
  reference:
    type: string
    description: >-
      Unique reference code to include with the payment to match it with the
      correct incoming transaction, when available.
    example: UMA-Q12345-REF
  transactionHash:
    type: string
    description: >-
      Transaction hash for the crypto transfer that delivered funds to the
      transaction destination, when available.
    example: "0x9f2c6b6f4b6c8f2a8d9e0b1c2d3e4f5061728394a5b6c7d8e9f00112233445566"
