type: object
required:
- accountType
- paymentRails
- bankCode
- bankName
- accountNumber
- swiftBic
properties:
  accountType:
    type: string
    enum:
    - HKD_ACCOUNT
  paymentRails:
    type: array
    items:
      type: string
      enum:
      - BANK_TRANSFER
  bankCode:
    type: string
    description: The bank code
    minLength: 3
    maxLength: 3
    pattern: ^[0-9]{3}$
  bankName:
    type: string
    description: The name of the bank
    minLength: 1
    maxLength: 255
  accountNumber:
    type: string
    description: The account number of the bank
    minLength: 1
    maxLength: 34
  swiftBic:
    type: string
    description: The SWIFT/BIC code of the bank
    example: DEUTDEFF
    minLength: 8
    maxLength: 11
    pattern: ^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$
