title: Individual Beneficiary
type: object
required:
- beneficiaryType
- fullName
properties:
  beneficiaryType:
    type: string
    enum:
    - INDIVIDUAL
    example: INDIVIDUAL
  fullName:
    type: string
    description: The full name of the beneficiary
    example: Jane Smith
  birthDate:
    type: string
    description: The birth date of the beneficiary
    example: '1990-01-15'
  nationality:
    type: string
    description: The nationality of the beneficiary
    example: GB
  email:
    type: string
    description: The email of the beneficiary
    example: jane.smith@example.com
  phoneNumber:
    type: string
    description: The phone number of the beneficiary
    example: '+447700900123'
  countryOfResidence:
    type: string
    description: The country of residence of the beneficiary
    example: GB
  address:
    $ref: ./Address.yaml
