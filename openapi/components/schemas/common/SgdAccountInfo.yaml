type: object
required:
- accountType
- paymentRails
- bankName
- accountNumber
- swiftCode
properties:
  accountType:
    type: string
    enum:
    - SGD_ACCOUNT
  paymentRails:
    type: array
    items:
      type: string
      enum:
      - BANK_TRANSFER
      - PAYNOW
      - FAST
  bankName:
    type: string
    description: The bank name of the bank
  accountNumber:
    type: string
    description: The account number of the bank
  swiftCode:
    type: string
    description: The SWIFT/BIC code of the bank
