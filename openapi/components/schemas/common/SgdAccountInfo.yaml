type: object
required:
- accountType
- paymentRails
- bankName
- accountNumber
- swiftBic
properties:
  accountType:
    type: string
    enum:
    - SGD_ACCOUNT
  paymentRails:
    type: array
    items:
      type: string
      enum:
      - PAYNOW
      - FAST
      - BANK_TRANSFER
  bankName:
    type: string
    description: Name of the beneficiary's bank
    minLength: 1
    maxLength: 255
    example: DBS Bank Ltd
  accountNumber:
    type: string
    description: Bank account number
    minLength: 1
    maxLength: 34
    example: 0123456789
  swiftBic:
    type: string
    description: The SWIFT/BIC code of the bank
    example: DEUTDEFF
    minLength: 8
    maxLength: 11
    pattern: ^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$
