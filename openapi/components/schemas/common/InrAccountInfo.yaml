type: object
required:
- accountType
- paymentRails
- vpa
properties:
  accountType:
    type: string
    enum:
    - INR_ACCOUNT
  paymentRails:
    type: array
    items:
      type: string
      enum:
      - UPI
  vpa:
    type: string
    description: The UPI Virtual Payment Address
    example: user@upi
    minLength: 3
    maxLength: 255
    pattern: ^[a-zA-Z0-9.\-_]+@[a-zA-Z0-9]+$
