type: object
required:
- accountType
- bankName
- accountNumber
- branchCode
- phoneNumber
properties:
  accountType:
    type: string
    enum:
    - BDT_ACCOUNT
  bankName:
    type: string
    description: The name of the bank
    minLength: 1
    maxLength: 255
  accountNumber:
    type: string
    description: The account number of the bank
    minLength: 1
    maxLength: 34
  branchCode:
    type: string
    description: The branch code
    minLength: 5
    maxLength: 5
    pattern: ^[0-9]{5}$
  swiftCode:
    type: string
    description: The SWIFT/BIC code of the bank
    example: DEUTDEFF
    minLength: 8
    maxLength: 11
    pattern: ^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$
  phoneNumber:
    type: string
    description: The phone number in international format
    example: '+1234567890'
    minLength: 7
    maxLength: 15
    pattern: ^\+[0-9]{6,14}$
