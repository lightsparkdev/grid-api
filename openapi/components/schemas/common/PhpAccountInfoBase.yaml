type: object
required:
- accountType
- bankName
- accountNumber
properties:
  accountType:
    type: string
    enum:
    - PHP_ACCOUNT
  bankName:
    type: string
    description: Name of the beneficiary's bank
    minLength: 1
    maxLength: 255
    example: BDO Unibank
  accountNumber:
    type: string
    description: Bank account number
    minLength: 8
    maxLength: 16
    example: '001234567890'
    pattern: ^[0-9]{8,16}$
  rail:
    type: string
    description: The payment rail to route the payout over, for currencies that support
      more than one (e.g. NEFT or RTGS for INR).
    example: NEFT
    minLength: 1
    maxLength: 32
example:
  accountType: PHP_ACCOUNT
  bankName: BDO Unibank
  accountNumber: '001234567890'
  rail: NEFT
