type: object
required:
- accountType
description: 'Required fields depend on the selected paymentRails:

  - BANK_TRANSFER: bankAccountType, accountNumber

  - MOBILE_MONEY: phoneNumber'
properties:
  accountType:
    type: string
    enum:
    - SLV_ACCOUNT
  bankName:
    type: string
    description: The name of the bank (BANK_TRANSFER only)
    minLength: 1
    maxLength: 255
  accountNumber:
    type: string
    description: The account number of the bank (BANK_TRANSFER only)
    minLength: 1
    maxLength: 34
  bankAccountType:
    type: string
    description: The bank account type (BANK_TRANSFER only)
    enum:
    - CHECKING
    - SAVINGS
  phoneNumber:
    type: string
    description: The phone number in international format (MOBILE_MONEY only — e.g.
      Tigo Money)
    example: '+50312345678'
    minLength: 7
    maxLength: 15
    pattern: ^\+[0-9]{6,14}$
example:
  accountType: SLV_ACCOUNT
  bankName: Banco Cuscatlan
  accountNumber: '0123456789'
  bankAccountType: CHECKING
