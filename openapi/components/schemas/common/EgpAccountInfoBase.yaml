type: object
required:
- accountType
- bankName
description: 'Required fields depend on the selected paymentRails:

  - BANK_TRANSFER: bankName, iban

  - MOBILE_MONEY: bankName, phoneNumber'
properties:
  accountType:
    type: string
    enum:
    - EGP_ACCOUNT
  iban:
    type: string
    description: Egyptian IBAN (29 characters, starting with EG)
    example: EG380019000500000000263180002
    minLength: 29
    maxLength: 29
    pattern: ^EG[0-9]{27}$
  bankName:
    type: string
    description: The name of the bank
    minLength: 1
    maxLength: 255
  phoneNumber:
    type: string
    description: The phone number in international format
    example: '+1234567890'
    minLength: 7
    maxLength: 15
    pattern: ^\+[0-9]{6,14}$
example:
  accountType: EGP_ACCOUNT
  iban: EG380019000500000000263180002
  bankName: Example Bank
  phoneNumber: '+1234567890'
