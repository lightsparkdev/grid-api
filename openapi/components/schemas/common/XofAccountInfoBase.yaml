type: object
required:
- accountType
- phoneNumber
- provider
- region
properties:
  accountType:
    type: string
    enum:
    - XOF_ACCOUNT
  phoneNumber:
    type: string
    description: The phone number in international format
    example: '+1234567890'
    minLength: 7
    maxLength: 15
    pattern: ^\+[0-9]{6,14}$
  provider:
    type: string
    description: The mobile money provider name
    minLength: 1
    maxLength: 255
  region:
    type: string
    description: Country code within the West African CFA franc zone
    minLength: 2
    maxLength: 2
    pattern: ^[A-Z]{2}$
    enum:
    - BJ
    - CI
    - SN
    - TG
