type: object
required:
- accountType
- phoneNumber
- bankName
properties:
  accountType:
    type: string
    enum:
    - CNY_ACCOUNT
  phoneNumber:
    type: string
    description: The phone number in international format
    example: '+1234567890'
    minLength: 7
    maxLength: 15
    pattern: ^\+[0-9]{6,14}$
  bankName:
    type: string
    description: The name of the bank
    minLength: 1
    maxLength: 255
example:
  accountType: CNY_ACCOUNT
  phoneNumber: '+1234567890'
  bankName: Example Bank
