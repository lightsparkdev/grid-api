title: TZS Account
allOf:
- $ref: ./BasePaymentAccountInfo.yaml
- $ref: ./TzsAccountInfoBase.yaml
- type: object
  required:
  - paymentRails
  - reference
  properties:
    paymentRails:
      type: array
      items:
        type: string
        enum:
        - MOBILE_MONEY
    reference:
      type: string
      description: Unique reference code that must be included with the payment to
        properly credit it
      example: UMA-Q12345-REF
