type: object
required:
- accountType
- paymentRails
- phoneNumber
- provider
properties:
  accountType:
    type: string
    enum:
    - ZMW_ACCOUNT
  paymentRails:
    type: array
    items:
      type: string
      enum:
      - MOBILE_MONEY
  phoneNumber:
    type: string
    description: The phone number in international format
    example: '+1234567890'
    minLength: 7
    maxLength: 15
    pattern: ^\+[0-9]{6,14}$
  provider:
    type: string
    description: The mobile money provider name
    minLength: 1
    maxLength: 255
