type: object
required:
- accountType
- paymentRails
- bankName
- accountNumber
- swiftCode
- phoneNumber
properties:
  accountType:
    type: string
    enum:
    - IDR_ACCOUNT
  paymentRails:
    type: array
    items:
      type: string
      enum:
      - BANK_TRANSFER
  bankName:
    type: string
    description: The name of the bank
    minLength: 1
    maxLength: 255
    example: Bank Central Asia
  accountNumber:
    type: string
    description: Indonesian bank account number
    minLength: 1
    maxLength: 34
    example: '1234567890'
  swiftCode:
    type: string
    description: The SWIFT/BIC code of the bank
    example: CENAIDJA
    minLength: 8
    maxLength: 11
    pattern: ^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$
  phoneNumber:
    type: string
    description: Indonesian phone number for e-wallet payments
    example: '+6281234567890'
    minLength: 7
    maxLength: 15
    pattern: ^\+62[0-9]{9,12}$
