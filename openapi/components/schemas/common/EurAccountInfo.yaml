type: object
required:
- accountType
- paymentRails
- iban
properties:
  accountType:
    type: string
    enum:
    - EUR_ACCOUNT
  paymentRails:
    type: array
    items:
      type: string
      enum:
      - SEPA
      - SEPA_INSTANT
  iban:
    type: string
    description: The IBAN of the bank account
    example: DE89370400440532013000
    minLength: 15
    maxLength: 34
    pattern: ^[A-Z]{2}[0-9]{2}[A-Za-z0-9]{11,30}$
  swiftBic:
    type: string
    description: The SWIFT/BIC code of the bank
    example: DEUTDEFF
    minLength: 8
    maxLength: 11
    pattern: ^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$
