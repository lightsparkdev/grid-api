type: object
required:
- accountType
- iban
properties:
  accountType:
    type: string
    enum:
    - DKK_ACCOUNT
  iban:
    type: string
    description: Danish IBAN (18 characters, starting with DK)
    example: DK5000400040116243
    minLength: 18
    maxLength: 18
    pattern: ^DK[0-9]{16}$
  swiftCode:
    type: string
    description: The SWIFT/BIC code of the bank
    example: DABADKKK
    minLength: 8
    maxLength: 11
    pattern: ^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$
example:
  accountType: DKK_ACCOUNT
  iban: DK5000400040116243
  swiftCode: DABADKKK
