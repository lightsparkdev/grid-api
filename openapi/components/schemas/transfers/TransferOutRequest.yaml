type: object
required:
  - source
  - destination
properties:
  source:
    $ref: ./InternalAccountReference.yaml
    description: Source internal account details
  destination:
    $ref: ./ExternalAccountDestinationReference.yaml
    description: Destination external account details
  amount:
    type: integer
    format: int64
    description: >-
      Amount in the smallest unit of the currency (e.g., cents for USD/EUR,
      satoshis for BTC)
    example: 12550
  remittanceInformation:
    type: string
    maxLength: 80
    description: >-
      Free-form information about the payment that travels with it to the
      recipient. The field this populates depends on the payment rail: for ACH
      it populates the Addenda record, for FedNow and RTP it populates the
      remittanceInformation field, and for wires it populates the OBI
      (Originator to Beneficiary Information) / beneficiary information.
    example: '12345'
  scaFactor:
    $ref: ../sca/ScaFactor.yaml
    description: >-
      Optional preferred factor for the Strong Customer Authentication challenge
      this call issues. Only relevant for customers in a region where SCA is required
      (e.g. EU); ignored otherwise. Valid values for a per-transaction challenge
      are `SMS_OTP` (default) and `PASSKEY` — `TOTP` cannot carry the required
      dynamic linking and is rejected here. Omit to default to `SMS_OTP`.
