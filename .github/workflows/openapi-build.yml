name: OpenAPI Documentation Build

on:
  push:
    branches: [ main ]
    paths:
      - 'openapi.yaml'
      - 'openapi/**'
      - 'mintlify/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'openapi.yaml'
      - 'openapi/**'
      - 'mintlify/**'
  # Allow manual triggering
  workflow_dispatch:

jobs:
  build:
    name: Build OpenAPI Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Build documentation
        run: make build

      - name: Check compiled OpenAPI is up to date
        run: |
          if ! git diff --exit-code openapi.yaml mintlify/openapi.yaml; then
            echo "ERROR: Compiled openapi.yaml is out of sync with source files in openapi/."
            echo "Run 'make build' locally and commit the result."
            exit 1
          fi
